<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#185FA5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest-gm.json">
<link rel="apple-touch-icon" href="icons/icon-gm-192.png">
<title>Coordinación · Gerente Municipal</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="ui-kit.css">
<style>
/* ── ACENTO ROL: GM (azul) ── */
:root {
  --ac:     #185FA5;
  --ac-bg:  #EEF3FA;
  --ac-brd: rgba(24, 95, 165, .22);
}

/* ── RESUMEN EJECUTIVO GM ── */
.gm-summary {
  background: var(--c-sb); border-radius: var(--r-lg);
  padding: 13px var(--sp-md); display: flex; gap: var(--sp-md);
}
.gm-summary__left  { flex: 1; min-width: 0; }
.gm-summary__saludo{ font-size: 10px; color: rgba(255,255,255,.45); font-weight: 500; }
.gm-summary__nombre{ font-family: var(--f-cond); font-size: 17px; font-weight: 700; color: #fff; line-height: 1.2; }
.gm-summary__estado{ font-size: 11px; font-weight: 600; margin-top: 4px; }
.gm-summary__kpis  { display: flex; gap: 10px; flex-shrink: 0; }
.gm-kpi            { text-align: center; min-width: 42px; }
.gm-kpi__v         { font-family: var(--f-cond); font-size: 22px; font-weight: 700; line-height: 1; }
.gm-kpi__l         { font-size: 8px; color: rgba(255,255,255,.4); text-transform: uppercase; letter-spacing: .3px; line-height: 1.3; margin-top: 2px; }

/* ── RANKING GERENCIAS ── */
.ger-card {
  background: var(--c-card); border: 1px solid var(--c-borde);
  border-radius: var(--r-lg); padding: var(--sp-md);
  border-left: 4px solid var(--gc, var(--c-borde));
  animation: fadeUp .3s ease both;
}
.ger-card__hd {
  display: flex; align-items: center; gap: var(--sp-sm); margin-bottom: 9px;
}
.ger-dot   { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.ger-nombre{ font-size: 13px; font-weight: 700; color: var(--c-negro); flex: 1; }
.ger-jefe  { font-size: 10px; color: var(--c-gris3); }
.ger-card__kpis{ display: grid; grid-template-columns: repeat(4,1fr); gap: 5px; margin-bottom: 9px; }
.ger-kpi   { background: var(--c-bg); border-radius: var(--r-sm); padding: 6px 5px; text-align: center; }
.ger-kpi__v{ font-family: var(--f-cond); font-size: 16px; font-weight: 700; line-height: 1; }
.ger-kpi__l{ font-size: 8px; color: var(--c-gris3); text-transform: uppercase; letter-spacing: .3px; margin-top: 2px; line-height: 1.2; }
.ger-card__acts{ display: flex; gap: 6px; flex-wrap: wrap; }

/* ── INSTRUCCIÓN GM ── */
.instr-gm {
  background: var(--c-card); border: 1px solid var(--c-borde);
  border-left: 3px solid var(--ic, var(--c-gris3));
  border-radius: var(--r-md); padding: 11px var(--sp-md);
}
.instr-gm__hd  { display: flex; align-items: center; gap: var(--sp-sm); margin-bottom: 7px; flex-wrap: wrap; }
.instr-gm__txt { font-size: 12px; color: var(--c-negro); line-height: 1.5; margin-bottom: 7px; }
.instr-gm__resp{ background: var(--c-ok-bg); border: 1px solid var(--c-ok-brd); border-radius: var(--r-sm); padding: 6px 10px; font-size: 11px; color: var(--c-ok); margin-bottom: 7px; line-height: 1.4; }
.instr-gm__acts{ display: flex; gap: 6px; flex-wrap: wrap; }

/* ── ESCALAMIENTO AL ALCALDE ── */
.escalar-card {
  background: var(--c-critico-bg); border: 1px solid var(--c-critico-brd);
  border-radius: var(--r-lg); padding: var(--sp-md);
}
.escalar-card__hd  { display: flex; align-items: center; gap: var(--sp-sm); margin-bottom: var(--sp-sm); }
.escalar-card__ico { font-size: 22px; flex-shrink: 0; }
.escalar-card__ttl { font-size: 13px; font-weight: 700; color: var(--c-critico); }
.escalar-card__desc{ font-size: 11px; color: var(--c-gris2); line-height: 1.4; margin-bottom: 9px; }

/* ── OBRA CRÍTICA GM ── */
.obra-gm {
  background: var(--c-card); border: 1px solid var(--c-borde);
  border-radius: var(--r-md); padding: var(--sp-md);
  display: flex; gap: var(--sp-sm); align-items: flex-start;
}
.obra-gm__left  { flex: 1; min-width: 0; }
.obra-gm__nombre{ font-size: 13px; font-weight: 600; color: var(--c-negro); line-height: 1.35; margin-bottom: 4px; }
.obra-gm__meta  { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-bottom: 6px; }
.obra-gm__info  { font-size: 10px; color: var(--c-gris3); }
.obra-gm__right { flex-shrink: 0; text-align: right; }
.obra-gm__pct   { font-family: var(--f-cond); font-size: 26px; font-weight: 800; line-height: 1; }
.obra-gm__pct-l { font-size: 9px; color: var(--c-gris3); }

/* ── MODAL ESCALAR / DERIVAR ── */
.modal-dest { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; margin-bottom: 11px; }
.dest-opt { padding: 9px 6px; border: 1.5px solid var(--c-borde); border-radius: var(--r-md); background: var(--c-card); cursor: pointer; text-align: center; font-family: var(--f-sans); transition: var(--transition); }
.dest-opt:hover { border-color: var(--c-gris3); }
.dest-opt.sel   { border-color: var(--ac); background: var(--ac-bg); }
.dest-opt__ico  { font-size: 18px; display: block; margin-bottom: 3px; }
.dest-opt__lbl  { font-size: 10px; font-weight: 600; color: var(--c-negro); line-height: 1.3; }

/* ── PRESUPUESTO DESVIACIÓN ── */
.presup-row {
  background: var(--c-card); border: 1px solid var(--c-borde);
  border-radius: var(--r-md); padding: 10px var(--sp-md);
  display: flex; align-items: center; gap: var(--sp-md);
}
.presup-row__nombre{ font-size: 12px; font-weight: 600; color: var(--c-negro); flex: 1; min-width: 0; }
.presup-row__bar   { flex: 2; min-width: 80px; }
.presup-row__pct   { font-family: var(--f-cond); font-size: 20px; font-weight: 700; min-width: 46px; text-align: right; }

@media(max-width:680px) {
  .gm-summary__kpis  { display: none; }
  .ger-card__kpis    { grid-template-columns: repeat(2,1fr); }
  .modal-dest        { grid-template-columns: repeat(2,1fr); }
}
</style>
</head>
<body>

<!-- LOADER -->
<div class="kk-loader" id="loader">
  <div class="kk-loader__spin"></div>
  <div class="kk-loader__txt">Panel de coordinación</div>
</div>

<!-- MODAL: DERIVAR / ESCALAR -->
<div class="kk-modal-bg" id="modal-derivar">
  <div class="kk-modal">
    <div class="kk-modal__hd">
      <span class="kk-modal__ttl" id="modal-derivar-ttl">Emitir instrucción</span>
      <button class="kk-modal__close" onclick="cerrarModal('modal-derivar')">✕</button>
    </div>
    <div class="kk-form-row">
      <label class="kk-form-lbl">Tipo</label>
      <div class="kk-chips" id="derivar-chips">
        <button class="kk-chip-btn sel" data-tipo="instruccion">📌 Instrucción</button>
        <button class="kk-chip-btn" data-tipo="consulta">❓ Consulta</button>
        <button class="kk-chip-btn" data-tipo="alerta">⚠️ Alerta</button>
      </div>
    </div>
    <div class="kk-form-row">
      <label class="kk-form-lbl">Destinatario</label>
      <div class="modal-dest" id="derivar-dests"></div>
    </div>
    <div class="kk-form-row">
      <label class="kk-form-lbl">Mensaje <span style="color:var(--c-critico)">*</span></label>
      <textarea class="kk-form-inp kk-form-ta" id="derivar-txt" placeholder="Instrucción clara con acción esperada y plazo..."></textarea>
      <div class="kk-form-err" id="derivar-err">Campo requerido</div>
    </div>
    <div class="kk-form-row">
      <label class="kk-form-lbl">Prioridad</label>
      <select class="kk-form-inp kk-form-sel" id="derivar-prio">
        <option value="urgente">🔴 Urgente</option>
        <option value="normal" selected>🟡 Normal</option>
        <option value="baja">🟢 Baja</option>
      </select>
    </div>
    <button class="kk-btn kk-btn--primary" onclick="enviarDerivacion()">Enviar →</button>
  </div>
</div>

<!-- MODAL: PEDIR INFORME -->
<div class="kk-modal-bg" id="modal-informe">
  <div class="kk-modal">
    <div class="kk-modal__hd">
      <span class="kk-modal__ttl">Pedir informe a gerencia</span>
      <button class="kk-modal__close" onclick="cerrarModal('modal-informe')">✕</button>
    </div>
    <div class="kk-form-row">
      <label class="kk-form-lbl">Gerencia</label>
      <select class="kk-form-inp kk-form-sel" id="informe-ger"></select>
    </div>
    <div class="kk-form-row">
      <label class="kk-form-lbl">¿Qué informe necesitas? <span style="color:var(--c-critico)">*</span></label>
      <textarea class="kk-form-inp kk-form-ta" id="informe-txt" placeholder="Especifica el informe, período y formato esperado..."></textarea>
    </div>
    <div class="kk-form-row">
      <label class="kk-form-lbl">Plazo de respuesta</label>
      <input class="kk-form-inp" type="date" id="informe-plazo">
    </div>
    <button class="kk-btn kk-btn--primary" onclick="enviarSolicitudInforme()">Solicitar informe →</button>
  </div>
</div>

<!-- TOAST -->
<div class="kk-toast" id="toast"></div>

<!-- APP -->
<div class="kk-app" id="app" style="display:none">

  <!-- SIDEBAR -->
  <div class="kk-sb">
    <div class="kk-sb__head">
      <img class="kk-sb__escudo" src="escudo.png" alt="Escudo" onerror="this.style.display='none'">
      <div class="kk-sb__muni" id="sb-muni">Municipalidad Provincial de Cajamarca</div>
      <div class="kk-sb__tag">Gerencia Municipal · Coordinación</div>
    </div>
    <div class="kk-sb__nav" id="sb-nav"></div>
    <div class="kk-sb__foot">
      <div class="kk-sb__user">
        <div class="kk-sb__av" id="sb-av">GM</div>
        <div>
          <div class="kk-sb__name" id="sb-name">Gerente Municipal</div>
          <div class="kk-sb__rol">Coordinación general</div>
        </div>
        <button class="kk-sb__logout" onclick="logout()">Salir</button>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="kk-main">
    <div class="kk-offline-bar" id="offline-bar">📡 Sin conexión — los cambios se guardarán al recuperar señal</div>
    <div class="kk-tb">
      <button class="kk-tb__back" id="tb-back" onclick="nav('coordinacion')">← Menú</button>
      <div class="kk-tb__title" id="tb-title">Coordinación general</div>
      <div class="kk-tb__clock" id="tb-clock"></div>
      <button class="kk-tb__notif" id="tb-notif">🔔<span class="kk-tb__dot" id="tb-dot" style="display:none"></span></button>
    </div>
    <div class="kk-content" id="content"></div>
    <div class="kk-dock"    id="dock"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="branding.js"></script>
<script src="freshness.js"></script>
<script src="export.js"></script>


<script src="auth.js"></script>
<script src="shared.js"></script>
<script>
/* ══ ESTADO ══════════════════════════════════════════ */
let vista = 'coordinacion';
let derivarTipo = 'instruccion';
let derivarDestino = null;

const NAV_DEF = [
  { sec:'Panel ejecutivo', items:[
    { id:'coordinacion', ico:'⚡', lbl:'Coordinación',          badge:()=>{ const r=KausayDB.getResumenEjecutivo(); return r.alertas_criticas+r.obras_criticas; } },
    { id:'gerencias',    ico:'🏛', lbl:'Ranking gerencias',     badge:()=>{ const gs=KausayDB.getGerencias(); return gs.filter(g=>g.ejec<50).length; } },
    { id:'instrucciones',ico:'📬', lbl:'Instrucciones alcalde', badge:()=>KausayDB.getInstrucciones('GM').filter(i=>!i.confirmada&&i.de==='alcalde').length },
  ]},
  { sec:'Seguimiento', items:[
    { id:'compromisos',  ico:'🤝', lbl:'Compromisos',           badge:()=>KausayDB.getCompromisos().filter(c=>c.ven||c.estado==='vencido').length },
    { id:'obras',        ico:'🏗', lbl:'Obras críticas',        badge:()=>KausayDB.getObras().filter(o=>['critico','alto'].includes(o.riesgo)).length },
    { id:'presupuesto',  ico:'💰', lbl:'Desviaciones presup.',  badge:()=>KausayDB.getPresupuesto().por_area.filter(p=>p.pct<50).length },
  ]},
  { sec:'Escalamiento', items:[
    { id:'escalar',      ico:'🚨', lbl:'Escalar al alcalde',    badge:()=>calcEscalables() },
  ]},
];

const TITULOS = {
  coordinacion:'Coordinación general', gerencias:'Ranking de gerencias',
  instrucciones:'Instrucciones del alcalde', compromisos:'Compromisos y vencimientos',
  obras:'Obras críticas y coordinación', presupuesto:'Desviaciones presupuestales',
  escalar:'Escalar al alcalde',
};

const TIPO_COLORS_AG = { interna:'#8A90A0',campo:'#C8880A',audiencia:'#185FA5',concejo:'#8B1A1A',admin:'#4A5060' };

function calcEscalables() {
  const obras = KausayDB.getObras().filter(o=>o.riesgo==='critico').length;
  const plazos = KausayDB.getCriticos().length;
  const comps = KausayDB.getCompromisos().filter(c=>c.ven&&c.prioridad==='alta').length;
  return obras + plazos + comps;
}

/* ══ NAV ═════════════════════════════════════════════ */
function nav(v) { vista=v; render(); window.scrollTo(0,0); }

function buildNav() {
  const sb = document.getElementById('sb-nav');
  if (!sb) return;
  sb.innerHTML = '';
  NAV_DEF.forEach(sec => {
    const s=mk('div','kk-sb__sec'); s.textContent=sec.sec; sb.appendChild(s);
    sec.items.forEach(it => {
      const el=mk('div','kk-nav-item'+(vista===it.id?' on':''));
      const b=it.badge?.()||0;
      el.innerHTML=`<span class="kk-nav-item__ico">${it.ico}</span><span class="kk-nav-item__lbl">${it.lbl}</span>${b>0?`<span class="kk-nav-badge">${b}</span>`:''}`;
      el.onclick=()=>nav(it.id);
      sb.appendChild(el);
    });
  });
}

/* ══ RELOJ ═══════════════════════════════════════════ */
function tick() {
  const n=new Date(), el=document.getElementById('tb-clock');
  if(el) el.textContent=`${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')} · ${n.toLocaleDateString('es-PE',{weekday:'short',day:'numeric',month:'short'})}`;
}
tick(); setInterval(tick,15000);

/* ══ RENDER ══════════════════════════════════════════ */
function render() {
  const c=document.getElementById('content');
  if(!c) return;
  c.innerHTML='';
  const ttl=document.getElementById('tb-title');
  if(ttl) ttl.textContent=TITULOS[vista]||vista;
  const back=document.getElementById('tb-back');
  if(back) back.style.display=vista==='coordinacion'?'none':'flex';
  const r=KausayDB.getResumenEjecutivo();
  const dot=document.getElementById('tb-dot');
  if(dot) dot.style.display=(r.alertas_criticas>0||r.instr_sin_leer>0)?'block':'none';
  buildNav(); buildDock();

  if(vista==='coordinacion')  vCoordinacion(c,r);
  else if(vista==='gerencias') vGerencias(c);
  else if(vista==='instrucciones') vInstrucciones(c);
  else if(vista==='compromisos') vCompromisos(c);
  else if(vista==='obras') vObras(c);
  else if(vista==='presupuesto') vPresupuesto(c);
  else if(vista==='escalar') vEscalar(c);
}

/* ══ V1: COORDINACIÓN GENERAL ════════════════════════ */
function vCoordinacion(c, r) {
  const muni = KausayDB.getMuni();
  const gers = KausayDB.getGerencias();
  const criticas = gers.filter(g=>g.ejec<50).length;
  const alertas  = gers.filter(g=>g.ejec>=50&&g.ejec<70).length;
  const ok       = gers.filter(g=>g.ejec>=70).length;

  // Resumen ejecutivo
  const estadoCol = r.estado==='critico'?'var(--c-critico)':r.estado==='alerta'?'var(--c-alerta)':'var(--c-ok)';
  const estadoTxt = r.estado==='critico'?'Municipio con alertas críticas activas':r.estado==='alerta'?`${r.alertas_criticas+r.alertas_alerta} situaciones de riesgo en seguimiento`:`Gestión municipal estable · ${r.ejec_global}% ejecutado`;

  const summary = mk('div','gm-summary');
  summary.innerHTML=`
    <div class="gm-summary__left">
      <div class="gm-summary__saludo">Buenos días —</div>
      <div class="gm-summary__nombre">${KausayDB.getMuni().gm||'Gerente Municipal'}</div>
      <div class="gm-summary__estado" style="color:${estadoCol}">${estadoTxt}</div>
    </div>
    <div class="gm-summary__kpis">
      ${[
        {v:criticas, l:'Gerencias\ncríticas',   c:criticas>0?'var(--c-critico)':'var(--c-ok)'},
        {v:r.obras_criticas, l:'Obras\ncríticas', c:r.obras_criticas>0?'var(--c-critico)':'var(--c-ok)'},
        {v:r.instr_sin_leer, l:'Sin\nacuse',      c:r.instr_sin_leer>0?'var(--c-alerta)':'var(--c-ok)'},
        {v:r.compromisos_ven,l:'Comp.\nvencidos', c:r.compromisos_ven>0?'var(--c-critico)':'var(--c-ok)'},
      ].map(k=>`<div class="gm-kpi"><div class="gm-kpi__v" style="color:${k.c}">${k.v}</div><div class="gm-kpi__l">${k.l}</div></div>`).join('')}
    </div>`;
  c.appendChild(summary);

  // Semáforo de gerencias (mini-ranking)
  c.appendChild(secHead('Semáforo de gerencias','Ver ranking completo',()=>nav('gerencias')));
  const grid = mk('div',''); grid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:8px';
  gers.forEach(g => {
    const col = g.ejec>=70?'var(--c-ok)':g.ejec>=50?'var(--c-alerta)':'var(--c-critico)';
    const bg  = g.ejec>=70?'var(--c-ok-bg)':g.ejec>=50?'var(--c-alerta-bg)':'var(--c-critico-bg)';
    const item = mk('div','');
    item.style.cssText=`background:${bg};border:1px solid ${g.ejec>=70?'var(--c-ok-brd)':g.ejec>=50?'var(--c-alerta-brd)':'var(--c-critico-brd)'};border-radius:var(--r-md);padding:9px 11px;cursor:pointer`;
    item.innerHTML=`
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
        <span style="width:8px;height:8px;border-radius:50%;background:${col};flex-shrink:0;display:inline-block"></span>
        <span style="font-size:11px;font-weight:700;color:var(--c-negro);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${g.nombre.split(' ').slice(0,2).join(' ')}</span>
      </div>
      <div style="font-family:var(--f-cond);font-size:20px;font-weight:800;color:${col}">${g.ejec}%</div>
      <div style="font-size:9px;color:var(--c-gris3)">ejecución</div>`;
    item.onclick=()=>nav('gerencias');
    grid.appendChild(item);
  });
  c.appendChild(grid);

  // Instrucciones sin acuse
  const sinAcuse = KausayDB.getInstrucciones('GM').filter(i=>!i.confirmada&&i.de==='alcalde');
  if(sinAcuse.length) {
    c.appendChild(secHead(`${sinAcuse.length} instrucción${sinAcuse.length>1?'es':''} sin acuse`,'Ver todas',()=>nav('instrucciones')));
    sinAcuse.slice(0,1).forEach(i=>c.appendChild(renderInstrGM(i)));
  }

  // Obras críticas
  const obrasCrit = KausayDB.getObras().filter(o=>o.riesgo==='critico');
  if(obrasCrit.length) {
    c.appendChild(secHead(`${obrasCrit.length} obra${obrasCrit.length>1?'s críticas':' crítica'}`,'Ver obras',()=>nav('obras')));
    obrasCrit.slice(0,2).forEach(o=>c.appendChild(renderObraGM(o)));
  }

  // Compromisos vencidos
  const vencidos = KausayDB.getCompromisos().filter(c=>c.ven||c.estado==='vencido');
  if(vencidos.length) {
    c.appendChild(secHead(`${vencidos.length} compromiso${vencidos.length>1?'s vencidos':' vencido'}`,'Ver compromisos',()=>nav('compromisos')));
    vencidos.slice(0,2).forEach(x=>c.appendChild(renderCompGM(x)));
  }

  // Plazos críticos
  const plazos = KausayDB.getCriticos();
  if(plazos.length) {
    c.appendChild(secHead('Plazos normativos críticos','Ver semáforo',()=>nav('obras')));
    plazos.forEach(p=>{
      const col=p.dias<=11?'var(--c-critico)':'var(--c-alerta)';
      const item=mk('div','kk-plazo'); item.style.setProperty('--plazo-color',col);
      item.innerHTML=`<div><div class="kk-plazo__dias" style="color:${col}">${p.dias}</div><div class="kk-plazo__d">días</div></div><div class="kk-plazo__sep"></div><div class="kk-plazo__body"><div class="kk-plazo__sis">${p.sistema}</div><div class="kk-plazo__desc">${p.desc}</div><div class="kk-plazo__resp">Responsable: <strong>${p.resp}</strong></div></div>`;
      c.appendChild(item);
    });
  }
}

/* ══ V2: RANKING GERENCIAS ═══════════════════════════ */
function vGerencias(c) {
  const gers = KausayDB.getGerencias();
  const sorted = [...gers].sort((a,b)=>a.ejec-b.ejec); // peor primero

  c.appendChild(secHead('Estado por gerencia — peor a mejor','',null));
  sorted.forEach((g,i)=>{
    const col = g.ejec>=70?'var(--c-ok)':g.ejec>=50?'var(--c-alerta)':'var(--c-critico)';
    const obras = KausayDB.getObras(g.cod);
    const obrasCrit = obras.filter(o=>['critico','alto'].includes(o.riesgo)).length;
    const comps = KausayDB.getCompromisos(g.cod);
    const compVen = comps.filter(x=>x.ven||x.estado==='vencido').length;
    const pres = KausayDB.getPresupuestoArea(g.cod);
    const kpis = KausayDB.getIndicadores(g.cod);

    const card = mk('div','ger-card');
    card.style.cssText=`--gc:${col};animation-delay:${i*.05}s`;
    card.innerHTML=`
      <div class="ger-card__hd">
        <span class="ger-dot" style="background:${col}"></span>
        <div>
          <div class="ger-nombre">${g.nombre}</div>
          <div class="ger-jefe">${g.jefe}</div>
        </div>
        <span class="kk-chip ${g.ejec>=70?'kk-chip--ok':g.ejec>=50?'kk-chip--alerta':'kk-chip--critico'}">${g.ejec>=70?'Normal':g.ejec>=50?'Alerta':'Crítico'}</span>
      </div>
      <div class="ger-card__kpis">
        <div class="ger-kpi">
          <div class="ger-kpi__v" style="color:${col}">${g.ejec}%</div>
          <div class="ger-kpi__l">Ejec.\npresup.</div>
        </div>
        <div class="ger-kpi">
          <div class="ger-kpi__v" style="color:${obrasCrit>0?'var(--c-critico)':'var(--c-gris2)'}">${obrasCrit}</div>
          <div class="ger-kpi__l">Obras\ncríticas</div>
        </div>
        <div class="ger-kpi">
          <div class="ger-kpi__v" style="color:${compVen>0?'var(--c-critico)':'var(--c-gris2)'}">${compVen}</div>
          <div class="ger-kpi__l">Comp.\nvencidos</div>
        </div>
        <div class="ger-kpi">
          <div class="ger-kpi__v" style="color:var(--c-gris2)">${kpis.length>0?Math.round(kpis[0].v/kpis[0].meta*100)+'%':'—'}</div>
          <div class="ger-kpi__l">KPI\nprincipal</div>
        </div>
      </div>
      ${pres?`<div style="margin-bottom:8px">
        <div class="kk-bar-track" style="height:5px;margin-bottom:3px"><div class="kk-bar-fill" style="width:${pres.pct}%;background:${col}"></div></div>
        <div style="font-size:10px;color:var(--c-gris3)">${KausayDB.fmt(pres.ejec)} de ${KausayDB.fmt(pres.asig)} asignados</div>
      </div>`:''}
      <div class="ger-card__acts">
        <button class="kk-btn kk-btn--ghost" style="font-size:11px;padding:5px 11px" onclick="abrirDerivar('${g.cod}','${g.nombre}')">📌 Instrucción</button>
        <button class="kk-btn kk-btn--ghost" style="font-size:11px;padding:5px 11px" onclick="abrirInforme('${g.cod}')">📊 Pedir informe</button>
        ${g.ejec<50?`<button class="kk-btn kk-btn--danger" style="font-size:11px;padding:5px 11px" onclick="escalerGerencia('${g.cod}','${g.nombre}')">🚨 Escalar</button>`:''}
      </div>`;
    c.appendChild(card);
  });
}

/* ══ V3: INSTRUCCIONES DEL ALCALDE ═══════════════════ */
function vInstrucciones(c) {
  const todas = KausayDB.getInstrucciones('GM');
  const delAlcalde = todas.filter(i=>i.de==='alcalde');
  const sinAcuse   = delAlcalde.filter(i=>!i.confirmada);
  const conResp    = delAlcalde.filter(i=>i.respuesta&&i.respuesta.length>0);
  const confirmadas= delAlcalde.filter(i=>i.confirmada&&(!i.respuesta||i.respuesta.length===0));

  if(sinAcuse.length) {
    c.appendChild(secHead(`Sin acuse (${sinAcuse.length})`,'',null));
    sinAcuse.forEach(i=>c.appendChild(renderInstrGM(i,true)));
  }
  if(conResp.length) {
    c.appendChild(secHead('Respondidas','',null));
    conResp.forEach(i=>c.appendChild(renderInstrGM(i)));
  }
  if(confirmadas.length) {
    c.appendChild(secHead('Confirmadas','',null));
    confirmadas.forEach(i=>c.appendChild(renderInstrGM(i)));
  }
  if(!delAlcalde.length) c.appendChild(emptyState('📬','Sin instrucciones del alcalde','Las instrucciones dirigidas a la Gerencia Municipal aparecerán aquí.'));
}

/* ══ V4: COMPROMISOS ═════════════════════════════════ */
function vCompromisos(c) {
  const all  = KausayDB.getCompromisos();
  const ven  = all.filter(x=>x.ven||x.estado==='vencido');
  const pend = all.filter(x=>x.estado==='pendiente'&&!x.ven);
  const proc = all.filter(x=>x.estado==='en_proceso');

  c.appendChild(secHead('Compromisos del municipio','',null));
  if(!all.length){c.appendChild(emptyState('🤝','Sin compromisos registrados',''));return;}

  if(ven.length){
    c.appendChild(secHead(`Vencidos sin cumplimiento (${ven.length})`,'',null));
    ven.forEach(x=>c.appendChild(renderCompGM(x,true)));
  }
  if(proc.length){
    c.appendChild(secHead('En proceso','',null));
    proc.forEach(x=>c.appendChild(renderCompGM(x)));
  }
  if(pend.length){
    c.appendChild(secHead(`Pendientes (${pend.length})`,'',null));
    pend.forEach(x=>c.appendChild(renderCompGM(x)));
  }
}

/* ══ V5: OBRAS CRÍTICAS ══════════════════════════════ */
function vObras(c) {
  const obras = KausayDB.getObras();
  const groups = [
    {lbl:'Paralizadas o críticas', items:obras.filter(o=>o.riesgo==='critico'),  delay:0},
    {lbl:'Riesgo alto',           items:obras.filter(o=>o.riesgo==='alto'),      delay:.05},
    {lbl:'Riesgo medio',          items:obras.filter(o=>o.riesgo==='medio'),     delay:.1},
    {lbl:'Normal / licitación',   items:obras.filter(o=>['bajo'].includes(o.riesgo)||o.estado==='licitacion'), delay:.15},
  ];
  groups.filter(g=>g.items.length).forEach(g=>{
    c.appendChild(secHead(`${g.lbl} (${g.items.length})`,'',null));
    g.items.forEach(o=>c.appendChild(renderObraGM(o)));
  });
  if(!obras.length) c.appendChild(emptyState('🏗','Sin obras registradas',''));
}

/* ══ V6: PRESUPUESTO / DESVIACIONES ═════════════════ */
function vPresupuesto(c) {
  const pres = KausayDB.getPresupuesto();
  const sorted = [...pres.por_area].sort((a,b)=>a.pct-b.pct);

  // Totalizador
  const tot = mk('div','');
  tot.style.cssText='background:var(--c-sb);border-radius:var(--r-lg);padding:13px var(--sp-md);margin-bottom:8px;display:flex;gap:var(--sp-md);align-items:center';
  const totCol=KausayDB.pctColor(pres.pct_global);
  tot.innerHTML=`
    <div style="flex:1">
      <div style="font-size:10px;color:rgba(255,255,255,.45)">Ejecución global ${new Date().getFullYear()}</div>
      <div style="font-family:var(--f-cond);font-size:28px;font-weight:800;color:${totCol}">${pres.pct_global}%</div>
      <div style="font-size:11px;color:rgba(255,255,255,.45);margin-top:2px">${KausayDB.fmt(pres.ejecutado)} de ${KausayDB.fmt(pres.total)}</div>
    </div>
    <div style="text-align:right">
      <div style="font-size:11px;font-weight:600;color:${totCol}">${KausayDB.pctLabel(pres.pct_global)}</div>
      <div style="font-size:10px;color:rgba(255,255,255,.38);margin-top:2px">S/${((pres.total-pres.ejecutado)/1000000).toFixed(1)}M por ejecutar</div>
    </div>`;
  c.appendChild(tot);

  c.appendChild(secHead('Por gerencia — mayor desviación primero','',null));
  sorted.forEach(p=>{
    const col=KausayDB.pctColor(p.pct);
    const row=mk('div','presup-row');
    row.innerHTML=`
      <div class="presup-row__nombre">${p.nombre.split(' ').slice(0,2).join(' ')}</div>
      <div class="presup-row__bar">
        <div class="kk-bar-track" style="height:6px;margin-bottom:3px"><div class="kk-bar-fill" style="width:${p.pct}%;background:${col}"></div></div>
        <div style="font-size:9px;color:var(--c-gris3)">${KausayDB.fmt(p.ejec)} / ${KausayDB.fmt(p.asig)}</div>
      </div>
      <div class="presup-row__pct" style="color:${col}">${p.pct}%</div>`;
    c.appendChild(row);
  });

  // Gerencias en riesgo de no ejecutar
  const enRiesgo = sorted.filter(p=>p.pct<50);
  if(enRiesgo.length) {
    c.appendChild(secHead('Acción requerida — ejecución crítica','',null));
    enRiesgo.forEach(p=>{
      const saldo=p.asig-p.ejec;
      const card=mk('div','escalar-card');
      card.innerHTML=`
        <div class="escalar-card__hd">
          <span class="escalar-card__ico">⚠️</span>
          <div class="escalar-card__ttl">${p.nombre}</div>
        </div>
        <div class="escalar-card__desc">${p.pct}% ejecutado · Saldo sin ejecutar: <strong>${KausayDB.fmt(saldo)}</strong>. Riesgo de devolución de recursos al MEF.</div>
        <button class="kk-btn kk-btn--danger" style="font-size:11px;padding:6px 14px" onclick="abrirDerivar('${p.cod}','${p.nombre}')">📌 Emitir instrucción de devengado</button>`;
      c.appendChild(card);
    });
  }
}

/* ══ V7: ESCALAR AL ALCALDE ═══════════════════════════ */
function vEscalar(c) {
  const obrasCrit  = KausayDB.getObras().filter(o=>o.riesgo==='critico');
  const plazos     = KausayDB.getCriticos();
  const compVen    = KausayDB.getCompromisos().filter(x=>x.ven&&x.prioridad==='alta');
  const presupCrit = KausayDB.getPresupuesto().por_area.filter(p=>p.pct<40);

  const total = obrasCrit.length + plazos.length + compVen.length + presupCrit.length;

  if(!total){
    c.appendChild(emptyState('✅','Sin elementos para escalar','Todo está dentro de los parámetros manejables. Excelente gestión.'));
    return;
  }

  c.appendChild(secHead(`${total} elementos que requieren decisión del alcalde`,'',null));

  // Obras paralizadas
  if(obrasCrit.length) {
    c.appendChild(secHead('Obras críticas — decisión del alcalde','',null));
    obrasCrit.forEach(o=>{
      const card=mk('div','escalar-card');
      card.innerHTML=`
        <div class="escalar-card__hd">
          <span class="escalar-card__ico">🚨</span>
          <div class="escalar-card__ttl">${o.nombre}</div>
        </div>
        <div class="escalar-card__desc">${o.estado==='paralizada'?`Paralizada ${o.dias_sin_av} días.`:'En riesgo crítico.'} Presupuesto en riesgo: <strong>${KausayDB.fmt(o.presup)}</strong>. Requiere decisión: continuar, resolver o intervenir.</div>
        <button class="kk-btn kk-btn--danger" style="font-size:11px;padding:6px 14px" onclick="escalerAlcalde('obra','${o.nombre}')">🚨 Escalar al alcalde</button>`;
      c.appendChild(card);
    });
  }

  // Plazos críticos
  if(plazos.length) {
    c.appendChild(secHead('Plazos normativos — alertar al alcalde','',null));
    plazos.forEach(p=>{
      const card=mk('div','escalar-card');
      card.innerHTML=`
        <div class="escalar-card__hd">
          <span class="escalar-card__ico">⏰</span>
          <div class="escalar-card__ttl">${p.sistema} — ${p.dias} días</div>
        </div>
        <div class="escalar-card__desc">${p.desc}. Responsable: <strong>${p.resp}</strong>. Requiere que el alcalde exija el plan de cumplimiento.</div>
        <button class="kk-btn kk-btn--danger" style="font-size:11px;padding:6px 14px" onclick="escalerAlcalde('plazo','${p.sistema}: ${p.desc}')">🚨 Escalar al alcalde</button>`;
      c.appendChild(card);
    });
  }

  // Compromisos vencidos alta prioridad
  if(compVen.length) {
    c.appendChild(secHead('Compromisos de alta prioridad vencidos','',null));
    compVen.forEach(x=>{
      const card=mk('div','escalar-card');
      card.innerHTML=`
        <div class="escalar-card__hd">
          <span class="escalar-card__ico">🤝</span>
          <div class="escalar-card__ttl">${x.desc.slice(0,60)}${x.desc.length>60?'...':''}</div>
        </div>
        <div class="escalar-card__desc">Responsable: <strong>${x.resp}</strong>. Fecha: <strong>${x.fec}</strong>. Sin cumplimiento ni reporte.</div>
        <button class="kk-btn kk-btn--danger" style="font-size:11px;padding:6px 14px" onclick="escalerAlcalde('compromiso','${x.desc.slice(0,60)}')">🚨 Escalar al alcalde</button>`;
      c.appendChild(card);
    });
  }
}

/* ══ RENDERERS ═══════════════════════════════════════ */
function renderInstrGM(ins, conAcciones=false) {
  const tipoCol = {instruccion:'var(--c-critico)',consulta:'var(--c-info)',alerta:'var(--c-alerta)'}[ins.tipo]||'var(--c-gris3)';
  const card=mk('div','instr-gm'); card.style.setProperty('--ic',tipoCol);
  const tipoLabel={instruccion:'Instrucción',consulta:'Consulta',alerta:'Alerta',difusion:'Difusión'}[ins.tipo]||ins.tipo;
  card.innerHTML=`
    <div class="instr-gm__hd">
      <span class="kk-chip kk-tipo--${ins.tipo}">${tipoLabel}</span>
      <span style="font-size:10px;font-weight:600;color:var(--c-gris2);flex:1;margin-left:4px">Del Alcalde</span>
      <span style="font-size:10px;color:var(--c-gris3)">${ins.hora}</span>
      <span style="font-size:10px;font-weight:700;color:${ins.confirmada?'var(--c-ok)':'var(--c-alerta)'};${!ins.confirmada?'animation:pulse 2s infinite':''}">${ins.confirmada?'✓ Leída':'⏳ Sin acuse'}</span>
    </div>
    <div class="instr-gm__txt">${ins.contenido}</div>
    ${ins.respuesta?`<div class="instr-gm__resp"><strong>Mi respuesta:</strong> ${ins.respuesta}</div>`:''}
    ${ins.prioridad==='urgente'?`<div class="kk-item__prio-urgente" style="margin-bottom:6px">⚡ Urgente</div>`:''}
    <div class="instr-gm__acts">
      ${!ins.confirmada?`<button class="kk-btn kk-btn--ok" style="font-size:11px;padding:5px 11px" onclick="confirmarInstr('${ins.id}')">✓ Confirmar lectura</button>`:''}
      ${!ins.respuesta?`<button class="kk-btn kk-btn--ghost" style="font-size:11px;padding:5px 11px" onclick="abrirRespuesta('${ins.id}')">Responder</button>`:''}
      <button class="kk-btn kk-btn--ghost" style="font-size:11px;padding:5px 11px" onclick="abrirDerivar(null,null,'${ins.contenido.slice(0,80)}')">Derivar</button>
    </div>`;
  return card;
}

function renderCompGM(comp, urgente=false) {
  const col=comp.ven||comp.estado==='vencido'?'var(--c-critico)':comp.estado==='en_proceso'?'var(--c-info)':'var(--c-alerta)';
  const card=mk('div','kk-item');
  card.innerHTML=`
    <div class="kk-item__hd">
      <span class="kk-item__tipo kk-tipo--${comp.origen}">${comp.origen}</span>
      <span style="font-size:10px;font-weight:700;color:${col};margin-left:auto">${comp.ven||comp.estado==='vencido'?'VENCIDO':comp.estado.replace('_',' ').toUpperCase()}</span>
    </div>
    <div class="kk-item__txt">${comp.desc}</div>
    <div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap">
      <span class="kk-chip kk-chip--neutral">Resp: ${comp.resp}</span>
      <span style="font-size:11px;font-weight:700;color:${col}">${comp.fec}</span>
      ${comp.prioridad==='alta'?'<span class="kk-chip kk-chip--critico">Alta prioridad</span>':''}
      ${urgente?`<button class="kk-btn kk-btn--ghost" style="font-size:10px;padding:3px 9px;margin-left:auto" onclick="abrirDerivar('${comp.resp}','${comp.resp}')">📌 Seguimiento</button>`:''}
    </div>`;
  return card;
}

  const card=mk('div','obra-gm');
  card.style.borderLeft=`3px solid ${col}`;
  card.innerHTML=`
    <div class="obra-gm__left">
      <div class="obra-gm__nombre">${o.nombre}</div>
      <div class="obra-gm__meta">
        <span class="kk-chip ${o.riesgo==='critico'?'kk-chip--critico':o.riesgo==='alto'?'kk-chip--alerta':'kk-chip--neutral'}">${o.riesgo}</span>
        ${ger?`<span style="font-size:10px;color:var(--c-gris3)">${ger.nombre.split(' ').slice(0,1).join(' ')}</span>`:''}
        ${o.dias_sin_av>0?`<span style="font-size:10px;color:${o.dias_sin_av>7?'var(--c-critico)':'var(--c-alerta)'};font-weight:600">${o.dias_sin_av}d sin avance</span>`:''}
      </div>
      <div class="obra-gm__info">${KausayDB.fmt(o.presup)} · Fin: ${o.fin}</div>
      <div class="instr-gm__acts" style="margin-top:7px">
        <button class="kk-btn kk-btn--ghost" style="font-size:11px;padding:5px 11px" onclick="abrirDerivar('${o.ger}','${o.ger}','Requiero actualización urgente de avance de obra: ${o.nombre.slice(0,40)}')">📌 Pedir avance</button>
        ${o.riesgo==='critico'?`<button class="kk-btn kk-btn--danger" style="font-size:11px;padding:5px 11px" onclick="escalerAlcalde('obra','${o.nombre.slice(0,60)}')">🚨 Escalar</button>`:''}
      </div>
    </div>
    <div class="obra-gm__right">
      <div class="obra-gm__pct" style="color:${col}">${o.pct}%</div>
      <div class="obra-gm__pct-l">avance</div>
      <div class="kk-bar-track" style="width:52px;height:5px;margin-top:5px"><div class="kk-bar-fill" style="width:${o.pct}%;background:${col}"></div></div>
    </div>`;
  return card;
}

/* ══ DOCK ════════════════════════════════════════════ */
function buildDock() {
  const dock=document.getElementById('dock'); if(!dock) return;
  const items=[
    {ico:'📌',lbl:'Emitir\ninstrucción', fn:()=>{abrirDerivar(null,null,'');KausayDB.Telemetry.firstAction();},primary:true},
    {ico:'📊',lbl:'Pedir\ninforme',      fn:()=>abrirModal('modal-informe')},
    {ico:'🚨',lbl:'Escalar\nal alcalde', fn:()=>nav('escalar')},
    {ico:'🏗',lbl:'Obras\ncríticas',     fn:()=>nav('obras')},
    {ico:'💰',lbl:'Presupuesto',         fn:()=>nav('presupuesto')},
  ];
  dock.innerHTML='';
  items.forEach(it=>{
    const btn=mk('button','kk-dock-btn'+(it.primary?' kk-dock-btn--primary':''));
    btn.innerHTML=`<span class="kk-dock-btn__ico">${it.ico}</span><span class="kk-dock-btn__lbl">${it.lbl}</span>`;
    btn.onclick=it.fn; dock.appendChild(btn);
  });
}

/* ══ ACCIONES ════════════════════════════════════════ */
function confirmarInstr(id) {
  KausayDB.confirmarInstruccion(id);
  KausayDB.Telemetry.firstAction();
  toast('✓ Instrucción confirmada. El alcalde fue notificado.');
  render();
}

function abrirRespuesta(id) {
  const txt = prompt('Tu respuesta a esta instrucción:');
  if(!txt||!txt.trim()) return;
  KausayDB.responderInstruccion(id, txt.trim());
  toast('✓ Respuesta enviada al alcalde');
  render();
}

function abrirDerivar(gerCod, gerNombre, prefill='') {
  derivarDestino = gerCod;
  document.getElementById('modal-derivar-ttl').textContent = gerNombre ? `Instrucción → ${gerNombre}` : 'Emitir instrucción';
  document.getElementById('derivar-txt').value = prefill;
  document.getElementById('derivar-err').classList.remove('show');

  // Build destination grid
  const gers = KausayDB.getGerencias();
  const grid = document.getElementById('derivar-dests');
  grid.innerHTML = '';
  [{cod:'GM',nombre:'Gerente Mun.',ico:'🏛'}, ...gers.map(g=>({cod:g.cod,nombre:g.nombre.split(' ').slice(0,2).join(' '),ico:'🏢'}))].forEach(d=>{
    const btn=mk('button','dest-opt'+(d.cod===gerCod?' sel':''));
    btn.innerHTML=`<span class="dest-opt__ico">${d.ico}</span><span class="dest-opt__lbl">${d.nombre}</span>`;
    btn.onclick=()=>{ document.querySelectorAll('.dest-opt').forEach(b=>b.classList.remove('sel')); btn.classList.add('sel'); derivarDestino=d.cod; };
    grid.appendChild(btn);
  });
  abrirModal('modal-derivar');
}

function enviarDerivacion() {
  const txt = document.getElementById('derivar-txt')?.value.trim();
  if(!txt){ document.getElementById('derivar-err').classList.add('show'); return; }
  const prio = document.getElementById('derivar-prio')?.value;
  const para = derivarDestino || 'GM';
  const ger = KausayDB.getGerencia(para);
  const paraLabel = ger?.nombre || (para==='GM'?'Gerente Municipal':para);
  KausayDB.addInstruccion({ tipo:derivarTipo, para, paraLabel, contenido:txt, prioridad:prio });
  document.getElementById('derivar-txt').value='';
  cerrarModal('modal-derivar');
  toast(`✓ Instrucción enviada a ${paraLabel}`);
  KausayDB.Telemetry.instruccionEnviada(derivarTipo);
  nav('instrucciones');
}

function abrirInforme(gerCod) {
  const sel = document.getElementById('informe-ger');
  sel.innerHTML = KausayDB.getGerencias().map(g=>`<option value="${g.cod}" ${g.cod===gerCod?'selected':''}>${g.nombre}</option>`).join('');
  abrirModal('modal-informe');
}

  const txt   = document.getElementById('informe-txt')?.value.trim();
  const gerCod= document.getElementById('informe-ger')?.value;
  const plazo = document.getElementById('informe-plazo')?.value;

    tipo:'consulta', para:gerCod,
    paraLabel: ger?.nombre || gerCod,
    contenido: `[INFORME SOLICITADO] ${txt}${plazo?` — Plazo: ${plazo}`:''}`,
    prioridad:'normal',
  });
  document.getElementById('informe-txt').value='';
  cerrarModal('modal-informe');
  toast(`✓ Solicitud de informe enviada a ${ger?.nombre||gerCod}`);
  nav('instrucciones');
}

function escalerGerencia(cod, nombre) {
  KausayDB.addInstruccion({
    tipo:'alerta', para:'alcalde', paraLabel:'Alcalde',
    contenido:`[ESCALAMIENTO GM] La gerencia ${nombre} presenta ejecución crítica y requiere su intervención directa.`,
    prioridad:'urgente',
  });
  KausayDB.Audit.emit('escalamiento', cod, nombre, 'escalar', null, {destino:'alcalde',motivo:'ejecucion_critica'});
  toast(`🚨 Escalamiento enviado al alcalde sobre ${nombre}`);
  render();
}

function escalerAlcalde(tipo, descripcion) {
  KausayAuth.reauth('Escalar situación crítica al alcalde').then(ok => {
    if (!ok) { const t=document.getElementById('toast');t.textContent='⚠ Verificación cancelada';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500); return; }
  const msgs = {
    obra:`[ESCALAMIENTO] Obra requiere decisión urgente: ${descripcion}`,
    plazo:`[ESCALAMIENTO] Plazo normativo inminente: ${descripcion}`,
    compromiso:`[ESCALAMIENTO] Compromiso vencido de alta prioridad: ${descripcion}`,
  };
  KausayDB.addInstruccion({
    tipo:'alerta', para:'alcalde', paraLabel:'Alcalde',
    contenido: msgs[tipo]||`[ESCALAMIENTO] ${descripcion}`,
    prioridad:'urgente',
  });
  KausayDB.Audit.emit('escalamiento', tipo, descripcion.slice(0,50), 'escalar', null, {destino:'alcalde',tipo});
  toast('🚨 Escalamiento enviado al alcalde');
  render();
  }); // end reauth
}

/* ══ CHIPS TIPO DERIVAR ═══════════════════════════════ */
document.querySelectorAll('[data-tipo]').forEach(btn=>{
  if(btn.closest('#derivar-chips')) {
    btn.onclick=()=>{
      document.querySelectorAll('#derivar-chips .kk-chip-btn').forEach(b=>b.classList.remove('sel'));
      btn.classList.add('sel');
      derivarTipo=btn.dataset.tipo;
    };
  }
});

/* ══ MODALES ═════════════════════════════════════════ */
function abrirModal(id){ document.getElementById(id)?.classList.add('show'); }
function cerrarModal(id){ document.getElementById(id)?.classList.remove('show'); }

/* ══ HELPERS ═════════════════════════════════════════ */
function mk(tag,cls){ const el=document.createElement(tag); if(cls) el.className=cls; return el; }
function secHead(ttl,lnkTxt,lnkFn){
  const hd=mk('div','kk-sec-hd');
  hd.innerHTML=`<span class="kk-sec-ttl">${ttl}</span>`;
  if(lnkTxt&&lnkFn){const btn=mk('button','kk-sec-lnk');btn.textContent=lnkTxt;btn.onclick=lnkFn;hd.appendChild(btn);}
  return hd;
}
function emptyState(ico,ttl,desc){
  const el=mk('div','kk-empty');
  el.innerHTML=`<div class="kk-empty__ico">${ico}</div><div class="kk-empty__ttl">${ttl}</div><div class="kk-empty__desc">${desc}</div>`;
  return el;
}
function toast(msg,dur=2800){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

/* ══ OFFLINE ═════════════════════════════════════════ */
function updateOnlineStatus(){
  const bar=document.getElementById('offline-bar');
  if(bar) bar.classList.toggle('show',!navigator.onLine);
}
window.addEventListener('online', ()=>{updateOnlineStatus();toast('✓ Conexión restaurada');});
window.addEventListener('offline', updateOnlineStatus);

function logout(){ window.location.href='index.html'; }

/* ══ INIT ════════════════════════════════════════════ */
window.addEventListener('load',()=>{
  // ── AUTH ──
  KausayAuth.requireAuth(['gerente_municipal', 'alcalde', 'asesor_despacho']);
  const _sess = KausayAuth.getSession();
  KausayBranding.apply({ rol: _sess?.rol || 'gerente_municipal' });
  const muni  = KausayDB.getMuni();
  const nombre= sessionStorage.getItem('kausay_demo_nombre')||muni.gm||'Gerente Municipal';
  const ini   = nombre.split(' ').slice(0,2).map(p=>p[0]).join('').toUpperCase();

  document.getElementById('sb-muni').textContent = muni.nombre||'Municipalidad';
  document.getElementById('sb-av').textContent   = ini;
  document.getElementById('sb-name').textContent = nombre;

  // Poblar selector de gerencias en modal informe
  const sel = document.getElementById('informe-ger');
  if(sel) sel.innerHTML = KausayDB.getGerencias().map(g=>`<option value="${g.cod}">${g.nombre}</option>`).join('');

  updateOnlineStatus();

  // EventBus — dentro de load
  KausayDB.EventBus.on('instruccion:confirmada',       ()=>render());
  KausayDB.EventBus.on('instruccion:respondida',       ()=>render());
  KausayDB.EventBus.on('instruccion:nueva',            ()=>render());
  KausayDB.EventBus.on('obra:avance',                  ()=>render());
  KausayDB.EventBus.on('compromiso:nuevo',             ()=>render());
  KausayDB.EventBus.on('compromiso:updated',           ()=>render());
  KausayDB.EventBus.on('alerta:nueva',                 ()=>render());
  KausayDB.EventBus.on('wq:conflict',                  ()=>render());
  KausayDB.EventBus.on('remote:instruccion:nueva',     ()=>render());
  KausayDB.EventBus.on('remote:obra:avance',           ()=>render());

  document.getElementById('loader').classList.add('gone');
  document.getElementById('app').style.display='flex';

  render();

  
  // ── REALTIME SUPABASE (Etapa 4) ──
  KausayDB.subscribeRealtime('instrucciones', payload => {
    KausayDB.Cache.invalidate('instrucciones');
    if (payload.eventType === 'INSERT') KausayDB.EventBus.emit('instruccion:nueva', payload.new);
    if (payload.eventType === 'UPDATE') KausayDB.EventBus.emit('instruccion:confirmada', { id: payload.new?.id });
    render();
  });
  KausayDB.subscribeRealtime('obras', payload => {
    KausayDB.Cache.invalidate('obras');
    KausayDB.EventBus.emit('obra:avance', { id: payload.new?.id });
    render();
  });
  KausayDB.subscribeRealtime('compromisos', payload => {
    KausayDB.Cache.invalidate('compromisos');
    render();
  });
  if (KausayDB.CONFIG.USE_SUPABASE) KausayDB.loadInitialData().then(() => render());
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
  KausayFreshness.autoMount();
  KausayExport.renderExportBtn('kk-fresh-wrap', ["instrucciones", "compromisos", "obras", "presupuesto"]);
  setTimeout(()=>document.getElementById('loader').remove(),500);
});
</script>
