<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#8B0000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Municipalidad Provincial de Cajamarca</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Barlow',sans-serif;background:#0D0D0D;overflow:hidden}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 0%,rgba(139,0,0,.22) 0%,transparent 55%),radial-gradient(ellipse at 80% 100%,rgba(139,0,0,.1) 0%,transparent 55%),#0D0D0D}
.loader{position:fixed;inset:0;z-index:200;background:#0D0D0D;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .5s}
.loader.hide{opacity:0;pointer-events:none}
.loader-spin{width:26px;height:26px;border:2.5px solid rgba(255,255,255,.1);border-top-color:rgba(200,20,20,.8);border-radius:50%;animation:spin .7s linear infinite}
.loader-txt{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:.5px}
.page{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;align-items:center}
/* HEADER */
.hd{width:100%;background:linear-gradient(180deg,rgba(100,0,0,.55) 0%,transparent 100%);padding:16px 16px 12px;display:flex;align-items:center;gap:12px;flex-shrink:0;animation:fadeUp .5s ease both}
.escudo{width:44px;height:auto;flex-shrink:0;filter:drop-shadow(0 2px 8px rgba(0,0,0,.6))}
.hd-txt{flex:1;min-width:0}
.hd-muni{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:#fff;line-height:1.15}
.hd-sub{font-size:9px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1.5px;margin-top:3px}
.hd-r{text-align:right;flex-shrink:0}
.hd-hora{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:#fff;line-height:1}
.hd-fecha{font-size:9px;color:rgba(255,255,255,.38);margin-top:2px;text-transform:capitalize}
/* ESTADO */
.estado{width:100%;padding:8px 14px;background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;animation:fadeUp .45s .08s ease both;opacity:0;animation-fill-mode:forwards}
.estado-ttl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.3);margin-bottom:6px}
.estado-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.e-item{background:rgba(255,255,255,.05);border-radius:7px;padding:6px 4px;text-align:center;border:1px solid rgba(255,255,255,.06)}
.e-val{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;line-height:1}
.e-lbl{font-size:7.5px;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:.3px;margin-top:2px;line-height:1.3}
/* DECISIONES */
.decs{width:100%;padding:8px 14px 4px;flex-shrink:0;animation:fadeUp .45s .13s ease both;opacity:0;animation-fill-mode:forwards}
.sec-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.3);margin-bottom:6px}
.dec{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.08);border-left:3px solid var(--c,#8B0000);border-radius:8px;padding:8px 11px;display:flex;align-items:center;gap:9px;margin-bottom:5px}
.dec-ico{font-size:16px;flex-shrink:0}
.dec-bd{flex:1;min-width:0}
.dec-ttl{font-size:11.5px;font-weight:600;color:#fff;line-height:1.3}
.dec-desc{font-size:9.5px;color:rgba(255,255,255,.42);margin-top:1px}
.dec-tag{font-size:8.5px;font-weight:700;padding:2px 7px;border-radius:7px;text-transform:uppercase;flex-shrink:0}
.t-r{background:rgba(180,20,20,.3);color:#FF7070;border:1px solid rgba(180,20,20,.35)}
.t-a{background:rgba(200,130,10,.25);color:#F0A80C;border:1px solid rgba(200,130,10,.3)}
.t-i{background:rgba(24,95,165,.25);color:#70A8D8;border:1px solid rgba(24,95,165,.3)}
/* APPS */
.apps-sec{flex:1;width:100%;padding:8px 14px 4px;display:flex;flex-direction:column;min-height:0;animation:fadeUp .45s .18s ease both;opacity:0;animation-fill-mode:forwards}
.apps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;flex:1}
.app{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;text-decoration:none;border:none;background:none;font-family:'Barlow',sans-serif;-webkit-tap-highlight-color:transparent}
.app:active .app-ico{transform:scale(.92)}
.app-ico{width:100%;aspect-ratio:1;border-radius:15px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;transition:transform .15s;border:1px solid rgba(255,255,255,.1)}
.app-shine{position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(180deg,rgba(255,255,255,.16) 0%,transparent 100%);pointer-events:none}
.app-sup{font-size:8px;font-weight:700;color:rgba(255,255,255,.45);letter-spacing:1px;margin-bottom:2px}
.app-letra{font-family:'Barlow Condensed',sans-serif;font-size:clamp(22px,6vw,32px);font-weight:800;color:#fff;line-height:1}
.app-badge{position:absolute;top:5px;right:5px;background:#C42020;color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:9px;border:1.5px solid rgba(0,0,0,.3)}
.app-lbl{font-size:11px;font-weight:600;color:#fff;text-align:center;line-height:1.2}
.app-cargo{font-size:9px;color:rgba(255,255,255,.38);text-align:center}
/* DOCK */
.dock{width:100%;padding:5px 14px max(env(safe-area-inset-bottom),8px);flex-shrink:0;animation:fadeUp .45s .22s ease both;opacity:0;animation-fill-mode:forwards}
.dock-in{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:15px;padding:7px 10px;display:flex;justify-content:space-around}
.dbtn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;border:none;background:none;font-family:'Barlow',sans-serif;-webkit-tap-highlight-color:transparent}
.dbtn:active .dico{transform:scale(.9)}
.dico{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.dico-l{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;color:#fff}
.dlbl{font-size:9px;color:rgba(255,255,255,.4);font-weight:600}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px)}
.modal-bg.show{display:flex}
.modal{background:#1A1A1A;border:1px solid rgba(255,255,255,.12);border-radius:17px;padding:20px 18px;width:100%;max-width:280px}
.modal-hd{display:flex;align-items:center;gap:10px;margin-bottom:13px}
.m-ico{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:#fff;flex-shrink:0}
.m-n{font-size:13px;font-weight:700;color:#fff}
.m-j{font-size:10px;color:rgba(255,255,255,.36);margin-top:1px}
.pw-lbl{font-size:9px;font-weight:700;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;display:block}
.pw-inp{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:8px;padding:10px 12px;font-size:15px;font-family:'Barlow',sans-serif;color:#fff;outline:none;letter-spacing:3px}
.pw-inp:focus{border-color:rgba(255,255,255,.35)}
.pw-inp::placeholder{letter-spacing:0;color:rgba(255,255,255,.2);font-size:12px}
.pw-err{font-size:11px;color:#FF6B6B;margin-top:5px;display:none;font-weight:600}
.pw-err.show{display:block}
.m-btns{display:flex;gap:7px;margin-top:11px}
.m-ok{flex:1;padding:10px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;color:#fff}
.m-cancel{padding:10px 12px;border-radius:8px;background:rgba(255,255,255,.07);border:none;color:rgba(255,255,255,.38);font-size:13px;cursor:pointer;font-family:'Barlow',sans-serif}
/* PANEL GERENCIAS */
.panel-ger{position:fixed;inset:0;z-index:50;background:#0D0D0D;display:none;flex-direction:column}
.panel-ger.show{display:flex}
.pg-hd{padding:max(env(safe-area-inset-top),14px) 14px 10px;display:flex;align-items:center;gap:11px;background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0}
.pg-back{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 11px;font-size:12px;font-weight:600;color:#fff;cursor:pointer;font-family:'Barlow',sans-serif}
.pg-ttl{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:#fff}
.pg-body{flex:1;padding:12px 14px;display:grid;grid-template-columns:1fr 1fr;gap:9px;align-content:start;overflow-y:auto}
.g-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:13px 11px;cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent;transition:transform .15s}
.g-card:active{transform:scale(.95)}
.g-dot{width:9px;height:9px;border-radius:50%;margin:0 auto 7px;display:block}
.g-n{font-size:12px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:3px}
.g-jefe{font-size:9.5px;color:rgba(255,255,255,.38);margin-bottom:6px;line-height:1.3}
.g-est{font-size:8.5px;font-weight:700;padding:2px 8px;border-radius:7px;display:inline-block;text-transform:uppercase}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="loader-spin"></div><div class="loader-txt">Municipalidad Provincial de Cajamarca</div></div>
<div class="bg"></div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-hd"><div class="m-ico" id="m-ico"></div><div><div class="m-n" id="m-n"></div><div class="m-j" id="m-j"></div></div></div>
    <label class="pw-lbl">Contraseña de acceso</label>
    <input type="password" class="pw-inp" id="pw-inp" placeholder="Ingresa tu contraseña">
    <div class="pw-err" id="pw-err">Contraseña incorrecta</div>
    <div class="m-btns">
      <button class="m-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="m-ok" id="m-ok" onclick="verificarPW()">Ingresar</button>
    </div>
  </div>
</div>

<!-- PANEL GERENCIAS -->
<div class="panel-ger" id="panel-ger">
  <div class="pg-hd">
    <button class="pg-back" onclick="cerrarGer()">← Volver</button>
    <div class="pg-ttl">Gerencias Sectoriales</div>
  </div>
  <div class="pg-body" id="pg-body"></div>
</div>

<!-- PÁGINA -->
<div class="page">
  <div class="hd">
    <img class="escudo" src="escudo.png" alt="Escudo" onerror="this.style.display='none'">
    <div class="hd-txt"><div class="hd-muni" id="muni-n">Municipalidad Provincial de Cajamarca</div><div class="hd-sub">Sistema de gestión municipal · Kausay</div></div>
    <div class="hd-r"><div class="hd-hora" id="hora">--:--</div><div class="hd-fecha" id="fecha"></div></div>
  </div>
  <div class="estado">
    <div class="estado-ttl">Estado del municipio hoy</div>
    <div class="estado-grid" id="estado-grid"></div>
  </div>
  <div class="decs"><div class="sec-lbl">Decisiones del día</div><div id="dec-cards"></div></div>
  <div class="apps-sec"><div class="sec-lbl" style="margin-bottom:6px">Acceder como</div><div class="apps-grid" id="apps-grid"></div></div>
  <div class="dock">
    <div class="dock-in">
      <button class="dbtn" onclick="ir('config.html',null,null)"><div class="dico" style="background:#2A2A2A"><span class="dico-l">⚙</span></div><span class="dlbl">Configurar</span></button>
      <button class="dbtn" onclick="mostrarGer()"><div class="dico" style="background:#0F6E56"><span class="dico-l">G</span></div><span class="dlbl">Gerencias</span></button>
      <button class="dbtn" onclick="ir('login.html',null,null)"><div class="dico" style="background:#1A1D23"><span class="dico-l">→</span></div><span class="dlbl">Login</span></button>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
(function(){const p=new URLSearchParams(window.location.search);const r=p.get('rol'),n=p.get('nombre'),g=p.get('gerencia');if(r)sessionStorage.setItem('kausay_demo_rol',r);if(n)sessionStorage.setItem('kausay_demo_nombre',decodeURIComponent(n));if(g)sessionStorage.setItem('kausay_demo_gerencia',g);})();

let gerActiva=null;
const PW={INFRA:'infra2024',RENTAS:'rentas2024',SERVICIOS:'servicios2024',SOCIAL:'social2024',SECRETARIA:'secretaria2024',PLANIF:'planif2024'};

function tick(){const n=new Date();document.getElementById('hora').textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');document.getElementById('fecha').textContent=n.toLocaleDateString('es-PE',{weekday:'long',day:'numeric',month:'long'});}
tick();setInterval(tick,10000);

function ir(url,rol,nombre){
  if(!url)return;
  const m=KausayDB.getMuni();
  let nm=nombre||'';
  if(rol==='alcalde')nm=m.alcalde||nm;
  if(rol==='secretaria')nm=m.secretaria||nm;
  if(rol==='gerente_municipal')nm=m.gm||nm;
  const p=rol?`?rol=${rol}&nombre=${encodeURIComponent(nm)}`:'';
  window.location.href=url+p;
}

function renderEstado(){
  const r=KausayDB.getResumenEjecutivo();
  const items=[
    {v:r.ejec_global+'%',l:'Ejec.\npresup.',c:KausayDB.pctColor(r.ejec_global)},
    {v:r.alertas_criticas,l:'Alertas\ncríticas',c:r.alertas_criticas>0?'#FF6B6B':'#5AC88A'},
    {v:r.obras_riesgo,l:'Obras\nen riesgo',c:r.obras_riesgo>0?'#F0A80C':'#5AC88A'},
    {v:r.compromisos_ven,l:'Comp.\nvencidos',c:r.compromisos_ven>0?'#FF6B6B':'#5AC88A'},
    {v:r.docs_pendientes,l:'Docs.\npara firma',c:r.docs_pendientes>0?'#F0A80C':'rgba(255,255,255,.45)'},
  ];
  document.getElementById('estado-grid').innerHTML=items.map(i=>`<div class="e-item"><div class="e-val" style="color:${i.c}">${i.v}</div><div class="e-lbl">${i.l}</div></div>`).join('');
}

function renderDecisiones(){
  const obras=KausayDB.getObras().filter(o=>o.riesgo==='critico');
  const plazos=KausayDB.getCriticos();
  const agenda=KausayDB.getAgenda();
  const decs=[];
  if(obras.length)decs.push({ico:'🚨',ttl:obras[0].nombre+' — paralizada',desc:'Decidir: continuar o resolver contrato',tag:'Urgente',tc:'t-r',c:'#8B0000'});
  if(plazos.length)decs.push({ico:'⏰',ttl:'MEF vence en '+plazos[0].dias+' días — S/1.2M sin devengar',desc:'Exigir plan de devengado a Planeamiento',tag:plazos[0].dias+'d',tc:'t-a',c:'#C8880A'});
  const conc=agenda.find(a=>a.tipo==='concejo');
  if(conc)decs.push({ico:'🏛',ttl:'Sesión concejo '+conc.hora,desc:conc.br?'✓ Briefing IA listo':'Briefing pendiente de preparar',tag:'Hoy',tc:'t-i',c:'#185FA5'});
  document.getElementById('dec-cards').innerHTML=decs.slice(0,3).map(d=>`<div class="dec" style="--c:${d.c}"><span class="dec-ico">${d.ico}</span><div class="dec-bd"><div class="dec-ttl">${d.ttl}</div><div class="dec-desc">${d.desc}</div></div><span class="dec-tag ${d.tc}">${d.tag}</span></div>`).join('');
}

function renderApps(){
  const m=KausayDB.getMuni();
  const r=KausayDB.getResumenEjecutivo();
  const apps=[
    {url:'alcalde.html',rol:'alcalde',nm:m.alcalde,letra:'A',color:'#8B0000',lbl:'Alcalde',cargo:(m.alcalde||'').split(' ').slice(0,2).join(' '),badge:r.alertas_criticas+r.compromisos_ven},
    {url:'secretaria.html',rol:'secretaria',nm:m.secretaria,letra:'S',color:'#9E6A06',lbl:'Secretaria',cargo:(m.secretaria||'').split(' ').slice(0,2).join(' '),badge:r.docs_pendientes},
    {url:'gm.html',rol:'gerente_municipal',nm:m.gm,letra:'GM',color:'#0E3D6E',lbl:'Gte. Municipal',cargo:(m.gm||'').split(' ').slice(0,2).join(' '),badge:r.instr_sin_leer},
  ];
  const grid=document.getElementById('apps-grid');grid.innerHTML='';
  apps.forEach(a=>{
    const btn=document.createElement('button');btn.className='app';
    btn.innerHTML=`<div class="app-ico" style="background:${a.color}"><div class="app-shine"></div><span class="app-sup">KAUSAY</span><span class="app-letra">${a.letra}</span>${a.badge>0?`<span class="app-badge">${a.badge}</span>`:''}</div><span class="app-lbl">${a.lbl}</span><span class="app-cargo">${a.cargo}</span>`;
    btn.onclick=()=>ir(a.url,a.rol,a.nm);
    grid.appendChild(btn);
  });
}

function mostrarGer(){
  const gers=KausayDB.getGerencias();
  document.getElementById('pg-body').innerHTML=gers.map(g=>{
    const ec=g.comp_ven>0?'background:rgba(180,20,20,.25);color:#FF7070':'background:rgba(26,122,69,.25);color:#5AC88A';
    return `<div class="g-card" onclick="abrirGer('${g.cod}','${g.color}','${g.nombre}','${g.jefe}')"><span class="g-dot" style="background:${g.color}"></span><div class="g-n">${g.nombre}</div><div class="g-jefe">${g.jefe}</div><span class="g-est" style="${ec}">${g.comp_ven>0?g.comp_ven+' vencidos':'Al día'}</span></div>`;
  }).join('');
  document.getElementById('panel-ger').classList.add('show');
}
function cerrarGer(){document.getElementById('panel-ger').classList.remove('show');}

function abrirGer(cod,color,nombre,jefe){
  gerActiva={cod,color,jefe,pw:PW[cod]||'kausay2024'};
  const ico=document.getElementById('m-ico');ico.textContent=cod[0];ico.style.background=color;
  document.getElementById('m-n').textContent=nombre;
  document.getElementById('m-j').textContent=jefe;
  document.getElementById('m-ok').style.background=color;
  document.getElementById('pw-inp').value='';
  document.getElementById('pw-err').classList.remove('show');
  document.getElementById('modal-bg').classList.add('show');
  setTimeout(()=>document.getElementById('pw-inp').focus(),120);
}
function cerrarModal(){document.getElementById('modal-bg').classList.remove('show');gerActiva=null;}
function verificarPW(){
  const val=document.getElementById('pw-inp').value;
  if(!gerActiva)return;
  if(val===gerActiva.pw){cerrarModal();cerrarGer();window.location.href=`gerente.html?rol=gerente_sectorial&gerencia=${gerActiva.cod}&nombre=${encodeURIComponent(gerActiva.jefe)}`;}
  else{document.getElementById('pw-err').classList.add('show');document.getElementById('pw-inp').select();}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('modal-bg').classList.contains('show'))verificarPW();if(e.key==='Escape'){cerrarModal();cerrarGer();}});

window.addEventListener('load',()=>{
  const m=KausayDB.getMuni();
  if(m?.nombre)document.getElementById('muni-n').textContent=m.nombre;
  renderEstado();renderDecisiones();renderApps();
  if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
  setTimeout(()=>{document.getElementById('loader').classList.add('hide');setTimeout(()=>{const l=document.getElementById('loader');if(l)l.remove();},500);},700);
});
</script>
</body>
</html>
