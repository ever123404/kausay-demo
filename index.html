<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0F0F12">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Kausay Municipal</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Barlow',sans-serif;background:#0F0F12;overflow:hidden}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FONDO ── */
.bg{position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse at 15% 10%, rgba(176,32,32,.18) 0%,transparent 50%),
    radial-gradient(ellipse at 85% 80%, rgba(24,95,165,.14) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(15,110,86,.08) 0%,transparent 60%),
    #0F0F12}

/* ── LAYOUT ── */
.page{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:env(safe-area-inset-top,20px) 0 env(safe-area-inset-bottom,20px)}

/* ── HEADER ── */
.header{text-align:center;padding:24px 20px 0;animation:fadeUp .6s ease both}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;color:#fff;line-height:1;letter-spacing:.5px}
.logo em{color:#F07070;font-style:normal}
.logo-tag{font-size:10px;color:rgba(255,255,255,.32);text-transform:uppercase;letter-spacing:2px;margin-top:5px}
.muni-nombre{display:inline-block;margin-top:10px;padding:5px 16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:20px;font-size:12px;color:rgba(255,255,255,.6);font-weight:500}

/* ── GRID DE APPS ── */
.apps{flex:1;display:flex;align-items:center;justify-content:center;padding:0 20px;width:100%}
.apps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px 16px;width:100%;max-width:380px}

/* ── ÍCONO DE APP ── */
.app{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;text-decoration:none;-webkit-tap-highlight-color:transparent;animation:fadeUp .5s ease both}
.app:nth-child(1){animation-delay:.05s}
.app:nth-child(2){animation-delay:.1s}
.app:nth-child(3){animation-delay:.15s}
.app:nth-child(4){animation-delay:.2s}
.app:nth-child(5){animation-delay:.25s}
.app:nth-child(6){animation-delay:.3s}

.app-icon{width:76px;height:76px;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;transition:transform .15s;box-shadow:0 4px 24px rgba(0,0,0,.35)}
.app:active .app-icon{transform:scale(.92)}
.app-icon-bg{position:absolute;inset:0;border-radius:18px;opacity:.15}
.app-iniciales{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:1px;margin-bottom:2px}
.app-letra{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;color:#fff;line-height:1}
.app-badge{position:absolute;top:-5px;right:-5px;background:#D42B2B;color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;border:2px solid #0F0F12;display:none}
.app-badge.show{display:block}
.app-label{font-size:12px;font-weight:600;color:#fff;text-align:center;line-height:1.3}
.app-sublabel{font-size:10px;color:rgba(255,255,255,.38);text-align:center;margin-top:1px}

/* App especial: config (más pequeña) */
.app.small .app-icon{width:58px;height:58px;border-radius:14px}
.app.small .app-letra{font-size:24px}
.app.small .app-label{font-size:11px}

/* ── DOCK ── */
.dock{width:100%;max-width:380px;padding:0 20px 8px;animation:fadeUp .6s .3s ease both;opacity:0;animation-fill-mode:forwards}
.dock-inner{background:rgba(255,255,255,.08);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:12px 16px;display:flex;justify-content:space-around;align-items:center}
.dock-btn{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;text-decoration:none;-webkit-tap-highlight-color:transparent}
.dock-btn:active .dock-ico{transform:scale(.9)}
.dock-ico{width:50px;height:50px;border-radius:13px;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.dock-ico-letter{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:#fff}
.dock-lbl{font-size:10px;color:rgba(255,255,255,.5);font-weight:600}

/* ── HORA ── */
.clock{text-align:center;padding:0 0 4px;animation:fadeUp .6s .1s ease both;opacity:0;animation-fill-mode:forwards}
.clock-time{font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:700;color:#fff;line-height:1;letter-spacing:1px}
.clock-date{font-size:12px;color:rgba(255,255,255,.4);margin-top:4px;text-transform:capitalize}

/* ── MODAL DE CONTRASEÑA (para gerentes) ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px)}
.modal-bg.show{display:flex}
.modal{background:#1C1C28;border:1px solid rgba(255,255,255,.13);border-radius:20px;padding:24px 20px;width:100%;max-width:300px}
.modal-hd{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.modal-ico{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:#fff;flex-shrink:0}
.modal-n{font-size:14px;font-weight:700;color:#fff}
.modal-j{font-size:11px;color:rgba(255,255,255,.38);margin-top:1px}
.pw-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;display:block}
.pw-inp{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:10px;padding:11px 14px;font-size:16px;font-family:'Barlow',sans-serif;color:#fff;outline:none;letter-spacing:4px}
.pw-inp:focus{border-color:rgba(255,255,255,.4)}
.pw-inp::placeholder{letter-spacing:0;color:rgba(255,255,255,.22);font-size:13px}
.pw-err{font-size:12px;color:#F07070;margin-top:7px;display:none;font-weight:600}
.pw-err.show{display:block}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.m-ok{flex:1;padding:11px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;color:#fff}
.m-cancel{padding:11px 14px;border-radius:10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.45);font-size:13px;cursor:pointer;font-family:'Barlow',sans-serif}

/* ── LOADING ── */
.loader{position:fixed;inset:0;z-index:200;background:#0F0F12;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .4s}
.loader.hide{opacity:0;pointer-events:none}
.loader-spin{width:28px;height:28px;border:2.5px solid rgba(255,255,255,.15);border-top-color:rgba(255,255,255,.7);border-radius:50%;animation:spin .7s linear infinite}
.loader-txt{font-size:12px;color:rgba(255,255,255,.35)}

@media(min-width:480px){
  .apps-grid{grid-template-columns:repeat(4,1fr);max-width:480px}
  .clock-time{font-size:64px}
}
@media(min-height:800px){
  .header{padding-top:36px}
  .apps-grid{gap:28px 20px}
}
</style>
</head>
<body>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="loader-spin"></div>
  <div class="loader-txt">Kausay Municipal</div>
</div>

<!-- FONDO -->
<div class="bg"></div>

<!-- MODAL CONTRASEÑA GERENTES -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-ico" id="m-ico"></div>
      <div><div class="modal-n" id="m-nombre"></div><div class="modal-j" id="m-jefe"></div></div>
    </div>
    <label class="pw-lbl">Contraseña de acceso</label>
    <input type="password" class="pw-inp" id="pw-inp" placeholder="Ingresa tu contraseña">
    <div class="pw-err" id="pw-err">Contraseña incorrecta</div>
    <div class="modal-btns">
      <button class="m-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="m-ok" id="m-ok" onclick="verificarPW()">Ingresar</button>
    </div>
  </div>
</div>

<!-- PÁGINA PRINCIPAL -->
<div class="page">

  <!-- RELOJ -->
  <div class="clock">
    <div class="clock-time" id="clock-time">--:--</div>
    <div class="clock-date" id="clock-date"></div>
  </div>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">Kausay<em>Alcalde</em></div>
    <div class="logo-tag">Gestión municipal inteligente</div>
    <div class="muni-nombre" id="muni-nombre">Municipalidad Provincial de Cajamarca</div>
  </div>

  <!-- GRID DE APPS -->
  <div class="apps">
    <div class="apps-grid" id="apps-grid"></div>
  </div>

  <!-- DOCK -->
  <div class="dock">
    <div class="dock-inner" id="dock"></div>
  </div>

</div>

<script>
/* ══ CONFIGURACIÓN DE APPS ═══════════════════════════ */
const APPS_MAIN = [
  {
    id: 'alcalde',
    label: 'Alcalde',
    sublabel: 'Sala de mando',
    letra: 'A',
    color: '#B02020',
    url: 'alcalde.html',
    demoRol: 'alcalde',
    demoNombre: 'Roberto Sánchez Quiroz',
    badge: 3,
  },
  {
    id: 'secretaria',
    label: 'Secretaria',
    sublabel: 'Despacho',
    letra: 'S',
    color: '#C8880A',
    url: 'secretaria.html',
    demoRol: 'secretaria',
    demoNombre: 'Carmen Flores Ríos',
    badge: 2,
  },
  {
    id: 'gm',
    label: 'Gte. Municipal',
    sublabel: 'Coordinación',
    letra: 'GM',
    color: '#185FA5',
    url: 'gm.html',
    demoRol: 'gerente_municipal',
    demoNombre: 'Carlos Vásquez Díaz',
    badge: 2,
  },
];

const GERENCIAS = [
  { id:'INFRA',     label:'Infraestructura', sublabel:'Obras y proyectos', letra:'I',  color:'#0F6E56', pw:'infra2024' },
  { id:'RENTAS',    label:'Rentas',           sublabel:'Tributación',       letra:'R',  color:'#185FA5', pw:'rentas2024' },
  { id:'SERVICIOS', label:'Servicios',        sublabel:'Municipales',       letra:'Se', color:'#5C3E8F', pw:'servicios2024' },
  { id:'SOCIAL',    label:'Des. Social',      sublabel:'Programas sociales',letra:'DS', color:'#B5540A', pw:'social2024' },
  { id:'SECRETARIA',label:'Sec. General',     sublabel:'Documentos',        letra:'SG', color:'#4A4A70', pw:'secretaria2024' },
  { id:'PLANIF',    label:'Planeamiento',     sublabel:'Presupuesto',       letra:'P',  color:'#2E6B5E', pw:'planif2024' },
];

const DOCK_ITEMS = [
  { label:'Login',    letra:'→', color:'#1A1D23', url:'login.html',  demoRol:null },
  { label:'Config',   letra:'⚙', color:'#3A3A4A', url:'config.html', demoRol:null },
  { label:'Gerencias',letra:'G', color:'#0F6E56', url:null,          demoRol:null,    isGerencias:true },
];

/* ══ ESTADO ══════════════════════════════════════════ */
let gerenciaActiva = null;
const hoy = new Date().toLocaleDateString('es-PE', { weekday:'long', day:'numeric', month:'long' });

/* ══ RELOJ ═══════════════════════════════════════════ */
function updateClock() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2,'0');
  const m = now.getMinutes().toString().padStart(2,'0');
  document.getElementById('clock-time').textContent = `${h}:${m}`;
  document.getElementById('clock-date').textContent = now.toLocaleDateString('es-PE',{weekday:'long',day:'numeric',month:'long'});
}
updateClock();
setInterval(updateClock, 10000);

/* ══ LEER CONFIG ═════════════════════════════════════ */
function loadConfig() {
  try {
    const raw = localStorage.getItem('kausay_config') || sessionStorage.getItem('kausay_config');
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

/* ══ RENDER APPS ═════════════════════════════════════ */
function buildApps() {
  const cfg = loadConfig();
  if (cfg?.muni_nombre) {
    document.getElementById('muni-nombre').textContent = cfg.muni_nombre;
  }

  const grid = document.getElementById('apps-grid');
  grid.innerHTML = '';

  APPS_MAIN.forEach(app => {
    // Actualizar nombre desde config
    if (cfg) {
      if (app.id === 'alcalde'    && cfg.alcalde_nombre)    app.sublabel = cfg.alcalde_nombre.split(' ').slice(0,2).join(' ');
      if (app.id === 'secretaria' && cfg.secretaria_nombre) app.sublabel = cfg.secretaria_nombre.split(' ').slice(0,2).join(' ');
      if (app.id === 'gm'         && cfg.gm_nombre)         app.sublabel = cfg.gm_nombre.split(' ').slice(0,2).join(' ');
    }
    grid.appendChild(makeAppIcon(app));
  });

  // Dock
  const dock = document.getElementById('dock');
  dock.innerHTML = '';
  DOCK_ITEMS.forEach(item => {
    const btn = document.createElement('div');
    btn.className = 'dock-btn';
    btn.innerHTML = `
      <div class="dock-ico" style="background:${item.color}">
        <span class="dock-ico-letter">${item.letra}</span>
      </div>
      <span class="dock-lbl">${item.label}</span>`;
    btn.onclick = () => {
      if (item.isGerencias) toggleGerencias();
      else if (item.url) window.location.href = item.url;
    };
    dock.appendChild(btn);
  });
}

function abrirApp(app) {
  if (app.demoRol) {
    sessionStorage.setItem('kausay_demo_rol', app.demoRol);
    const cfg = loadConfig();
    let nombre = app.demoNombre || '';
    if (cfg) {
      if (app.demoRol === 'alcalde'           && cfg.alcalde_nombre)    nombre = cfg.alcalde_nombre;
      if (app.demoRol === 'secretaria'        && cfg.secretaria_nombre) nombre = cfg.secretaria_nombre;
      if (app.demoRol === 'gerente_municipal' && cfg.gm_nombre)         nombre = cfg.gm_nombre;
    }
    sessionStorage.setItem('kausay_demo_nombre', nombre);
  }
  if (app.url) window.location.href = app.url;
}

function makeAppIcon(app) {
  const el = document.createElement('a');
  el.className = 'app';
  el.href = 'javascript:void(0)';
  el.innerHTML = `
    <div class="app-icon" style="background:${app.color}">
      <div class="app-icon-bg" style="background:linear-gradient(135deg,rgba(255,255,255,.25) 0%,transparent 60%)"></div>
      <span class="app-iniciales">KAUSAY</span>
      <span class="app-letra">${app.letra}</span>
      ${app.badge ? `<span class="app-badge show">${app.badge}</span>` : ''}
    </div>
    <span class="app-label">${app.label}</span>
    <span class="app-sublabel">${app.sublabel}</span>`;
  el.onclick = e => { e.preventDefault(); abrirApp(app); };
  return el;
}

/* ══ PANEL DE GERENCIAS ══════════════════════════════ */
let gerenciasVisible = false;
function toggleGerencias() {
  if (gerenciasVisible) {
    cerrarGerencias(); return;
  }
  gerenciasVisible = true;
  const grid = document.getElementById('apps-grid');

  // Guardar apps actuales y mostrar gerencias
  grid.style.transition = 'opacity .2s';
  grid.style.opacity = '0';
  setTimeout(() => {
    grid.innerHTML = '';
    const cfg = loadConfig();

    GERENCIAS.forEach((g, i) => {
      const jefeReal = cfg?.gerencias?.find(x => x.cod === g.id)?.jefe || g.sublabel;
      const app = { ...g, url: null, requirePW: true, sublabel: jefeReal.split(' ').slice(0,2).join(' ') || g.sublabel };
      const el = makeAppIcon({ ...app, badge: 0 });
      el.onclick = e => { e.preventDefault(); abrirModalGer(g); };
      grid.appendChild(el);
    });

    // Botón volver
    const back = document.createElement('a');
    back.className = 'app';
    back.href = 'javascript:void(0)';
    back.innerHTML = `<div class="app-icon" style="background:#2A2A3A"><span class="app-letra" style="font-size:20px">←</span></div><span class="app-label">Volver</span><span class="app-sublabel">Menú principal</span>`;
    back.onclick = e => { e.preventDefault(); cerrarGerencias(); };
    grid.appendChild(back);

    grid.style.opacity = '1';
  }, 200);
}

function cerrarGerencias() {
  gerenciasVisible = false;
  const grid = document.getElementById('apps-grid');
  grid.style.opacity = '0';
  setTimeout(() => { buildApps(); grid.style.opacity = '1'; }, 200);
}

/* ══ MODAL CONTRASEÑA ════════════════════════════════ */
function abrirModalGer(g) {
  gerenciaActiva = g;
  const ico = document.getElementById('m-ico');
  ico.textContent = g.letra;
  ico.style.background = g.color;
  const cfg = loadConfig();
  const jefe = cfg?.gerencias?.find(x => x.cod === g.id)?.jefe || '';
  document.getElementById('m-nombre').textContent = g.label;
  document.getElementById('m-jefe').textContent = jefe || 'Gerencia sectorial';
  document.getElementById('m-ok').style.background = g.color;
  document.getElementById('pw-inp').value = '';
  document.getElementById('pw-err').classList.remove('show');
  document.getElementById('modal-bg').classList.add('show');
  setTimeout(() => document.getElementById('pw-inp').focus(), 120);
}
function cerrarModal() {
  document.getElementById('modal-bg').classList.remove('show');
  gerenciaActiva = null;
}
function verificarPW() {
  const val = document.getElementById('pw-inp').value;
  if (!gerenciaActiva) return;
  if (val === gerenciaActiva.pw) {
    const cfg = loadConfig();
    const jefeReal = cfg?.gerencias?.find(x => x.cod === gerenciaActiva.id)?.jefe || gerenciaActiva.label;
    sessionStorage.setItem('kausay_demo_rol', 'gerente_sectorial');
    sessionStorage.setItem('kausay_demo_gerencia', gerenciaActiva.id);
    sessionStorage.setItem('kausay_demo_nombre', jefeReal);
    cerrarModal();
    window.location.href = 'gerente.html';
  } else {
    document.getElementById('pw-err').classList.add('show');
    document.getElementById('pw-inp').select();
  }
}
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('modal-bg').classList.contains('show')) verificarPW();
  if (e.key === 'Escape') { cerrarModal(); if(gerenciasVisible) cerrarGerencias(); }
});

/* ══ UTILS ═══════════════════════════════════════════ */
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

/* ══ ARRANQUE ════════════════════════════════════════ */
window.addEventListener('load', () => {
  buildApps();
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
  setTimeout(() => {
    document.getElementById('loader').classList.add('hide');
    setTimeout(() => document.getElementById('loader').remove(), 400);
  }, 600);
});
</script>
</body>
</html>
