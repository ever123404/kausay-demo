<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#1A1D23">
<meta name="mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="ui-kit.css">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<title>Radar estratégico · Asesoría del Despacho</title>
<style>
/* ── ACENTO ROL: ASESOR (violeta ejecutivo) ── */
:root {
  --ac:     #5C3E8F;
  --ac-bg:  #F2EFF8;
  --ac-brd: rgba(92,62,143,.22);
}

/* ── RADAR CARD ── */
.radar-card {
  background: var(--c-card); border: 1px solid var(--c-borde);
  border-radius: var(--r-lg); padding: var(--sp-md);
  border-left: 4px solid var(--rc, var(--c-gris3));
  animation: fadeUp .3s ease both;
}
.radar-card__hd { display:flex; align-items:center; gap:var(--sp-sm); margin-bottom:8px; }
.radar-card__ico { font-size:20px; flex-shrink:0; }
.radar-card__ttl { font-family:var(--f-cond); font-size:14px; font-weight:700; color:var(--c-negro); flex:1; }
.radar-card__body { font-size:12px; color:var(--c-gris2); line-height:1.55; }
.radar-card__tag  { font-size:9px; font-weight:700; padding:2px 8px; border-radius:8px; white-space:nowrap; }
.radar-card__foot { display:flex; gap:6px; align-items:center; margin-top:9px; flex-wrap:wrap; }

/* ── BRIEFING CARD (1-minuto) ── */
.briefing-card {
  background: linear-gradient(135deg, var(--c-sb) 0%, #1C1F2E 100%);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: var(--r-lg); padding: var(--sp-md); color:#fff;
  animation: fadeUp .3s ease both;
}
.briefing-card__hd   { display:flex; align-items:flex-start; gap:var(--sp-sm); margin-bottom:9px; }
.briefing-card__ico  { font-size:20px; flex-shrink:0; margin-top:1px; }
.briefing-card__ttl  { font-family:var(--f-cond); font-size:14px; font-weight:700; color:#fff; flex:1; line-height:1.3; }
.briefing-card__sev  { font-size:9px; font-weight:700; padding:2px 8px; border-radius:8px; white-space:nowrap; flex-shrink:0; }
.briefing-block {
  background:rgba(255,255,255,.06); border-radius:var(--r-sm);
  padding:8px 10px; margin-bottom:7px; border-left:2px solid rgba(255,255,255,.12);
}
.briefing-block__lbl { font-size:8px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:rgba(255,255,255,.38); margin-bottom:3px; }
.briefing-block__txt { font-size:11px; color:rgba(255,255,255,.82); line-height:1.5; }
.briefing-card__accion { font-size:10px; font-weight:700; color:rgba(255,255,255,.5); font-style:italic; margin-top:4px; }

/* ── POLÍTICO CARD ── */
.pol-card {
  background:var(--c-card); border:1px solid var(--c-borde);
  border-radius:var(--r-md); padding:var(--sp-md);
}
.pol-card__hd   { display:flex; gap:var(--sp-sm); align-items:flex-start; margin-bottom:6px; }
.pol-badge      { display:inline-block; width:10px; height:10px; border-radius:50%; flex-shrink:0; margin-top:3px; }
.pol-card__ttl  { font-size:13px; font-weight:600; color:var(--c-negro); flex:1; line-height:1.35; }
.pol-card__sub  { font-size:11px; color:var(--c-gris3); line-height:1.4; margin-bottom:7px; }
.pol-card__foot { display:flex; gap:6px; flex-wrap:wrap; }

/* ── AGENDA ESTRATÉGICA ── */
.agenda-est {
  display:flex; gap:10px; align-items:flex-start;
  background:var(--c-card); border:1px solid var(--c-borde); border-radius:var(--r-md);
  padding:10px var(--sp-md);
}
.agenda-est__hora { font-family:var(--f-cond); font-size:16px; font-weight:700; color:var(--c-gris2); min-width:42px; line-height:1.2; }
.agenda-est__dur  { font-size:9px; color:var(--c-gris3); display:block; margin-top:2px; }
.agenda-est__bar  { width:3px; border-radius:2px; flex-shrink:0; margin:2px 0; }
.agenda-est__body { flex:1; min-width:0; }
.agenda-est__ttl  { font-size:12px; font-weight:600; color:var(--c-negro); margin-bottom:3px; }
.agenda-est__risk { font-size:11px; font-weight:600; line-height:1.4; }
.agenda-est__tips { font-size:10px; color:var(--c-gris3); margin-top:3px; line-height:1.4; }

/* ── MODAL ESCALAR ── */
.escalar-chip-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:11px; }

/* ── SUMMARY TOP ── */
.asesor-summary {
  background: linear-gradient(135deg, #1A1D23 0%, #252030 100%);
  border: 1px solid rgba(92,62,143,.3);
  border-radius: var(--r-lg); padding: 14px var(--sp-md);
  display:flex; gap:var(--sp-md); align-items:center;
}
.asesor-summary__left  { flex:1; min-width:0; }
.asesor-summary__cargo { font-size:9px; color:rgba(255,255,255,.4); text-transform:uppercase; letter-spacing:1.2px; margin-bottom:3px; }
.asesor-summary__nombre{ font-family:var(--f-cond); font-size:16px; font-weight:700; color:#fff; line-height:1.2; }
.asesor-summary__estado{ font-size:11px; font-weight:600; margin-top:4px; }
.asesor-summary__kpis  { display:flex; gap:10px; flex-shrink:0; }
.a-kpi { text-align:center; min-width:42px; }
.a-kpi__v { font-family:var(--f-cond); font-size:22px; font-weight:700; line-height:1; }
.a-kpi__l { font-size:8px; color:rgba(255,255,255,.38); text-transform:uppercase; letter-spacing:.3px; line-height:1.3; margin-top:2px; }

@media(max-width:680px) {
  .asesor-summary__kpis { display:none; }
}
</style>
</head>
<body>

<!-- LOADER -->
<div class="kk-loader" id="loader">
  <div class="kk-loader__spin"></div>
  <div class="kk-loader__txt">Cargando radar estratégico...</div>
</div>

<!-- MODAL ESCALAR AL ALCALDE -->
<div class="kk-modal-bg" id="modal-escalar">
  <div class="kk-modal">
    <div class="kk-modal__hd">
      <span class="kk-modal__ttl">Escalar tema al alcalde</span>
      <button class="kk-modal__close" onclick="cerrarModal('modal-escalar')">✕</button>
    </div>
    <div class="kk-form-row">
      <label class="kk-form-lbl">Tipo de situación</label>
      <div class="escalar-chip-row" id="escalar-chips">
        <button class="kk-chip-btn sel" data-tipo="riesgo_reputacional">📰 Reputacional</button>
        <button class="kk-chip-btn" data-tipo="obra_critica">🚧 Obra</button>
        <button class="kk-chip-btn" data-tipo="compromiso_politico">🤝 Político</button>
        <button class="kk-chip-btn" data-tipo="alerta_prensa">📣 Prensa</button>
        <button class="kk-chip-btn" data-tipo="urgente">⚡ Urgente</button>
      </div>
    </div>
    <div class="kk-form-row">
      <label class="kk-form-lbl">Descripción del tema <span style="color:var(--c-critico)">*</span></label>
      <textarea class="kk-form-inp kk-form-ta" id="escalar-txt"
        placeholder="Describe la situación, qué puede pasar y qué necesita saber el alcalde ahora..."></textarea>
      <div class="kk-form-err" id="escalar-err">Campo requerido</div>
    </div>
    <div class="kk-form-row">
      <label class="kk-form-lbl">Acción sugerida al alcalde</label>
      <input class="kk-form-inp" id="escalar-accion" placeholder="Qué debe hacer o decidir el alcalde...">
    </div>
    <div class="kk-form-row">
      <label class="kk-form-lbl">Urgencia</label>
      <select class="kk-form-inp kk-form-sel" id="escalar-prio">
        <option value="urgente">🔴 Urgente — antes de su próxima reunión</option>
        <option value="normal" selected>🟡 Hoy, sin interrumpir agenda</option>
        <option value="baja">🟢 Para la revisión diaria</option>
      </select>
    </div>
    <button class="kk-btn kk-btn--primary" style="background:var(--ac)" onclick="enviarEscalamiento()">
      Escalar al alcalde →
    </button>
  </div>
</div>

<!-- TOAST -->
<div class="kk-toast" id="toast"></div>

<!-- APP -->
<div class="kk-app" id="app" style="display:none">

  <!-- SIDEBAR -->
  <div class="kk-sb">
    <div class="kk-sb__head">
      <img class="kk-sb__escudo" src="escudo.png" alt="" onerror="this.style.display='none'">
      <div class="kk-sb__muni" id="sb-muni">Municipalidad</div>
      <div class="kk-sb__tag">Asesoría del Despacho</div>
    </div>
    <div class="kk-sb__nav" id="sb-nav"></div>
    <div class="kk-sb__foot">
      <div class="kk-sb__user">
        <div class="kk-sb__av" id="sb-av">A</div>
        <div>
          <div class="kk-sb__name" id="sb-name">Asesor</div>
          <div class="kk-sb__rol">Asesoría del Despacho</div>
        </div>
        <button class="kk-sb__logout" onclick="logout()">Salir</button>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="kk-main">
    <div class="kk-offline-bar" id="offline-bar">📡 Sin conexión — radar en modo local</div>
    <div class="kk-tb">
      <button class="kk-tb__back" id="tb-back" onclick="nav('radar')">← Menú</button>
      <div class="kk-tb__title" id="tb-title">Radar estratégico</div>
      <div class="kk-tb__clock" id="tb-clock"></div>
      <button class="kk-tb__notif" id="tb-notif">🔔<span class="kk-tb__dot" id="tb-dot" style="display:none"></span></button>
    </div>
    <div class="kk-content" id="content"></div>
    <div class="kk-dock"    id="dock"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="branding.js"></script>
<script src="freshness.js"></script>
<script src="export.js"></script>


<script src="shared.js"></script>
<script>
/* ══ ESTADO ══════════════════════════════════════════ */
let vista = 'radar';
let escalarTipo = 'riesgo_reputacional';

const TIPO_COLORS_AG = { interna:'#8A90A0',campo:'#C8880A',audiencia:'#185FA5',concejo:'#8B1A1A',admin:'#4A5060' };

const NAV_DEF = [
  { sec:'Despacho', items:[
    { id:'radar',     ico:'🎯', lbl:'Radar del día',      badge:()=>contarRiesgos() },
    { id:'briefing',  ico:'📋', lbl:'Briefing ejecutivo', badge:()=>0 },
    { id:'agenda',    ico:'🗓', lbl:'Agenda estratégica', badge:()=>agendaSinBriefing() },
  ]},
  { sec:'Análisis', items:[
    { id:'riesgos',   ico:'⚠️', lbl:'Radar de riesgos',  badge:()=>KausayDB.getAlertasActivas().filter(a=>a.niv==='critico').length },
    { id:'politico',  ico:'🤝', lbl:'Seguimiento político',badge:()=>compromisosSensibles() },
    { id:'escalar',   ico:'🚨', lbl:'Escalar al alcalde', badge:()=>0 },
  ]},
];

const TITULOS = {
  radar:'Radar del día', briefing:'Briefing ejecutivo',
  agenda:'Agenda estratégica', riesgos:'Radar de riesgos',
  politico:'Seguimiento político-estratégico', escalar:'Escalar al alcalde',
};

/* Badges dinámicos */
function contarRiesgos() {
  const r = KausayDB.getResumenEjecutivo();
  return r.alertas_criticas + r.obras_criticas + r.compromisos_ven;
}
function agendaSinBriefing() {
  return KausayDB.getAgenda().filter(a=>a.br&&!a.br_listo).length;
}
function compromisosSensibles() {
  return KausayDB.getCompromisos().filter(c=>c.ven&&c.prioridad==='alta').length;
}

/* ══ NAV ═════════════════════════════════════════════ */
function nav(v) { vista=v; render(); window.scrollTo(0,0); }

function buildNav() {
  const sb=document.getElementById('sb-nav'); if(!sb) return;
  sb.innerHTML='';
  NAV_DEF.forEach(sec=>{
    const s=mk('div','kk-sb__sec'); s.textContent=sec.sec; sb.appendChild(s);
    sec.items.forEach(it=>{
      const el=mk('div','kk-nav-item'+(vista===it.id?' on':''));
      const b=it.badge?.()||0;
      el.innerHTML=`<span class="kk-nav-item__ico">${it.ico}</span><span class="kk-nav-item__lbl">${it.lbl}</span>${b>0?`<span class="kk-nav-badge">${b}</span>`:''}`;
      el.onclick=()=>nav(it.id); sb.appendChild(el);
    });
  });
}

/* ══ RELOJ ═══════════════════════════════════════════ */
function tick() {
  const n=new Date(), el=document.getElementById('tb-clock');
  if(el) el.textContent=`${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')} · ${n.toLocaleDateString('es-PE',{weekday:'short',day:'numeric',month:'short'})}`;
}
tick(); setInterval(tick,15000);

/* ══ RENDER ══════════════════════════════════════════ */
function render() {
  const c=document.getElementById('content'); if(!c) return;
  c.innerHTML='';
  const ttl=document.getElementById('tb-title');
  if(ttl) ttl.textContent=TITULOS[vista]||vista;
  const back=document.getElementById('tb-back');
  if(back) back.style.display=vista==='radar'?'none':'flex';
  const dot=document.getElementById('tb-dot');
  if(dot) dot.style.display=contarRiesgos()>0?'block':'none';
  buildNav(); buildDock();

  if(vista==='radar')    vRadar(c);
  else if(vista==='briefing') vBriefing(c);
  else if(vista==='agenda')   vAgenda(c);
  else if(vista==='riesgos')  vRiesgos(c);
  else if(vista==='politico') vPolitico(c);
  else if(vista==='escalar')  vEscalar(c);
}

/* ══ V1: RADAR DEL DÍA ═══════════════════════════════ */
function vRadar(c) {
  const r     = KausayDB.getResumenEjecutivo();
  const agenda= KausayDB.getAgenda();
  const obras = KausayDB.getObras().filter(o=>['critico','alto'].includes(o.riesgo));
  const comps = KausayDB.getCompromisos().filter(x=>x.ven&&x.prioridad==='alta');
  const alertas= KausayDB.getAlertasActivas().filter(a=>a.niv==='critico');
  const instr  = KausayDB.getInstrucciones().filter(i=>!i.confirmada);
  const nombre = sessionStorage.getItem('kausay_demo_nombre')||'Asesor';

  // Summary card
  const estadoCol = r.estado==='critico'?'var(--c-critico)':r.estado==='alerta'?'var(--c-alerta)':'var(--c-ok)';
  const estadoTxt = r.estado==='critico'?'Gestión con alertas críticas — requiere atención inmediata':r.estado==='alerta'?`${r.alertas_criticas+r.alertas_alerta} situaciones bajo monitoreo activo`:`Municipio estable · ${r.ejec_global}% ejecutado`;

  const sum=mk('div','asesor-summary');
  sum.innerHTML=`
    <div class="asesor-summary__left">
      <div class="asesor-summary__cargo">Asesoría del Despacho</div>
      <div class="asesor-summary__nombre">${nombre}</div>
      <div class="asesor-summary__estado" style="color:${estadoCol}">${estadoTxt}</div>
    </div>
    <div class="asesor-summary__kpis">
      ${[
        {v:agenda.length,      l:'Eventos\nhoy',      c:'rgba(255,255,255,.7)'},
        {v:obras.length,       l:'Obras\ncríticas',   c:obras.length>0?'var(--c-critico)':'var(--c-ok)'},
        {v:comps.length,       l:'Promesas\nsensibles',c:comps.length>0?'var(--c-alerta)':'var(--c-ok)'},
        {v:r.ejec_global+'%',  l:'Ejec.\nglobal',     c:KausayDB.pctColor(r.ejec_global)},
      ].map(k=>`<div class="a-kpi"><div class="a-kpi__v" style="color:${k.c}">${k.v}</div><div class="a-kpi__l">${k.l}</div></div>`).join('')}
    </div>`;
  c.appendChild(sum);

  // Briefings pendientes de preparar
  const sinBriefing = agenda.filter(a=>a.br&&!a.br_listo);
  if(sinBriefing.length) {
    c.appendChild(secHead(`${sinBriefing.length} briefing${sinBriefing.length>1?'s':''}  pendiente${sinBriefing.length>1?'s':''}  de preparar`,'Ir a agenda',()=>nav('agenda')));
    sinBriefing.forEach(a => {
      const col = TIPO_COLORS_AG[a.tipo]||'#8A90A0';
      const card=mk('div','radar-card'); card.style.setProperty('--rc',col);
      card.innerHTML=`
        <div class="radar-card__hd">
          <span class="radar-card__ico">📋</span>
          <span class="radar-card__ttl">${a.titulo}</span>
          <span class="radar-card__tag kk-chip kk-chip--info">${a.hora}</span>
        </div>
        <div class="radar-card__body">El alcalde no tendrá contexto si no se prepara el briefing antes de esta reunión.</div>
        <div class="radar-card__foot">
          <span class="kk-chip kk-chip--neutral">${a.tipo}</span>
          <button class="kk-btn kk-btn--ghost" style="font-size:11px;padding:4px 11px;margin-left:auto" onclick="generarBriefing('${a.id}')">🤖 Generar briefing</button>
        </div>`;
      c.appendChild(card);
    });
  }

  // Radar de riesgos (top 3)
  if(alertas.length || obras.length || comps.length) {
    c.appendChild(secHead('Riesgos que el alcalde debe conocer hoy','Ver radar completo',()=>nav('riesgos')));
    alertas.slice(0,2).forEach(a=>c.appendChild(buildRadarItem(a.ico,'critico',a.titulo,a.desc,'Alertar al alcalde antes de la primera reunión')));
    obras.filter(o=>o.riesgo==='critico').slice(0,1).forEach(o=>c.appendChild(buildRadarItem('🚧','critico',o.nombre,`${o.estado==='paralizada'?'Paralizada '+o.dias_sin_av+'d':o.estado} · ${KausayDB.fmt(o.presup)}`,'Preparar respuesta para prensa si se consulta')));
    comps.slice(0,1).forEach(x=>c.appendChild(buildRadarItem('🤝','alerta',x.desc,`Vencida · Resp: ${x.resp}`,'Verificar si el alcalde tiene respuesta lista')));
  }

  // Instrucciones sin acuse — asesor como supervisor
  if(instr.length) {
    c.appendChild(secHead(`${instr.length} instrucción${instr.length>1?'es':''} sin acuse — seguimiento`,'',null));
    const card=mk('div','kk-item'); card.style.borderLeft='3px solid var(--c-alerta)';
    card.innerHTML=`
      <div class="kk-item__hd"><span class="kk-item__tipo kk-tipo--alerta">Sin respuesta</span></div>
      <div class="kk-item__txt">${instr.slice(0,3).map(i=>`→ ${i.paraLabel}: "${i.contenido.slice(0,60)}..."`).join('<br>')}${instr.length>3?`<br><em>+ ${instr.length-3} más</em>`:''}</div>`;
    c.appendChild(card);
  }

  // Botón escalar
  const btnEscalar=mk('button','kk-btn kk-btn--full');
  btnEscalar.style.cssText='background:var(--ac);color:#fff;font-size:13px;padding:12px;border-radius:10px;margin-top:4px';
  btnEscalar.innerHTML='🚨 Escalar tema urgente al alcalde';
  btnEscalar.onclick=()=>{ abrirModal('modal-escalar'); KausayDB.Telemetry.firstAction(); };
  c.appendChild(btnEscalar);
}

/* ══ V2: BRIEFING EJECUTIVO ══════════════════════════ */
function vBriefing(c) {
  const r     = KausayDB.getResumenEjecutivo();
  const gers  = KausayDB.getGerencias();
  const obras = KausayDB.getObras().filter(o=>['critico','alto'].includes(o.riesgo));
  const pres  = KausayDB.getPresupuesto();
  const agenda= KausayDB.getAgenda();

  c.appendChild(secHead('Tarjetas de briefing — 1 minuto por tema','',null));

  const briefings = [
    // Situación presupuestal
    {
      ico:'💰', sev:'normal', sevLabel:'Presupuestal',
      ttl:`Ejecución al ${pres.pct_global}% — ${KausayDB.pctLabel(pres.pct_global)}`,
      que:`El municipio ha ejecutado ${KausayDB.fmt(pres.ejecutado)} de ${KausayDB.fmt(pres.total)} del presupuesto anual.`,
      importa:`Faltan ${KausayDB.fmt(pres.total-pres.ejecutado)} por ejecutar. ${pres.pct_global<60?'Riesgo de devolución al MEF si no se acelera el devengado.':'Ritmo dentro del rango esperado para el período.'}`,
      accion: pres.pct_global<60?'Solicitar plan de devengado urgente al GM y Planeamiento.':'Mantener seguimiento semanal con el GM.'
    },
    // Obras críticas
    ...(obras.length?[{
      ico:'🚧', sev:'critico', sevLabel:'Infraestructura',
      ttl:`${obras.length} obra${obras.length>1?'s críticas':' crítica'} en semáforo rojo`,
      que:`${obras.map(o=>o.nombre).slice(0,2).join(' · ')}${obras.length>2?` y ${obras.length-2} más`:''}.`,
      importa:`${obras.filter(o=>o.estado==='paralizada').length>0?'Obras paralizadas generan penalidades contractuales y riesgo mediático.':'Obras en riesgo crítico sin avance reciente pueden generar preguntas en sesión de concejo.'}`,
      accion:`El alcalde debe exigir informe urgente al GM. ${obras.some(o=>o.estado==='paralizada')?'Evaluar resolución de contrato de '+obras.find(o=>o.estado==='paralizada')?.contratista+'.':''}`
    }]:[]),
    // Compromisos vencidos
    ...(compromisosSensibles()>0?[{
      ico:'🤝', sev:'alerta', sevLabel:'Compromisos',
      ttl:`${compromisosSensibles()} promesa${compromisosSensibles()>1?'s':''}  de alta prioridad sin cumplir`,
      que:`Compromisos adquiridos con comunidades o el concejo que ya superaron su fecha límite sin respuesta oficial.`,
      importa:'Los compromisos vencidos con actores clave pueden generar reacciones políticas, notas de prensa o interpelaciones en sesión.',
      accion:'Verificar estado real con los responsables antes de cualquier reunión pública. Preparar respuesta institucional si hay consulta.'
    }]:[]),
    // Plazos normativos
    ...(r.plazos_criticos>0?[{
      ico:'⏰', sev:'critico', sevLabel:'Normativo',
      ttl:`${r.plazos_criticos} plazo${r.plazos_criticos>1?'s normativos críticos':' normativo crítico'}`,
      que:`Sistemas MEF o Invierte.pe con plazos en menos de 15 días. Incumplimiento implica sanción administrativa o devolución de fondos.`,
      importa:'El alcalde es el responsable legal ante la Contraloría. El incumplimiento queda en su hoja de vida funcional.',
      accion:`Exigir plan de acción al GM con fecha de cumplimiento. Seguimiento diario hasta el cierre.`
    }]:[]),
    // Agenda del día
    ...(agenda.length?[{
      ico:'🗓', sev:'info', sevLabel:'Agenda',
      ttl:`${agenda.length} evento${agenda.length>1?'s':''} en agenda hoy`,
      que:`${agenda.map(a=>a.hora+' '+a.titulo).join(' · ')}`,
      importa:'Las reuniones con comunidades o el concejo son de alto impacto reputacional. El alcalde debe llegar con contexto.',
      accion:'Revisar briefings preparados. Reunión de concejo requiere conocer todos los acuerdos previos relevantes.'
    }]:[]),
  ];

  briefings.forEach((b,i) => {
    const card=mk('div','briefing-card');
    card.style.animationDelay=i*.06+'s';
    const sevCls = b.sev==='critico'?'kk-chip--critico':b.sev==='alerta'?'kk-chip--alerta':b.sev==='normal'?'kk-chip--ok':'kk-chip--info';
    card.innerHTML=`
      <div class="briefing-card__hd">
        <span class="briefing-card__ico">${b.ico}</span>
        <span class="briefing-card__ttl">${b.ttl}</span>
        <span class="briefing-card__sev kk-chip ${sevCls}">${b.sevLabel}</span>
      </div>
      <div class="briefing-block"><div class="briefing-block__lbl">¿Qué pasó?</div><div class="briefing-block__txt">${b.que}</div></div>
      <div class="briefing-block"><div class="briefing-block__lbl">¿Por qué importa?</div><div class="briefing-block__txt">${b.importa}</div></div>
      <div class="briefing-card__accion">💡 Acción sugerida: ${b.accion}</div>`;
    c.appendChild(card);
  });

  if(!briefings.length) c.appendChild(emptyState('✅','Sin temas críticos para briefing','El municipio está dentro de parámetros normales hoy.'));
}

/* ══ V3: AGENDA ESTRATÉGICA ══════════════════════════ */
function vAgenda(c) {
  const agenda = KausayDB.getAgenda();
  const RIESGO_AG = {
    concejo:   { txt:'Riesgo alto — regidores pueden preguntar sobre obras, presupuesto o compromisos incumplidos.', col:'var(--c-critico)' },
    audiencia: { txt:'Riesgo medio — ciudadano o representante espera respuesta concreta.', col:'var(--c-alerta)' },
    campo:     { txt:'Riesgo bajo-medio — visita de supervisión puede generar compromisos informales.', col:'var(--c-alerta)' },
    interna:   { txt:'Sin riesgo externo.', col:'var(--c-gris3)' },
    admin:     { txt:'Sin riesgo externo.', col:'var(--c-gris3)' },
  };

  if(!agenda.length) { c.appendChild(emptyState('🗓','Agenda vacía','No hay eventos cargados para hoy.')); return; }

  c.appendChild(secHead('Agenda del alcalde — análisis estratégico','',null));
  agenda.forEach(a => {
    const rk = RIESGO_AG[a.tipo] || RIESGO_AG.interna;
    const col = TIPO_COLORS_AG[a.tipo]||'#8A90A0';
    const card=mk('div','agenda-est');
    card.innerHTML=`
      <div>
        <div class="agenda-est__hora">${a.hora}<span class="agenda-est__dur">${a.dur}</span></div>
      </div>
      <div class="agenda-est__bar" style="background:${col}"></div>
      <div class="agenda-est__body">
        <div class="agenda-est__ttl">${a.titulo}</div>
        <div class="agenda-est__risk" style="color:${rk.col}">${rk.txt}</div>
        ${a.lugar?`<div class="agenda-est__tips">📍 ${a.lugar}</div>`:''}
        ${a.br&&!a.br_listo?`<div class="agenda-est__tips" style="color:var(--c-alerta)">⚠ Briefing pendiente</div>`:''}
        ${a.br&&a.br_listo?`<div class="agenda-est__tips" style="color:var(--c-ok)">✓ Briefing listo</div>`:''}
        ${a.br&&!a.br_listo?`<button class="kk-btn kk-btn--ghost" style="font-size:11px;padding:5px 10px;margin-top:6px" onclick="generarBriefing('${a.id}')">🤖 Generar briefing</button>`:''}
      </div>`;
    c.appendChild(card);
  });
}

/* ══ V4: RADAR DE RIESGOS ════════════════════════════ */
function vRiesgos(c) {
  const alertas   = KausayDB.getAlertas();
  const obras     = KausayDB.getObras();
  const comps     = KausayDB.getCompromisos();
  const plazos    = KausayDB.getPlazos();
  const gers      = KausayDB.getGerenciasResumen?.() || KausayDB.getGerencias();

  // Gerencias en rojo
  const gersCrit = gers.filter(g=>(g.estado_semaforo||'normal')==='critico'||(g.pct_ejecucion||g.ejec||0)<45);
  if(gersCrit.length) {
    c.appendChild(secHead(`Gerencias en alerta crítica (${gersCrit.length})`,'',null));
    gersCrit.forEach(g => {
      const pct = g.pct_ejecucion||g.ejec||0;
      const card=mk('div','radar-card'); card.style.setProperty('--rc','var(--c-critico)');
      card.innerHTML=`
        <div class="radar-card__hd">
          <span class="radar-card__ico">🏢</span>
          <span class="radar-card__ttl">${g.nombre}</span>
          <span class="radar-card__tag kk-chip kk-chip--critico">${pct}% ejec.</span>
        </div>
        <div class="radar-card__body">${g.jefe||g.jefe_nombre||'—'} · ${g.obras_criticas||0} obras críticas · ${g.compromisos_vencidos||0} compromisos vencidos</div>
        <div class="radar-card__foot">
          <button class="kk-btn kk-btn--danger" style="font-size:11px;padding:4px 11px" onclick="escalarGerencia('${g.nombre}')">Escalar al alcalde</button>
        </div>`;
      c.appendChild(card);
    });
  }

  // Obras paralizadas
  const obrasParalizadas = obras.filter(o=>o.estado==='paralizada'||o.riesgo==='critico');
  if(obrasParalizadas.length) {
    c.appendChild(secHead('Obras con potencial mediático','',null));
    obrasParalizadas.forEach(o=>c.appendChild(buildRadarItem('🚧','critico',o.nombre,`${o.estado==='paralizada'?'Paralizada '+o.dias_sin_av+'d':'Riesgo crítico'} · ${KausayDB.fmt(o.presup)}`,'Verificar si hay queja ciudadana o atención de prensa')));
  }

  // Compromisos sensibles
  const compSens = comps.filter(c=>c.ven&&c.prioridad==='alta');
  if(compSens.length) {
    c.appendChild(secHead('Compromisos políticamente sensibles','',null));
    compSens.forEach(x=>c.appendChild(buildRadarItem('🤝','alerta',x.desc,`Vencido · ${x.resp} · ${x.fec}`,'Verificar estado real y preparar respuesta ante consulta')));
  }

  // Plazos normativos
  const plazCrit = plazos.filter(p=>p.niv==='critico');
  if(plazCrit.length) {
    c.appendChild(secHead('Plazos normativos críticos','',null));
    plazCrit.forEach(p => {
      const item=mk('div','kk-plazo'); item.style.setProperty('--plazo-color','var(--c-critico)');
      item.innerHTML=`<div><div class="kk-plazo__dias" style="color:var(--c-critico)">${p.dias}</div><div class="kk-plazo__d">días</div></div><div class="kk-plazo__sep"></div><div class="kk-plazo__body"><div class="kk-plazo__sis">${p.sistema}</div><div class="kk-plazo__desc">${p.desc}</div><div class="kk-plazo__resp">Resp: <strong>${p.resp}</strong></div></div>`;
      c.appendChild(item);
    });
  }

  if(!gersCrit.length&&!obrasParalizadas.length&&!compSens.length&&!plazCrit.length) {
    c.appendChild(emptyState('✅','Sin riesgos críticos en el radar','El municipio está dentro de parámetros aceptables.'));
  }
}

/* ══ V5: SEGUIMIENTO POLÍTICO ════════════════════════ */
function vPolitico(c) {
  const comps = KausayDB.getCompromisos();
  const obras = KausayDB.getObras();
  const gers  = KausayDB.getGerencias();

  c.appendChild(secHead('Promesas de gestión y compromisos políticos','',null));

  // Por tipo de origen
  const deCampo   = comps.filter(x=>x.origen==='campo');
  const deConcejo = comps.filter(x=>x.origen==='concejo');
  const obrasVis  = obras.filter(o=>o.presup>=500000); // obras de alto impacto visible

  if(deCampo.length) {
    c.appendChild(secHead(`Promesas de campo (${deCampo.length})`,'',null));
    deCampo.forEach(x=>c.appendChild(renderPolitico(x)));
  }
  if(deConcejo.length) {
    c.appendChild(secHead(`Compromisos del concejo (${deConcejo.length})`,'',null));
    deConcejo.forEach(x=>c.appendChild(renderPolitico(x)));
  }
  if(obrasVis.length) {
    c.appendChild(secHead('Obras de alto impacto visible','',null));
    obrasVis.forEach(o => {
      const col = KausayDB.riesgoColor(o.riesgo);
      const card=mk('div','pol-card');
      card.innerHTML=`
        <div class="pol-card__hd">
          <span class="pol-badge" style="background:${col}"></span>
          <div class="pol-card__ttl">${o.nombre}</div>
          <span class="kk-chip ${o.riesgo==='critico'?'kk-chip--critico':o.riesgo==='alto'?'kk-chip--alerta':'kk-chip--ok'}">${o.riesgo}</span>
        </div>
        <div class="pol-card__sub">${KausayDB.fmt(o.presup)} · ${o.pct}% avance · Fin: ${o.fin}</div>
        <div class="pol-card__foot">
          <span class="kk-chip kk-chip--neutral">${o.ger}</span>
          ${o.riesgo==='critico'?'<span class="kk-chip kk-chip--critico">Requiere respuesta pública</span>':''}
        </div>`;
      c.appendChild(card);
    });
  }

  if(!deCampo.length&&!deConcejo.length&&!obrasVis.length) {
    c.appendChild(emptyState('🤝','Sin compromisos de alto impacto','Los compromisos registrados están al día.'));
  }
}

/* ══ V6: ESCALAR AL ALCALDE ══════════════════════════ */
function vEscalar(c) {
  c.appendChild(secHead('Escalar tema urgente al alcalde','',null));

  // Instrucciones recientes emitidas como contexto
  const recientes = KausayDB.getInstrucciones().filter(i=>i.de==='alcalde').slice(0,3);
  if(recientes.length) {
    c.appendChild(secHead('Últimas instrucciones del alcalde (contexto)','',null));
    recientes.forEach(i => {
      const card=mk('div','kk-item');
      card.innerHTML=`
        <div class="kk-item__hd">
          <span class="kk-item__tipo kk-tipo--${i.tipo}">${i.tipo}</span>
          <span class="kk-item__meta">→ ${i.paraLabel}</span>
          <span class="kk-item__ts">${i.hora}</span>
          <span class="kk-item__estado ${i.confirmada?'kk-estado--ok':'kk-estado--pend'}">${i.confirmada?'✓':'⏳'}</span>
        </div>
        <div class="kk-item__txt">${i.contenido.slice(0,100)}${i.contenido.length>100?'...':''}</div>`;
      c.appendChild(card);
    });
  }

  const btn=mk('button','kk-btn kk-btn--full');
  btn.style.cssText='background:var(--ac);color:#fff;font-size:14px;padding:14px;border-radius:11px;margin-top:8px';
  btn.innerHTML='🚨 Escalar tema nuevo al alcalde →';
  btn.onclick=()=>{ abrirModal('modal-escalar'); KausayDB.Telemetry.firstAction(); };
  c.appendChild(btn);
}

/* ══ RENDERERS ═══════════════════════════════════════ */
function buildRadarItem(ico, niv, ttl, desc, accion) {
  const col = niv==='critico'?'var(--c-critico)':niv==='alerta'?'var(--c-alerta)':'var(--c-info)';
  const cls = niv==='critico'?'kk-chip--critico':niv==='alerta'?'kk-chip--alerta':'kk-chip--info';
  const card=mk('div','radar-card'); card.style.setProperty('--rc',col);
  card.innerHTML=`
    <div class="radar-card__hd">
      <span class="radar-card__ico">${ico}</span>
      <span class="radar-card__ttl">${ttl}</span>
      <span class="radar-card__tag kk-chip ${cls}">${niv}</span>
    </div>
    <div class="radar-card__body">${desc}</div>
    ${accion?`<div class="radar-card__foot"><span style="font-size:10px;color:var(--ac);font-weight:600">💡 ${accion}</span></div>`:''}`;
  return card;
}

function renderPolitico(x) {
  const col = x.ven||x.estado==='vencido'?'var(--c-critico)':x.estado==='en_proceso'?'var(--c-info)':'var(--c-alerta)';
  const card=mk('div','pol-card');
  card.innerHTML=`
    <div class="pol-card__hd">
      <span class="pol-badge" style="background:${col}"></span>
      <div class="pol-card__ttl">${x.desc}</div>
      <span class="kk-chip ${x.ven?'kk-chip--critico':x.estado==='en_proceso'?'kk-chip--ok':'kk-chip--alerta'}">${x.estado}</span>
    </div>
    <div class="pol-card__sub">Origen: ${x.origen_ref||x.origen} · Resp: ${x.resp} · Fecha: ${x.fec}</div>
    <div class="pol-card__foot">
      ${x.prioridad==='alta'?'<span class="kk-chip kk-chip--critico">Alta prioridad</span>':''}
      ${x.ven?'<span class="kk-chip kk-chip--critico">Vencido</span>':''}
    </div>`;
  return card;
}

/* ══ DOCK ════════════════════════════════════════════ */
function buildDock() {
  const dock=document.getElementById('dock'); if(!dock) return;
  const items=[
    {ico:'🚨',lbl:'Escalar\nal alcalde',fn:()=>{abrirModal('modal-escalar');KausayDB.Telemetry.firstAction();},primary:true},
    {ico:'📋',lbl:'Briefing\nejecutivo',fn:()=>nav('briefing')},
    {ico:'⚠️',lbl:'Radar\nriesgos',    fn:()=>nav('riesgos')},
    {ico:'🗓',lbl:'Agenda\nestratégica',fn:()=>nav('agenda')},
    {ico:'🤝',lbl:'Seguimiento\npolítico',fn:()=>nav('politico')},
  ];
  dock.innerHTML='';
  items.forEach(it=>{
    const btn=mk('button','kk-dock-btn'+(it.primary?' kk-dock-btn--primary':''));
    btn.innerHTML=`<span class="kk-dock-btn__ico">${it.ico}</span><span class="kk-dock-btn__lbl">${it.lbl}</span>`;
    btn.onclick=it.fn; dock.appendChild(btn);
  });
}

/* ══ ACCIONES ════════════════════════════════════════ */
async function enviarEscalamiento() {
  const txt    = document.getElementById('escalar-txt')?.value.trim();
  const accion = document.getElementById('escalar-accion')?.value.trim();
  const prio   = document.getElementById('escalar-prio')?.value;
  if(!txt){ document.getElementById('escalar-err').classList.add('show'); return; }
  document.getElementById('escalar-err').classList.remove('show');

  // Reauth para escalamiento sensible
  const ok = await KausayAuth.reauth('Escalar tema sensible al alcalde');
  if(!ok){ toast('⚠ Verificación cancelada'); return; }

  const contenido = `[ASESORÍA DESPACHO] ${escalarTipo.toUpperCase()}: ${txt}${accion?'\n\nACCIÓN SUGERIDA: '+accion:''}`;
  KausayDB.addInstruccion({
    tipo:'alerta', para:'alcalde', paraLabel:'Alcalde',
    contenido, prioridad:prio,
  });
  KausayDB.Audit.emit('escalamiento','asesor','Asesor→Alcalde','create',null,{tipo:escalarTipo,prio});

  document.getElementById('escalar-txt').value='';
  document.getElementById('escalar-accion').value='';
  cerrarModal('modal-escalar');
  toast('✓ Tema escalado al alcalde');
  nav('radar');
}

function escalarGerencia(nombre) {
  document.getElementById('escalar-txt').value=`Gerencia ${nombre} presenta riesgo crítico de ejecución. Requiere intervención directa del alcalde.`;
  document.getElementById('escalar-accion').value='Citar urgente al gerente y exigir plan de recuperación en 48h.';
  abrirModal('modal-escalar');
}

function generarBriefing(agendaId) {
  KausayDB.Telemetry.briefingAbierto();
  toast('🤖 Briefing generado. En Etapa 5: Claude API generará análisis completo.');
  // Etapa 5: llamar Claude API con contexto de la reunión
}

document.querySelectorAll('#escalar-chips .kk-chip-btn').forEach(btn=>{

/* ══ MODALES ═════════════════════════════════════════ */
function abrirModal(id){ document.getElementById(id)?.classList.add('show'); }
function cerrarModal(id){ document.getElementById(id)?.classList.remove('show'); }

/* ══ HELPERS ═════════════════════════════════════════ */
function mk(tag,cls){ const el=document.createElement(tag); if(cls) el.className=cls; return el; }
function secHead(ttl,lnkTxt,lnkFn){
  const hd=mk('div','kk-sec-hd');
  hd.innerHTML=`<span class="kk-sec-ttl">${ttl}</span>`;
  if(lnkTxt&&lnkFn){const btn=mk('button','kk-sec-lnk');btn.textContent=lnkTxt;btn.onclick=lnkFn;hd.appendChild(btn);}
  return hd;
}
function emptyState(ico,ttl,desc){
  const el=mk('div','kk-empty');
  el.innerHTML=`<div class="kk-empty__ico">${ico}</div><div class="kk-empty__ttl">${ttl}</div><div class="kk-empty__desc">${desc}</div>`;
  return el;
}
function toast(msg,dur=2800){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

/* ══ OFFLINE ═════════════════════════════════════════ */
function updateOnlineStatus(){
  const bar=document.getElementById('offline-bar');
  if(bar) bar.classList.toggle('show',!navigator.onLine);
}
window.addEventListener('online',()=>{ updateOnlineStatus(); toast('✓ Conexión restaurada'); });
window.addEventListener('offline', updateOnlineStatus);
function logout(){ KausayAuth.logout(); }

/* ══ INIT ════════════════════════════════════════════ */
window.addEventListener('load',()=>{
  KausayAuth.requireAuth(['asesor_despacho','alcalde','soporte_kausay']);
  const _sess = KausayAuth.getSession();

  KausayBranding.apply({ rol: _sess?.rol || 'asesor_despacho' });

  const muni   = KausayDB.getMuni();
  const nombre = sessionStorage.getItem('kausay_demo_nombre') || 'Asesor del Despacho';
  const ini    = nombre.split(' ').slice(0,2).map(p=>p[0]).join('').toUpperCase();

  document.getElementById('sb-muni').textContent = muni.nombre||'Municipalidad';
  document.getElementById('sb-av').textContent   = ini;
  document.getElementById('sb-name').textContent = nombre;

  updateOnlineStatus();

  // EventBus
  KausayDB.EventBus.on('instruccion:nueva',    ()=>render());
  KausayDB.EventBus.on('alerta:nueva',         ()=>render());
  KausayDB.EventBus.on('obra:avance',          ()=>render());
  KausayDB.EventBus.on('compromiso:nuevo',     ()=>render());
  KausayDB.EventBus.on('wq:conflict',          ()=>render());
  KausayDB.EventBus.on('remote:instruccion:nueva',()=>render());
  KausayDB.EventBus.on('muni:updated',         ()=>render());

  // Realtime
  KausayDB.subscribeRealtime('instrucciones', payload=>{
    KausayDB.Cache.invalidate('instrucciones');
    KausayDB.EventBus.emit('instruccion:nueva', payload.new);
    render();
  });
  KausayDB.subscribeRealtime('alertas', payload=>{
    KausayDB.Cache.invalidate('alertas');
    KausayDB.EventBus.emit('alerta:nueva', payload.new);
    render();
  });
  if(KausayDB.CONFIG.USE_SUPABASE) KausayDB.loadInitialData().then(()=>render());

  document.getElementById('loader').classList.add('gone');
  document.getElementById('app').style.display='flex';
  render();

  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
  KausayFreshness.autoMount();
  KausayExport.renderExportBtn('kk-fresh-wrap', ["instrucciones", "compromisos", "obras", "alertas"]);
  setTimeout(()=>document.getElementById('loader').remove(),500);
});
</script>
