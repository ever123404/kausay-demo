<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0F6E56">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest-gerente.json">
<link rel="apple-touch-icon" href="icons/icon-gerente-192.png">
<title>Panel Sectorial · Gerente</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="ui-kit.css">
<style>
/* ── ACENTO ROL: dinámico según gerencia ── */
:root {
  --ac:     #0F6E56;
  --ac-bg:  #EEF8F3;
  --ac-brd: rgba(15, 110, 86, .22);
}

/* ── RESUMEN SECTORIAL ── */
.sec-summary {
  border-radius: var(--r-lg); padding: 13px var(--sp-md);
  display: flex; gap: var(--sp-md); align-items: center;
}
.sec-summary__left   { flex: 1; min-width: 0; }
.sec-summary__area   { font-size: 9px; color: rgba(255,255,255,.45); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
.sec-summary__nombre { font-family: var(--f-cond); font-size: 16px; font-weight: 700; color: #fff; line-height: 1.25; margin-top: 2px; }
.sec-summary__estado { font-size: 11px; font-weight: 600; margin-top: 4px; }
.sec-summary__kpis   { display: flex; gap: 10px; flex-shrink: 0; }
.sec-kpi             { text-align: center; min-width: 44px; }
.sec-kpi__v          { font-family: var(--f-cond); font-size: 22px; font-weight: 700; line-height: 1; }
.sec-kpi__l          { font-size: 8px; color: rgba(255,255,255,.4); text-transform: uppercase; letter-spacing: .3px; line-height: 1.3; margin-top: 2px; }

/* ── OBRA OPERATIVA (con update inline) ── */
.obra-op {
  background: var(--c-card); border: 1px solid var(--c-borde);
  border-left: 3px solid var(--oc, var(--c-gris3));
  border-radius: var(--r-md); padding: var(--sp-md);
}
.obra-op__hd   { display: flex; align-items: flex-start; gap: var(--sp-sm); margin-bottom: 8px; }
.obra-op__nombre{ font-size: 13px; font-weight: 600; color: var(--c-negro); flex: 1; line-height: 1.35; }
.obra-op__meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
.obra-op__info { font-size: 10px; color: var(--c-gris3); }
.obra-op__pct-row {
  display: flex; gap: 8px; align-items: center; margin-bottom: 8px;
}
.obra-op__pct-big {
  font-family: var(--f-cond); font-size: 32px; font-weight: 800; line-height: 1; flex-shrink: 0;
}
.obra-op__bar-col { flex: 1; }
.obra-op__upd  { display: flex; gap: 7px; padding-top: 9px; border-top: 1px solid var(--c-borde); }
.obra-op__inp  {
  flex: 1; border: 1.5px solid var(--c-borde); border-radius: var(--r-sm);
  padding: 6px 10px; font-size: 13px; font-family: var(--f-sans);
  color: var(--c-negro); outline: none;
}
.obra-op__inp:focus { border-color: var(--ac); }
.obra-op__obs  {
  width: 100%; border: 1.5px solid var(--c-borde); border-radius: var(--r-sm);
  padding: 6px 10px; font-size: 12px; font-family: var(--f-sans);
  color: var(--c-negro); outline: none; resize: none; margin-top: 6px;
}
.obra-op__obs:focus { border-color: var(--ac); }
.obra-op__acts { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 7px; }

/* ── COMP. SECTORIAL ── */
.comp-sec {
  background: var(--c-card); border: 1px solid var(--c-borde);
  border-radius: var(--r-md); padding: var(--sp-md);
}
.comp-sec__hd   { display: flex; align-items: center; gap: var(--sp-sm); margin-bottom: 6px; flex-wrap: wrap; }
.comp-sec__desc { font-size: 12px; font-weight: 500; color: var(--c-negro); line-height: 1.45; margin-bottom: 7px; }
.comp-sec__foot { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.comp-sec__evidencia {
  width: 100%; margin-top: 8px; border: 1.5px solid var(--c-borde);
  border-radius: var(--r-sm); padding: 7px 10px; font-size: 12px;
  font-family: var(--f-sans); color: var(--c-negro); outline: none; resize: none;
}
.comp-sec__evidencia:focus { border-color: var(--ac); }

/* ── KPI SECTORIAL ── */
.kpi-sec {
  background: var(--c-card); border: 1px solid var(--c-borde);
  border-radius: var(--r-md); padding: var(--sp-md);
  display: flex; align-items: center; gap: var(--sp-md);
}
.kpi-sec__left { flex: 1; min-width: 0; }
.kpi-sec__nombre{ font-size: 12px; font-weight: 600; color: var(--c-negro); margin-bottom: 4px; }
.kpi-sec__bar  { margin-bottom: 4px; }
.kpi-sec__meta { font-size: 10px; color: var(--c-gris3); }
.kpi-sec__right{ text-align: right; flex-shrink: 0; min-width: 70px; }
.kpi-sec__val  { font-family: var(--f-cond); font-size: 28px; font-weight: 800; line-height: 1; }
.kpi-sec__meta2{ font-size: 10px; color: var(--c-gris3); margin-top: 2px; }

/* ── ESCALAR AL GM ── */
.escalar-gm {
  background: var(--c-critico-bg); border: 1px solid var(--c-critico-brd);
  border-radius: var(--r-lg); padding: var(--sp-md);
}
.escalar-gm__hd  { display: flex; align-items: center; gap: var(--sp-sm); margin-bottom: 7px; }
.escalar-gm__ico { font-size: 20px; flex-shrink: 0; }
.escalar-gm__ttl { font-size: 13px; font-weight: 700; color: var(--c-critico); }
.escalar-gm__desc{ font-size: 11px; color: var(--c-gris2); line-height: 1.4; margin-bottom: 9px; }

/* ── MODAL RESPONDER ── */
.resp-ctx {
  background: var(--c-bg); border-radius: var(--r-sm);
  padding: 9px 11px; font-size: 11px; color: var(--c-gris2);
  line-height: 1.5; margin-bottom: 11px; border-left: 3px solid var(--ac);
}

@media(max-width:680px) {
  .sec-summary__kpis { display: none; }
  .obra-op__pct-row  { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<!-- LOADER -->
<div class="kk-loader" id="loader">
  <div class="kk-loader__spin"></div>
  <div class="kk-loader__txt">Panel sectorial</div>
</div>

<!-- MODAL: RESPONDER INSTRUCCIÓN -->
<div class="kk-modal-bg" id="modal-resp">
  <div class="kk-modal">
    <div class="kk-modal__hd">
      <span class="kk-modal__ttl">Responder instrucción</span>
      <button class="kk-modal__close" onclick="cerrarModal('modal-resp')">✕</button>
    </div>
    <div class="resp-ctx" id="resp-ctx">Cargando instrucción...</div>
    <div class="kk-form-row">
      <label class="kk-form-lbl">Tu respuesta <span style="color:var(--c-critico)">*</span></label>
      <textarea class="kk-form-inp kk-form-ta" id="resp-txt" placeholder="Informa el estado, avance, acción tomada o consulta..."></textarea>
      <div class="kk-form-err" id="resp-err">Campo requerido</div>
    </div>
    <button class="kk-btn kk-btn--primary" onclick="enviarRespuesta()">Enviar respuesta →</button>
  </div>
</div>

<!-- MODAL: REGISTRAR COMPROMISO -->
<div class="kk-modal-bg" id="modal-comp">
  <div class="kk-modal">
    <div class="kk-modal__hd">
      <span class="kk-modal__ttl">Registrar compromiso</span>
      <button class="kk-modal__close" onclick="cerrarModal('modal-comp')">✕</button>
    </div>
    <div class="kk-form-row">
      <label class="kk-form-lbl">Descripción <span style="color:var(--c-critico)">*</span></label>
      <input class="kk-form-inp" id="comp-desc" placeholder="¿Qué compromiso se registra?">
    </div>
    <div class="kk-form-2">
      <div class="kk-form-row">
        <label class="kk-form-lbl">Origen</label>
        <select class="kk-form-inp kk-form-sel" id="comp-origen">
          <option value="instruccion">Instrucción</option>
          <option value="reunion">Reunión</option>
          <option value="campo">Campo</option>
          <option value="otro">Otro</option>
        </select>
      </div>
      <div class="kk-form-row">
        <label class="kk-form-lbl">Fecha límite</label>
        <input class="kk-form-inp" type="date" id="comp-fec">
      </div>
    </div>
    <div class="kk-form-row">
      <label class="kk-form-lbl">Prioridad</label>
      <select class="kk-form-inp kk-form-sel" id="comp-prio">
        <option value="alta">🔴 Alta</option>
        <option value="media" selected>🟡 Media</option>
        <option value="baja">🟢 Baja</option>
      </select>
    </div>
    <button class="kk-btn kk-btn--primary" onclick="guardarCompromiso()">Registrar →</button>
  </div>
</div>

<!-- MODAL: ESCALAR AL GM -->
<div class="kk-modal-bg" id="modal-escalar">
  <div class="kk-modal">
    <div class="kk-modal__hd">
      <span class="kk-modal__ttl">Escalar al Gerente Municipal</span>
      <button class="kk-modal__close" onclick="cerrarModal('modal-escalar')">✕</button>
    </div>
    <div class="kk-form-row">
      <label class="kk-form-lbl">Tipo de situación</label>
      <div class="kk-chips" id="escalar-chips">
        <button class="kk-chip-btn sel" data-tipo="obra_paralizada">🚧 Obra</button>
        <button class="kk-chip-btn" data-tipo="presupuesto">💰 Presupuesto</button>
        <button class="kk-chip-btn" data-tipo="bloqueo">🔒 Bloqueo</button>
        <button class="kk-chip-btn" data-tipo="plazo">⏰ Plazo</button>
      </div>
    </div>
    <div class="kk-form-row">
      <label class="kk-form-lbl">Descripción del problema <span style="color:var(--c-critico)">*</span></label>
      <textarea class="kk-form-inp kk-form-ta" id="escalar-txt" placeholder="Describe el problema, qué intentaste y qué necesitas del GM..."></textarea>
      <div class="kk-form-err" id="escalar-err">Campo requerido</div>
    </div>
    <button class="kk-btn kk-btn--danger kk-btn--full" style="margin-top:4px" onclick="enviarEscalamiento()">🚨 Escalar al GM →</button>
  </div>
</div>

<!-- TOAST -->
<div class="kk-toast" id="toast"></div>

<!-- APP -->
<div class="kk-app" id="app" style="display:none">

  <!-- SIDEBAR -->
  <div class="kk-sb">
    <div class="kk-sb__head">
      <img class="kk-sb__escudo" src="escudo.png" alt="Escudo" onerror="this.style.display='none'">
      <div class="kk-sb__muni" id="sb-muni">Municipalidad Provincial de Cajamarca</div>
      <div class="kk-sb__tag" id="sb-tag">Panel sectorial</div>
    </div>
    <div class="kk-sb__nav" id="sb-nav"></div>
    <div class="kk-sb__foot">
      <div class="kk-sb__user">
        <div class="kk-sb__av" id="sb-av">G</div>
        <div>
          <div class="kk-sb__name" id="sb-name">Gerente</div>
          <div class="kk-sb__rol" id="sb-rol">Gerencia sectorial</div>
        </div>
        <button class="kk-sb__logout" onclick="logout()">Salir</button>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="kk-main">
    <div class="kk-offline-bar" id="offline-bar">📡 Sin conexión — los cambios se guardarán al recuperar señal</div>
    <div class="kk-tb">
      <button class="kk-tb__back" id="tb-back" onclick="nav('sectorial')">← Menú</button>
      <div class="kk-tb__title" id="tb-title">Mi gerencia</div>
      <div class="kk-tb__clock" id="tb-clock"></div>
      <button class="kk-tb__notif" id="tb-notif">🔔<span class="kk-tb__dot" id="tb-dot" style="display:none"></span></button>
    </div>
    <div class="kk-content" id="content"></div>
    <div class="kk-dock"    id="dock"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="branding.js"></script>
<script src="freshness.js"></script>
<script src="export.js"></script>


<script src="auth.js"></script>
<script src="shared.js"></script>
<script>
/* ══ ESTADO SECTORIAL ════════════════════════════════ */
// Determinado al cargar desde sessionStorage
let gerCod    = null;   // 'INFRA', 'RENTAS', etc.
let gerData   = null;   // objeto gerencia de shared.js
let vista     = 'sectorial';
let instrRespId = null; // id de instrucción que se está respondiendo
let escalarTipo = 'obra_paralizada';

const NAV_DEF = [
  { sec:'Mi panel', items:[
    { id:'sectorial',    ico:'⚡', lbl:'Panel de hoy',         badge:()=>badgeTotal() },
    { id:'instrucciones',ico:'📬', lbl:'Instrucciones',        badge:()=>instrPendientes() },
  ]},
  { sec:'Operativo', items:[
    { id:'obras',        ico:'🏗', lbl:'Obras y actividades',  badge:()=>obrasCriticas() },
    { id:'compromisos',  ico:'🤝', lbl:'Mis compromisos',      badge:()=>compVencidos() },
  ]},
  { sec:'Área', items:[
    { id:'presupuesto',  ico:'💰', lbl:'Presupuesto y KPIs',   badge:()=>0 },
    { id:'escalar',      ico:'🚨', lbl:'Escalar al GM',        badge:()=>calcEscalables() },
  ]},
];

const TITULOS = {
  sectorial:'Panel de hoy', instrucciones:'Instrucciones',
  obras:'Obras y actividades', compromisos:'Mis compromisos',
  presupuesto:'Presupuesto y KPIs', escalar:'Escalar al GM',
};

/* ── Badges dinámicos ── */
function badgeTotal()       { return instrPendientes() + obrasCriticas() + compVencidos(); }
function instrPendientes()  { return (gerCod?KausayDB.getInstrucciones(gerCod):[]).filter(i=>!i.confirmada&&i.de==='alcalde').length; }
function obrasCriticas()    { return (gerCod?KausayDB.getObras(gerCod):[]).filter(o=>['critico','alto'].includes(o.riesgo)).length; }
function compVencidos()     { return (gerCod?KausayDB.getCompromisos(gerCod):[]).filter(c=>c.ven||c.estado==='vencido').length; }
function calcEscalables()   {
  if(!gerCod) return 0;
  const obras = KausayDB.getObras(gerCod).filter(o=>o.riesgo==='critico').length;
  const pres  = KausayDB.getPresupuestoArea(gerCod);
  const bajo  = pres && pres.pct < 40 ? 1 : 0;
  return obras + bajo;
}

/* ══ NAV ═════════════════════════════════════════════ */
function nav(v) { vista=v; render(); window.scrollTo(0,0); }

function buildNav() {
  const sb=document.getElementById('sb-nav'); if(!sb) return;
  sb.innerHTML='';
  NAV_DEF.forEach(sec=>{
    const s=mk('div','kk-sb__sec'); s.textContent=sec.sec; sb.appendChild(s);
    sec.items.forEach(it=>{
      const el=mk('div','kk-nav-item'+(vista===it.id?' on':''));
      const b=it.badge?.()||0;
      el.innerHTML=`<span class="kk-nav-item__ico">${it.ico}</span><span class="kk-nav-item__lbl">${it.lbl}</span>${b>0?`<span class="kk-nav-badge">${b}</span>`:''}`;
      el.onclick=()=>nav(it.id);
      sb.appendChild(el);
    });
  });
}

/* ══ RELOJ ═══════════════════════════════════════════ */
function tick() {
  const n=new Date(), el=document.getElementById('tb-clock');
  if(el) el.textContent=`${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')} · ${n.toLocaleDateString('es-PE',{weekday:'short',day:'numeric',month:'short'})}`;
}
tick(); setInterval(tick,15000);

/* ══ RENDER ══════════════════════════════════════════ */
function render() {
  if(!gerCod) { renderSinGerencia(); return; }
  const c=document.getElementById('content'); if(!c) return;
  c.innerHTML='';
  const ttl=document.getElementById('tb-title');
  if(ttl) ttl.textContent=TITULOS[vista]||vista;
  const back=document.getElementById('tb-back');
  if(back) back.style.display=vista==='sectorial'?'none':'flex';
  const dot=document.getElementById('tb-dot');
  if(dot) dot.style.display=instrPendientes()>0?'block':'none';
  buildNav(); buildDock();

  if(vista==='sectorial')     vSectorial(c);
  else if(vista==='instrucciones') vInstrucciones(c);
  else if(vista==='obras')    vObras(c);
  else if(vista==='compromisos') vCompromisos(c);
  else if(vista==='presupuesto') vPresupuesto(c);
  else if(vista==='escalar')  vEscalar(c);
}

function renderSinGerencia() {
  const c=document.getElementById('content'); if(!c) return;
  c.innerHTML='';
  c.appendChild(emptyState('🔒','Gerencia no asignada','Este panel requiere que ingreses desde el selector de gerencias en la pantalla principal.'));
  const btn=mk('button','kk-btn kk-btn--primary');
  btn.style.cssText='margin:16px auto;display:block;width:auto;padding:10px 24px';
  btn.textContent='← Ir al inicio';
  btn.onclick=()=>{ window.location.href='index.html'; };
  c.appendChild(btn);
}

/* ══ V1: PANEL DE HOY ════════════════════════════════ */
function vSectorial(c) {
  const g    = gerData;
  const pres = KausayDB.getPresupuestoArea(gerCod);
  const kpis = KausayDB.getIndicadores(gerCod);
  const obras= KausayDB.getObras(gerCod);
  const comps= KausayDB.getCompromisos(gerCod);
  const instr= KausayDB.getInstrucciones(gerCod).filter(i=>i.de==='alcalde');
  const sinAcuse = instr.filter(i=>!i.confirmada);
  const obrasCrit= obras.filter(o=>o.riesgo==='critico');
  const compVen  = comps.filter(x=>x.ven||x.estado==='vencido');
  const pct      = pres?.pct||g.ejec||0;
  const pctCol   = KausayDB.pctColor(pct);

  // Resumen sectorial
  const estadoCol = pct>=70?'var(--c-ok)':pct>=50?'var(--c-alerta)':'var(--c-critico)';
  const estadoTxt = obrasCrit.length?`${obrasCrit.length} obra${obrasCrit.length>1?'s críticas':' crítica'}`:compVen.length?`${compVen.length} compromiso${compVen.length>1?'s vencidos':' vencido'}`:sinAcuse.length?`${sinAcuse.length} instrucción${sinAcuse.length>1?'es':''} sin acuse`:pct>=70?'Gerencia al día':'Gestión dentro del rango';

  const summary=mk('div','sec-summary');
  summary.style.background=`linear-gradient(135deg,${g.color}CC 0%,${g.color}88 100%)`;
  summary.innerHTML=`
    <div class="sec-summary__left">
      <div class="sec-summary__area">${g.nombre}</div>
      <div class="sec-summary__nombre">${KausayDB.getMuni().gm||'Gerente'}</div>
      <div class="sec-summary__estado" style="color:${estadoCol}">${estadoTxt}</div>
    </div>
    <div class="sec-summary__kpis">
      <div class="sec-kpi"><div class="sec-kpi__v" style="color:${sinAcuse.length>0?'var(--c-alerta)':'var(--c-ok)'}">${sinAcuse.length}</div><div class="sec-kpi__l">Instr.\nsin acuse</div></div>
      <div class="sec-kpi"><div class="sec-kpi__v" style="color:${obrasCrit.length>0?'var(--c-critico)':'var(--c-ok)'}">${obrasCrit.length}</div><div class="sec-kpi__l">Obras\ncríticas</div></div>
      <div class="sec-kpi"><div class="sec-kpi__v" style="color:${pctCol}">${pct}%</div><div class="sec-kpi__l">Ejec.\npresup.</div></div>
    </div>`;
  c.appendChild(summary);

  // Instrucciones pendientes (urgentes primero)
  if(sinAcuse.length) {
    c.appendChild(secHead(`${sinAcuse.length} instrucción${sinAcuse.length>1?'es':''} sin confirmar`,'Ver todas',()=>nav('instrucciones')));
    sinAcuse.filter(i=>i.prioridad==='urgente').slice(0,1).forEach(i=>c.appendChild(renderInstrSec(i)));
    sinAcuse.filter(i=>i.prioridad!=='urgente').slice(0,1).forEach(i=>c.appendChild(renderInstrSec(i)));
  }

  // Obras críticas
  if(obrasCrit.length) {
    c.appendChild(secHead(`${obrasCrit.length} obra${obrasCrit.length>1?'s críticas':' crítica'} — acción requerida`,'Ver obras',()=>nav('obras')));
    obrasCrit.slice(0,2).forEach(o=>c.appendChild(renderObraSec(o,true)));
  }

  // Compromisos vencidos
  if(compVen.length) {
    c.appendChild(secHead(`${compVen.length} compromiso${compVen.length>1?'s vencidos':' vencido'}`,'Ver compromisos',()=>nav('compromisos')));
    compVen.slice(0,2).forEach(x=>c.appendChild(renderCompSec(x)));
  }

  // KPI principal
  if(kpis.length) {
    c.appendChild(secHead('KPI principal del área','Ver todos',()=>nav('presupuesto')));
    c.appendChild(renderKPI(kpis[0]));
  }

  // Avances pendientes de reportar (obras en ejecución sin avance reciente)
  const sinAvance = obras.filter(o=>o.estado==='ejecucion'&&o.dias_sin_av>=3);
  if(sinAvance.length) {
    c.appendChild(secHead(`${sinAvance.length} obra${sinAvance.length>1?'s':''} sin avance reciente`,'Actualizar',()=>nav('obras')));
    const card=mk('div','kk-item');
    card.style.borderLeft='3px solid var(--c-alerta)';
    card.innerHTML=`
      <div class="kk-item__hd"><span class="kk-item__tipo kk-tipo--campo">Pendiente reporte</span></div>
      <div class="kk-item__txt">${sinAvance.slice(0,3).map(o=>`· ${o.nombre} (${o.dias_sin_av}d sin avance)`).join('<br>')}</div>
      <button class="kk-btn kk-btn--ghost" style="font-size:11px;padding:5px 11px;margin-top:4px" onclick="nav('obras')">Ir a actualizar avances →</button>`;
    c.appendChild(card);
  }
}

/* ══ V2: INSTRUCCIONES ═══════════════════════════════ */
function vInstrucciones(c) {
  const instr = KausayDB.getInstrucciones(gerCod).filter(i=>i.de==='alcalde');
  const sinAcuse  = instr.filter(i=>!i.confirmada);
  const conResp   = instr.filter(i=>i.respuesta&&i.respuesta.length>0);
  const confirmadas= instr.filter(i=>i.confirmada&&(!i.respuesta||!i.respuesta.length));

  if(!instr.length){c.appendChild(emptyState('📬','Sin instrucciones','Las instrucciones del alcalde y del GM aparecerán aquí.'));return;}

  if(sinAcuse.length) {
    c.appendChild(secHead(`Sin confirmar (${sinAcuse.length})`,'',null));
    sinAcuse.forEach(i=>c.appendChild(renderInstrSec(i)));
  }
  if(conResp.length) {
    c.appendChild(secHead('Respondidas','',null));
    conResp.forEach(i=>c.appendChild(renderInstrSec(i)));
  }
  if(confirmadas.length) {
    c.appendChild(secHead('Confirmadas','',null));
    confirmadas.forEach(i=>c.appendChild(renderInstrSec(i)));
  }
}

/* ══ V3: OBRAS Y ACTIVIDADES ═════════════════════════ */
function vObras(c) {
  const obras = KausayDB.getObras(gerCod);
  if(!obras.length){c.appendChild(emptyState('🏗','Sin obras registradas','Las obras de tu gerencia aparecerán aquí.'));return;}

  const groups = [
    {lbl:'Críticas — intervención inmediata', items:obras.filter(o=>o.riesgo==='critico')},
    {lbl:'Riesgo alto',                       items:obras.filter(o=>o.riesgo==='alto')},
    {lbl:'En ejecución',                      items:obras.filter(o=>o.riesgo==='medio'&&o.estado==='ejecucion')},
    {lbl:'Normal / licitación',               items:obras.filter(o=>o.riesgo==='bajo'||o.estado==='licitacion')},
  ];
  groups.filter(g=>g.items.length).forEach(g=>{
    c.appendChild(secHead(`${g.lbl} (${g.items.length})`,'',null));
    g.items.forEach(o=>c.appendChild(renderObraSec(o,false)));
  });
}

/* ══ V4: COMPROMISOS ═════════════════════════════════ */
function vCompromisos(c) {
  const comps = KausayDB.getCompromisos(gerCod);
  const ven   = comps.filter(x=>x.ven||x.estado==='vencido');
  const proc  = comps.filter(x=>x.estado==='en_proceso');
  const pend  = comps.filter(x=>x.estado==='pendiente'&&!x.ven);
  const cumpl = comps.filter(x=>x.estado==='cumplido');

  c.appendChild(secHead('Compromisos de mi área','+ Registrar',()=>abrirModal('modal-comp')));
  if(!comps.length){c.appendChild(emptyState('🤝','Sin compromisos','Registra compromisos asignados a tu gerencia.'));return;}

  if(ven.length){
    c.appendChild(secHead(`Vencidos (${ven.length})`,'',null));
    ven.forEach(x=>c.appendChild(renderCompSec(x,true)));
  }
  if(proc.length){
    c.appendChild(secHead('En proceso','',null));
    proc.forEach(x=>c.appendChild(renderCompSec(x,false)));
  }
  if(pend.length){
    c.appendChild(secHead(`Pendientes (${pend.length})`,'',null));
    pend.forEach(x=>c.appendChild(renderCompSec(x,false)));
  }
  if(cumpl.length){
    c.appendChild(secHead('Cumplidos','',null));
    cumpl.forEach(x=>c.appendChild(renderCompSec(x,false)));
  }
}

/* ══ V5: PRESUPUESTO Y KPIs ══════════════════════════ */
function vPresupuesto(c) {
  const pres = KausayDB.getPresupuestoArea(gerCod);
  const kpis = KausayDB.getIndicadores(gerCod);
  const pct  = pres?.pct||gerData.ejec||0;

  // Bloque presupuestal

    card.style.cssText='background:var(--c-sb);border-radius:var(--r-lg);padding:13px var(--sp-md);margin-bottom:8px';
    card.innerHTML=`
      <div style="font-size:9px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">${gerData.nombre} — Ejecución ${new Date().getFullYear()}</div>
      <div style="display:flex;align-items:flex-end;gap:12px;margin-bottom:8px">
        <div style="font-family:var(--f-cond);font-size:40px;font-weight:800;color:${col};line-height:1">${pct}%</div>
        <div style="flex:1;padding-bottom:6px">
          <div class="kk-bar-track" style="height:8px;margin-bottom:4px"><div class="kk-bar-fill" style="width:${pct}%;background:${col}"></div></div>
          <div style="font-size:11px;color:rgba(255,255,255,.5)">${KausayDB.fmt(pres.ejec)} de ${KausayDB.fmt(pres.asig)}</div>
        </div>
      </div>
      <div style="display:flex;gap:16px">
        <div><div style="font-size:9px;color:rgba(255,255,255,.35);text-transform:uppercase">Saldo</div><div style="font-size:13px;font-weight:600;color:rgba(255,255,255,.85)">${KausayDB.fmt(pres.asig-pres.ejec)}</div></div>
        <div><div style="font-size:9px;color:rgba(255,255,255,.35);text-transform:uppercase">Estado</div><div style="font-size:13px;font-weight:600;color:${col}">${KausayDB.pctLabel(pct)}</div></div>
      </div>`;
    c.appendChild(card);

    // Alerta de ejecución baja
    if(pct<50) {
      const banner=mk('div','escalar-gm');
      banner.innerHTML=`
        <div class="escalar-gm__hd"><span class="escalar-gm__ico">⚠️</span><div class="escalar-gm__ttl">Ejecución crítica — riesgo de devolución</div></div>
        <div class="escalar-gm__desc">Con ${pct}% de ejecución existe riesgo de no llegar al cierre fiscal. Coordina con Planeamiento un plan de devengado urgente.</div>
        <button class="kk-btn kk-btn--danger" style="font-size:11px;padding:6px 14px" onclick="abrirEscalar('presupuesto','Ejecución al ${pct}% — riesgo de devolución de recursos')">Escalar al GM</button>`;

  if(kpis.length) {

    c.appendChild(emptyState('📊','Sin indicadores configurados','Los KPIs de tu área se configuran en el onboarding.'));
  }
}

/* ══ V6: ESCALAR AL GM ═══════════════════════════════ */
function vEscalar(c) {
  const obras = KausayDB.getObras(gerCod).filter(o=>o.riesgo==='critico');
  const pres  = KausayDB.getPresupuestoArea(gerCod);
  const presLow = pres && pres.pct < 40;
  const comps   = KausayDB.getCompromisos(gerCod).filter(x=>x.ven&&x.prioridad==='alta');

  const total = obras.length + (presLow?1:0) + comps.length;

  c.appendChild(secHead('Situaciones que requieren intervención del GM','',null));

  if(!total) {
    c.appendChild(emptyState('✅','Sin situaciones para escalar','Tu gerencia está dentro de los parámetros manejables.'));
    // Botón siempre disponible
    const btn=mk('button','kk-btn kk-btn--danger kk-btn--full');
    btn.style.marginTop='16px';
    btn.textContent='🚨 Escalar situación al GM';
    btn.onclick=()=>abrirModal('modal-escalar');
    c.appendChild(btn);
    return;
  }

  // Obras críticas
  obras.forEach(o=>{
    const card=mk('div','escalar-gm'); card.style.marginBottom='8px';
    card.innerHTML=`
      <div class="escalar-gm__hd"><span class="escalar-gm__ico">🚧</span><div class="escalar-gm__ttl">${o.nombre}</div></div>
      <div class="escalar-gm__desc">${o.estado==='paralizada'?`Paralizada ${o.dias_sin_av} días.`:'Riesgo crítico.'} Presupuesto comprometido: <strong>${KausayDB.fmt(o.presup)}</strong>. Se requiere decisión del GM.</div>
      <button class="kk-btn kk-btn--danger" style="font-size:11px;padding:6px 14px" onclick="abrirEscalar('obra_paralizada','${o.nombre.replace(/'/g,'')}')">🚨 Escalar al GM</button>`;
    c.appendChild(card);
  });

  // Presupuesto bajo
  if(presLow) {
    const card=mk('div','escalar-gm'); card.style.marginBottom='8px';
    card.innerHTML=`
      <div class="escalar-gm__hd"><span class="escalar-gm__ico">💰</span><div class="escalar-gm__ttl">Ejecución presupuestal crítica (${pres.pct}%)</div></div>
      <div class="escalar-gm__desc">Riesgo de no alcanzar el mínimo de ejecución. Saldo sin ejecutar: <strong>${KausayDB.fmt(pres.asig-pres.ejec)}</strong>.</div>
      <button class="kk-btn kk-btn--danger" style="font-size:11px;padding:6px 14px" onclick="abrirEscalar('presupuesto','Ejecución al ${pres.pct}%')">🚨 Escalar al GM</button>`;
    c.appendChild(card);
  }

  // Compromisos vencidos de alta prioridad
  comps.forEach(x=>{
    const card=mk('div','escalar-gm'); card.style.marginBottom='8px';
    card.innerHTML=`
      <div class="escalar-gm__hd"><span class="escalar-gm__ico">🤝</span><div class="escalar-gm__ttl">Compromiso vencido: ${x.desc.slice(0,50)}${x.desc.length>50?'...':''}</div></div>
      <div class="escalar-gm__desc">Alta prioridad · Fecha: <strong>${x.fec}</strong>. Requiere gestión de recursos o autorización superior.</div>
      <button class="kk-btn kk-btn--danger" style="font-size:11px;padding:6px 14px" onclick="abrirEscalar('bloqueo','${x.desc.slice(0,60).replace(/'/g,'')}')">🚨 Escalar al GM</button>`;
    c.appendChild(card);
  });

  // Botón libre
  const btnFree=mk('button','kk-btn kk-btn--ghost kk-btn--full');
  btnFree.style.marginTop='8px';
  btnFree.textContent='+ Escalar otra situación al GM';
  btnFree.onclick=()=>abrirModal('modal-escalar');
  c.appendChild(btnFree);
}

/* ══ RENDERERS ═══════════════════════════════════════ */
function renderInstrSec(ins) {
  const tipoCol={instruccion:'var(--c-critico)',consulta:'var(--c-info)',alerta:'var(--c-alerta)'}[ins.tipo]||'var(--c-gris3)';
  const tipoLabel={instruccion:'Instrucción',consulta:'Consulta',alerta:'Alerta',difusion:'Difusión'}[ins.tipo]||ins.tipo;
  const card=mk('div','kk-item');
  card.style.borderLeft=`3px solid ${tipoCol}`;
  card.innerHTML=`
    <div class="kk-item__hd">
      <span class="kk-item__tipo kk-tipo--${ins.tipo}">${tipoLabel}</span>
      <span class="kk-item__ts" style="margin-left:auto">${ins.hora}</span>
      <span class="kk-item__estado ${ins.confirmada?'kk-estado--ok':'kk-estado--pend'}">${ins.confirmada?'✓ Leída':'⏳ Sin confirmar'}</span>
    </div>
    <div class="kk-item__txt">${ins.contenido}</div>
    ${ins.prioridad==='urgente'?'<div class="kk-item__prio-urgente" style="margin-bottom:5px">⚡ Urgente</div>':''}
    ${ins.respuesta?`<div class="kk-item__resp"><strong>Mi respuesta:</strong> ${ins.respuesta}</div>`:''}
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${!ins.confirmada?`<button class="kk-btn kk-btn--ok" style="font-size:11px;padding:5px 11px" onclick="confirmarInstr('${ins.id}')">✓ Confirmar</button>`:''}
      ${!ins.respuesta?`<button class="kk-btn kk-btn--ghost" style="font-size:11px;padding:5px 11px" onclick="abrirRespuesta('${ins.id}')">Responder</button>`:''}
    </div>`;
  return card;
}

function renderObraSec(o, compact=false) {
  const col=KausayDB.riesgoColor(o.riesgo);
  const card=mk('div','obra-op');
  card.style.setProperty('--oc', col);
  const compactBtns = compact
    ? `<button class="kk-btn kk-btn--ghost" style="font-size:10px;padding:4px 10px" onclick="nav('obras')">Ver obra completa →</button>`
    : '';
  card.innerHTML=`
    <div class="obra-op__hd">
      <div class="obra-op__nombre">${o.nombre}</div>
      <span class="kk-chip ${o.riesgo==='critico'?'kk-chip--critico':o.riesgo==='alto'?'kk-chip--alerta':'kk-chip--neutral'}">${o.riesgo}</span>
    </div>
    <div class="obra-op__pct-row">
      <div class="obra-op__pct-big" style="color:${col}">${o.pct}%</div>
      <div class="obra-op__bar-col">
        <div class="kk-bar-track" style="height:7px;margin-bottom:5px"><div class="kk-bar-fill" style="width:${o.pct}%;background:${col}"></div></div>
        <div class="obra-op__meta">
          <span class="obra-op__info">${KausayDB.fmt(o.presup)} · Fin: ${o.fin}</span>
          ${o.dias_sin_av>0?`<span style="font-size:10px;font-weight:600;color:${o.dias_sin_av>7?'var(--c-critico)':'var(--c-alerta)'}"> · ${o.dias_sin_av}d sin avance</span>`:''}
        </div>
      </div>
    </div>
    ${compact?compactBtns:`
    <div class="obra-op__upd">
      <input class="obra-op__inp" type="number" min="0" max="100" value="${o.pct}" id="pct-${o.id}" placeholder="% avance">
      <button class="kk-btn kk-btn--ok" style="font-size:11px;padding:6px 14px" onclick="actualizarAvance('${o.id}')">Actualizar</button>
      ${o.riesgo==='critico'?`<button class="kk-btn kk-btn--danger" style="font-size:11px;padding:6px 12px" onclick="abrirEscalar('obra_paralizada','${o.nombre.replace(/'/g,'')}')">Escalar</button>`:''}
    </div>
    <textarea class="obra-op__obs" id="obs-${o.id}" rows="2" placeholder="Observación opcional (causa del retraso, acción tomada...)"></textarea>`}`;
  return card;
}

function renderCompSec(comp, urgente=false) {
  const col=comp.ven||comp.estado==='vencido'?'var(--c-critico)':comp.estado==='en_proceso'?'var(--c-info)':comp.estado==='cumplido'?'var(--c-ok)':'var(--c-alerta)';
  const card=mk('div','comp-sec');
  card.innerHTML=`
    <div class="comp-sec__hd">
      <span class="kk-item__tipo kk-tipo--${comp.origen}">${comp.origen}</span>
      <span style="font-size:10px;font-weight:700;color:${col};margin-left:auto">${comp.estado==='vencido'||comp.ven?'VENCIDO':comp.estado.replace('_',' ').toUpperCase()}</span>
      ${comp.prioridad==='alta'?'<span class="kk-chip kk-chip--critico">Alta</span>':''}
    </div>
    <div class="comp-sec__desc">${comp.desc}</div>
    <div class="comp-sec__foot">
      <span style="font-size:11px;font-weight:700;color:${col}">📅 ${comp.fec}</span>
      ${comp.estado!=='cumplido'?`
        <button class="kk-btn kk-btn--ok" style="font-size:10px;padding:3px 10px;margin-left:auto" onclick="marcarCumplido('${comp.id}')">✓ Cumplido</button>
        <button class="kk-btn kk-btn--ghost" style="font-size:10px;padding:3px 10px" onclick="marcarEnProceso('${comp.id}')">En proceso</button>
      `:`<span class="kk-chip kk-chip--ok" style="margin-left:auto">Cumplido</span>`}
    </div>`;
  return card;
}

function renderKPI(k) {
  const pct=Math.min(100,Math.round(k.v/k.meta*100));
  const col=KausayDB.pctColor(pct);
  const card=mk('div','kpi-sec');
  card.innerHTML=`
    <div class="kpi-sec__left">
      <div class="kpi-sec__nombre">${k.n}</div>
      <div class="kpi-sec__bar">
        <div class="kk-bar-track" style="height:6px;margin-bottom:3px"><div class="kk-bar-fill" style="width:${pct}%;background:${col}"></div></div>
      </div>
      <div class="kpi-sec__meta">Meta: <strong>${k.meta} ${k.u}</strong></div>
    </div>
    <div class="kpi-sec__right">
      <div class="kpi-sec__val" style="color:${col}">${k.v}</div>
      <div class="kpi-sec__meta2">${k.u} · ${pct}%</div>
    </div>`;
  return card;
}

/* ══ DOCK ════════════════════════════════════════════ */
function buildDock() {
  const dock=document.getElementById('dock'); if(!dock) return;
  const items=[
    {ico:'✓', lbl:'Confirmar\ninstrucción', fn:()=>{nav('instrucciones');KausayDB.Telemetry.firstAction();}, primary:true},

    {ico:'🤝', lbl:'Registrar\ncompromiso',  fn:()=>abrirModal('modal-comp')},

/* ══ ACCIONES ════════════════════════════════════════ */
function confirmarInstr(id) {
  KausayDB.confirmarInstruccion(id);
  KausayDB.Telemetry.firstAction();
  toast('✓ Instrucción confirmada. El alcalde y GM fueron notificados.');
  render();
}

function abrirRespuesta(id) {
  instrRespId = id;
  const ins = KausayDB.getInstrucciones(gerCod).find(i=>i.id===id);
  document.getElementById('resp-ctx').textContent = ins ? ins.contenido.slice(0,120)+(ins.contenido.length>120?'...':'') : '';
  document.getElementById('resp-txt').value = '';
  document.getElementById('resp-err').classList.remove('show');
  abrirModal('modal-resp');
}

function enviarRespuesta() {
  const txt = document.getElementById('resp-txt')?.value.trim();
  if(!txt){ document.getElementById('resp-err').classList.add('show'); return; }
  KausayDB.responderInstruccion(instrRespId, txt);
  KausayDB.Telemetry.firstAction();
  document.getElementById('resp-txt').value='';
  cerrarModal('modal-resp');
  toast('✓ Respuesta enviada al alcalde y al GM.');
  render();
}

function actualizarAvance(obraId) {
  const inp=document.getElementById('pct-'+obraId);
  const obs=document.getElementById('obs-'+obraId);
  if(!inp) return;
  const pct=parseInt(inp.value);
  if(isNaN(pct)||pct<0||pct>100){ toast('⚠ Ingresa un porcentaje válido (0-100)'); return; }
  KausayAuth.reauth('Actualizar avance de obra registrado en Contraloría').then(ok=>{ if(!ok){toast('⚠ Verificación cancelada');return;}
  KausayDB.updateAvanceObra(obraId, pct);
  KausayDB.Telemetry.obraActualizada();
  if(obs?.value.trim()) {
    KausayDB.Audit.emit('avance_obra',obraId,'Observación','update',null,{pct,obs:obs.value.trim()});
  }
  toast(`✓ Avance actualizado a ${pct}%`);
  render();
}

function marcarCumplido(id) {
  KausayDB.updateCompromiso(id, { estado:'cumplido' });
  KausayDB.Telemetry.firstAction();
  toast('✓ Compromiso marcado como cumplido');
  render();
}
function marcarEnProceso(id) {
  KausayDB.updateCompromiso(id, { estado:'en_proceso' });
  toast('✓ Compromiso marcado como en proceso');
  render();
}

function guardarCompromiso() {
  const desc = document.getElementById('comp-desc')?.value.trim();
  const origen= document.getElementById('comp-origen')?.value;
  const fec   = document.getElementById('comp-fec')?.value;
  const prio  = document.getElementById('comp-prio')?.value;
  if(!desc){ toast('⚠ La descripción es requerida'); return; }
  KausayDB.addCompromiso({ desc, resp:gerCod, origen, fec:fec||'Por definir', prioridad:prio, ven:false, estado:'pendiente' });
  document.getElementById('comp-desc').value='';
  cerrarModal('modal-comp');
  toast('✓ Compromiso registrado');
  nav('compromisos');
}

function abrirEscalar(tipo, prefill='') {
  escalarTipo = tipo;
  document.querySelectorAll('#escalar-chips .kk-chip-btn').forEach(b=>{
    b.classList.toggle('sel', b.dataset.tipo===tipo);
  });
  document.getElementById('escalar-txt').value = prefill;
  document.getElementById('escalar-err').classList.remove('show');
  abrirModal('modal-escalar');
}

function enviarEscalamiento() {
  const txt = document.getElementById('escalar-txt')?.value.trim();
  if(!txt){ document.getElementById('escalar-err').classList.add('show'); return; }
  KausayAuth.reauth('Escalar situación al Gerente Municipal').then(ok=>{ if(!ok){toast('⚠ Verificación cancelada');return;}
  KausayDB.addInstruccion({
    tipo:'alerta', para:'GM', paraLabel:'Gerente Municipal',
    contenido:`[ESCALAMIENTO ${gerData?.nombre||gerCod}] ${escalarTipo.toUpperCase()}: ${txt}`,
    prioridad:'urgente',
  });
  KausayDB.Audit.emit('escalamiento', gerCod, txt.slice(0,60), 'escalar', null, { destino:'GM', tipo:escalarTipo });
  KausayDB.Telemetry.firstAction();
  document.getElementById('escalar-txt').value='';
  cerrarModal('modal-escalar');
  toast('🚨 Escalamiento enviado al GM');
  render();
}

document.querySelectorAll('#escalar-chips .kk-chip-btn').forEach(btn=>{

/* ══ MODALES ═════════════════════════════════════════ */
function abrirModal(id){ document.getElementById(id)?.classList.add('show'); }
function cerrarModal(id){ document.getElementById(id)?.classList.remove('show'); }

/* ══ HELPERS ═════════════════════════════════════════ */
function mk(tag,cls){ const el=document.createElement(tag); if(cls) el.className=cls; return el; }
function secHead(ttl,lnkTxt,lnkFn){
  const hd=mk('div','kk-sec-hd');
  hd.innerHTML=`<span class="kk-sec-ttl">${ttl}</span>`;
  if(lnkTxt&&lnkFn){const btn=mk('button','kk-sec-lnk');btn.textContent=lnkTxt;btn.onclick=lnkFn;hd.appendChild(btn);}
  return hd;
}
function emptyState(ico,ttl,desc){
  const el=mk('div','kk-empty');
  el.innerHTML=`<div class="kk-empty__ico">${ico}</div><div class="kk-empty__ttl">${ttl}</div><div class="kk-empty__desc">${desc}</div>`;
  return el;
}
function toast(msg,dur=2800){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

/* ══ OFFLINE ═════════════════════════════════════════ */
function updateOnlineStatus(){
  const bar=document.getElementById('offline-bar');
  if(bar) bar.classList.toggle('show',!navigator.onLine);
}
window.addEventListener('online', ()=>{updateOnlineStatus();toast('✓ Conexión restaurada');});
window.addEventListener('offline', updateOnlineStatus);

function logout(){ window.location.href='index.html'; }

/* ══ INIT ════════════════════════════════════════════ */
window.addEventListener('load',()=>{
  // ── AUTH ──
  KausayAuth.requireAuth(['gerente_sectorial', 'gerente_municipal']);
  const _sess = KausayAuth.getSession();
  // Validar que gerente_sectorial tenga gerencia_id
  if (_sess?.rol === 'gerente_sectorial' && !_sess?.gerencia_cod) {
    window.location.href = 'login.html?error=sin_gerencia';
    return;
  }
  // Determinar gerencia desde sessionStorage (URL params ya procesados por shared.js)
  gerCod  = sessionStorage.getItem('kausay_demo_gerencia') || null;
  gerData = gerCod ? KausayDB.getGerencia(gerCod) : null;

  KausayBranding.applyGerente(gerCod);
  const muni   = KausayDB.getMuni();
  const nombre = sessionStorage.getItem('kausay_demo_nombre') || gerData?.jefe || 'Gerente';
  const ini    = nombre.split(' ').slice(0,2).map(p=>p[0]).join('').toUpperCase();

  // Aplicar color del rol a --ac
  if(gerData?.color) {
    document.documentElement.style.setProperty('--ac',     gerData.color);
    document.documentElement.style.setProperty('--ac-bg',  gerData.color+'18');
    document.documentElement.style.setProperty('--ac-brd', gerData.color+'38');
    document.querySelector('meta[name="theme-color"]')?.setAttribute('content', gerData.color);
  }

  // Sidebar
  document.getElementById('sb-muni').textContent = muni.nombre||'Municipalidad';
  document.getElementById('sb-tag').textContent  = gerData?.nombre||'Gerencia sectorial';
  document.getElementById('sb-av').textContent   = ini;
  document.getElementById('sb-name').textContent = nombre;
  document.getElementById('sb-rol').textContent  = gerData?.nombre||'Gerencia sectorial';

  updateOnlineStatus();

  // EventBus — dentro de load
  KausayDB.EventBus.on('instruccion:nueva',        ()=>render());
  KausayDB.EventBus.on('instruccion:confirmada',   ()=>render());
  KausayDB.EventBus.on('instruccion:respondida',   ()=>render());
  KausayDB.EventBus.on('obra:avance',              ()=>render());
  KausayDB.EventBus.on('compromiso:nuevo',         ()=>render());
  KausayDB.EventBus.on('compromiso:updated',       ()=>render());
  KausayDB.EventBus.on('wq:conflict',              ()=>render());
  KausayDB.EventBus.on('remote:instruccion:nueva', ()=>render());
  KausayDB.EventBus.on('remote:obra:avance',       ()=>render());

  document.getElementById('loader').classList.add('gone');
  document.getElementById('app').style.display='flex';

  render();

  
  // ── REALTIME SUPABASE (Etapa 4) ──
  KausayDB.subscribeRealtime('instrucciones', payload => {
    KausayDB.Cache.invalidate('instrucciones');
    KausayDB.EventBus.emit('instruccion:nueva', payload.new);
    render();
  });
  KausayDB.subscribeRealtime('obras', payload => {
    KausayDB.Cache.invalidate('obras');
    KausayDB.EventBus.emit('obra:avance', { id: payload.new?.id, pct: payload.new?.porcentaje_avance });
    render();
  });
  KausayDB.subscribeRealtime('compromisos', payload => {
    KausayDB.Cache.invalidate('compromisos');
    render();
  });
  if (KausayDB.CONFIG.USE_SUPABASE) KausayDB.loadInitialData().then(() => render());
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
  KausayFreshness.autoMount();
  KausayExport.renderExportBtn('kk-fresh-wrap', ["obras", "compromisos", "instrucciones"]);
  setTimeout(()=>document.getElementById('loader').remove(),500);
});
</script>
</body>
</html>
