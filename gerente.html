<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0F0F12">
<link rel="manifest" href="manifest-gerente.json">
<link rel="apple-touch-icon" href="icons/icon-gerente-192.png">
<title>Kausay — Gerencias Municipales</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:'Barlow',sans-serif;color:#1A1D23;background:#0F0F12}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* ── SELECTOR ── */
#selector{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 20px 48px}
.sel-bg{position:fixed;inset:0;background:radial-gradient(ellipse at 25% 0%,rgba(176,32,32,.13) 0%,transparent 55%),radial-gradient(ellipse at 80% 100%,rgba(24,95,165,.1) 0%,transparent 55%);pointer-events:none}
.sel-logo{text-align:center;margin-bottom:28px;animation:fadeUp .5s ease both}
.sel-brand{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:#fff;line-height:1}
.sel-brand em{color:#F07070;font-style:normal}
.sel-tag{font-size:10px;color:rgba(255,255,255,.32);text-transform:uppercase;letter-spacing:1.8px;margin-top:5px}
.sel-muni{font-size:12px;color:rgba(255,255,255,.45);margin-top:8px;padding:5px 14px;background:rgba(255,255,255,.07);border-radius:20px;display:inline-block}
.sel-hint{font-size:12px;color:rgba(255,255,255,.35);margin-bottom:16px;animation:fadeUp .5s .1s ease both;opacity:0;animation-fill-mode:forwards}
.ger-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:100%;max-width:480px;animation:fadeUp .5s .15s ease both;opacity:0;animation-fill-mode:forwards}
@media(min-width:560px){.ger-grid{grid-template-columns:repeat(3,1fr)}}
.ger-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:18px 12px 15px;cursor:pointer;text-align:center;transition:all .18s;font-family:'Barlow',sans-serif}
.ger-card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.1)}
.ger-card:active{transform:scale(.97)}
.ger-ico{font-size:26px;margin-bottom:8px;display:block}
.ger-nombre{font-size:12px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:3px}
.ger-jefe{font-size:10px;color:rgba(255,255,255,.38);line-height:1.3;margin-bottom:6px}
.ger-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block}
/* ── MODAL ── */
#modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:999;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
#modal-bg.show{display:flex}
.modal{background:#1C1C28;border:1px solid rgba(255,255,255,.13);border-radius:18px;padding:26px 22px;width:100%;max-width:320px;animation:fadeUp .2s ease}
.modal-hd{display:flex;align-items:center;gap:11px;margin-bottom:18px}
.modal-ico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.modal-n{font-size:14px;font-weight:700;color:#fff;line-height:1.2}
.modal-j{font-size:11px;color:rgba(255,255,255,.38);margin-top:2px}
.pw-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;display:block}
.pw-inp{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:10px;padding:11px 14px;font-size:14px;font-family:'Barlow',sans-serif;color:#fff;outline:none;letter-spacing:3px;transition:border-color .15s}
.pw-inp:focus{border-color:rgba(255,255,255,.4)}
.pw-inp::placeholder{letter-spacing:0;color:rgba(255,255,255,.22)}
.pw-err{font-size:12px;color:#F07070;margin-top:7px;display:none;font-weight:600}
.pw-err.show{display:block}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.m-entrar{flex:1;padding:11px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;color:#fff;transition:opacity .15s}
.m-entrar:hover{opacity:.88}
.m-cancel{padding:11px 14px;border-radius:10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.45);font-size:13px;cursor:pointer;font-family:'Barlow',sans-serif}
.m-cancel:hover{background:rgba(255,255,255,.13);color:#fff}
/* ── DASHBOARD ── */
#dash{display:none;height:100vh;overflow:hidden}
#dash.show{display:flex}
.sb{width:220px;background:#0F0F12;display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:#F0F2F5}
.sb-logo{padding:14px 16px 10px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-brand{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:800;color:#fff;line-height:1}
.sb-brand em{font-style:normal}
.sb-tag{font-size:9px;color:rgba(255,255,255,.28);text-transform:uppercase;letter-spacing:1.5px;margin-top:3px}
.sb-ger{margin:7px 10px 2px;border-radius:8px;padding:8px 11px;background:rgba(255,255,255,.07)}
.sb-gn{font-size:12px;font-weight:700;color:#fff;line-height:1.3}
.sb-gm{font-size:9px;color:rgba(255,255,255,.38);margin-top:2px}
.sb-muni{padding:4px 12px 5px;font-size:10px;color:rgba(255,255,255,.26)}
.sb-nav{flex:1;overflow-y:auto;padding:4px 0}
.sb-sec{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.22);padding:10px 16px 4px}
.sb-it{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;color:rgba(255,255,255,.46);font-size:13px;font-weight:500;border-left:3px solid transparent;transition:all .12s;user-select:none}
.sb-it:hover{color:#fff;background:rgba(255,255,255,.05)}
.sb-it.on{color:#fff;background:rgba(255,255,255,.08)}
.sb-ico{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sb-n{flex:1}
.sb-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;background:#B02020;color:#fff}
.sb-ft{padding:10px 12px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:8px}
.sb-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.sb-un{font-size:11px;color:#fff;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-ur{font-size:9px;color:rgba(255,255,255,.33);margin-top:1px}
.sb-logout{background:rgba(255,255,255,.08);border:none;color:rgba(255,255,255,.38);font-size:9px;padding:4px 8px;border-radius:6px;cursor:pointer;font-family:'Barlow',sans-serif}
.sb-logout:hover{background:rgba(255,255,255,.15);color:#fff}
.tb{height:52px;background:#fff;border-bottom:1px solid #E2E6ED;display:flex;align-items:center;gap:10px;padding:0 18px;flex-shrink:0}
.tb-ttl{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;flex:1;color:#1A1D23}
.tb-date{font-size:11px;color:#8A90A0;white-space:nowrap}
.rt{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.rt-dot{width:5px;height:5px;border-radius:50%;animation:pulse 1.5s infinite}
.tb-bell{width:34px;height:34px;border-radius:8px;border:1px solid #E2E6ED;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;position:relative;flex-shrink:0}
.tb-bdot{position:absolute;top:5px;right:5px;width:7px;height:7px;background:#B02020;border-radius:50%;border:1.5px solid #fff}
.content{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:14px}
/* ── PILLS ── */
.pill{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;display:inline-block}
.p-r{background:#FDEAEA;color:#B02020}.p-a{background:#FFF4DC;color:#C8880A}.p-g{background:#E8F5EE;color:#1A7A45}.p-b{background:#E6F1FB;color:#185FA5}.p-x{background:#F0F2F5;color:#8A90A0;border:1px solid #E2E6ED}
/* ── SEC HD ── */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sec-ttl{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#1A1D23}
/* ── INSTRUC ── */
.ins{background:#fff;border:1px solid #E2E6ED;border-radius:10px;padding:12px 14px;border-left:4px solid #B02020;margin-bottom:8px}
.ins-hd{display:flex;align-items:center;gap:7px;margin-bottom:6px;flex-wrap:wrap}
.ins-from{font-size:11px;font-weight:600;color:#8A90A0;flex:1;min-width:0}
.ins-hora{font-size:10px;color:#8A90A0;flex-shrink:0}
.ins-body{font-size:13px;color:#1A1D23;line-height:1.65;margin-bottom:8px}
.ins-st{font-size:11px;font-weight:600;padding:4px 9px;border-radius:6px;display:inline-block;margin-bottom:8px}
.ins-st.ok{background:#E8F5EE;color:#1A7A45}.ins-st.pend{background:#FDEAEA;color:#B02020}
.ins-acts{display:flex;gap:6px;flex-wrap:wrap}
.ibtn{padding:6px 13px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:none;font-family:'Barlow',sans-serif}
.ibtn-ok{background:#1A7A45;color:#fff}
.ibtn-resp{background:#F0F2F5;color:#4A5060;border:1px solid #E2E6ED}
.ibtn-resp:hover{background:#E2E6ED}
.resp-box{background:#F0F2F5;border-radius:8px;padding:10px 12px;margin-top:9px;display:none}
.resp-box.open{display:block}
.resp-ta{width:100%;border:1px solid #E2E6ED;border-radius:7px;padding:8px 10px;font-size:12px;font-family:'Barlow',sans-serif;resize:none;outline:none;background:#fff;color:#1A1D23;line-height:1.5}
.resp-ta:focus{border-color:#1A7A45}
.resp-row{display:flex;gap:7px;margin-top:7px}
.resp-send{padding:7px 15px;color:#fff;border:none;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif}
.resp-cancel{padding:7px 10px;background:none;border:1px solid #E2E6ED;border-radius:7px;font-size:11px;cursor:pointer;font-family:'Barlow',sans-serif;color:#8A90A0}
/* ── KPI MINI ── */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.kpi-m{background:#fff;border:1px solid #E2E6ED;border-radius:8px;padding:11px 12px;text-align:center}
.kpi-mv{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;line-height:1;color:#1A1D23}
.kpi-ml{font-size:9px;color:#8A90A0;text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
/* ── OBRAS ── */
.obra{background:#fff;border:1px solid #E2E6ED;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.obra-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.obra-n{font-size:13px;font-weight:600;flex:1;line-height:1.3;color:#1A1D23}
.obra-pct{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;flex-shrink:0;line-height:1}
.obra-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:7px}
.obra-fin{font-size:11px;color:#8A90A0}
.pbar{height:5px;background:#E2E6ED;border-radius:3px;overflow:hidden;margin-bottom:9px}
.pbar-f{height:100%;border-radius:3px}
.av-form{display:flex;gap:7px;align-items:center;background:#F0F2F5;border-radius:8px;padding:7px 10px}
.av-lbl{font-size:11px;color:#8A90A0;white-space:nowrap}
.av-inp{flex:1;border:1px solid #E2E6ED;border-radius:6px;padding:5px 8px;font-size:12px;font-family:'Barlow',sans-serif;outline:none;color:#1A1D23;background:#fff;min-width:0}
.av-inp:focus{border-color:#1A7A45}
.av-btn{color:#fff;border:none;border-radius:6px;padding:5px 13px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;white-space:nowrap}
.av-ok{font-size:11px;color:#1A7A45;font-weight:600;display:none;padding-left:6px}
/* ── INDICADORES ── */
.ind{background:#fff;border:1px solid #E2E6ED;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.ind-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.ind-n{font-size:13px;font-weight:600;color:#1A1D23}
.ind-v{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;line-height:1}
.ind-meta{font-size:11px;color:#8A90A0}
.ind-prog{height:6px;background:#E2E6ED;border-radius:3px;overflow:hidden;margin:6px 0}
.ind-prog-f{height:100%;border-radius:3px}
.ind-foot{display:flex;justify-content:space-between;align-items:center}
.ind-per{font-size:10px;color:#8A90A0}
.ind-edit{background:none;border:1px solid #E2E6ED;border-radius:6px;padding:3px 9px;font-size:10px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;color:#8A90A0}
.ind-form{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #E2E6ED}
.ind-form.open{display:block}
/* ── PRESUPUESTO ── */
.pres{background:#fff;border:1px solid #E2E6ED;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.pres-lbl{font-size:11px;font-weight:600;color:#4A5060;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.pres-bw{display:flex;align-items:center;gap:10px;margin:5px 0}
.pres-bar{flex:1;height:8px;background:#E2E6ED;border-radius:4px;overflow:hidden}
.pres-bar-f{height:100%;border-radius:4px}
.pres-pct{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;min-width:38px;text-align:right}
.pres-montos{display:flex;justify-content:space-between;font-size:11px;color:#8A90A0}
.pres-montos strong{color:#4A5060}
/* ── COMPROMISOS ── */
.comp{background:#fff;border:1px solid #E2E6ED;border-radius:10px;padding:11px 13px;display:flex;align-items:center;gap:10px;margin-bottom:7px}
.comp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.comp-bd{flex:1;min-width:0}
.comp-ttl{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#1A1D23}
.comp-meta{display:flex;gap:5px;align-items:center;margin-top:3px;font-size:10px;color:#8A90A0;flex-wrap:wrap}
.comp-fec{font-size:11px;font-weight:700;flex-shrink:0}
/* ── FORM ── */
.card{background:#fff;border:1px solid #E2E6ED;border-radius:12px;padding:14px 16px}
.form-row{margin-bottom:10px}
.form-lbl{display:block;font-size:10px;font-weight:700;color:#4A5060;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.form-inp{width:100%;border:1px solid #E2E6ED;border-radius:8px;padding:8px 11px;font-size:13px;font-family:'Barlow',sans-serif;color:#1A1D23;background:#fff;outline:none}
.form-inp:focus{border-color:#1A7A45}
.form-btn{width:100%;padding:10px;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif}
.info-box{border-radius:9px;padding:10px 13px;font-size:12px;line-height:1.65;margin-bottom:2px}

/* ── BOTÓN VOLVER AL MENÚ (solo mobile) ── */
.tb-back{display:none;align-items:center;gap:6px;padding:6px 11px;border-radius:8px;border:1px solid var(--borde);background:none;cursor:pointer;font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;color:var(--txt2);white-space:nowrap;flex-shrink:0}
.tb-back:active{background:var(--gris)}
@media(max-width:680px){.tb-back{display:flex}.tb-date{display:none}}

@media(max-width:680px){.sb{display:none}.kpi-row{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<!-- SELECTOR -->
<div id="selector">
  <div class="sel-bg"></div>
  <div class="sel-logo">
    <div class="sel-brand">Kausay<em>Gerencias</em></div>
    <div class="sel-tag">Panel sectorial municipal</div>
    <div class="sel-muni">Municipalidad Provincial de Cajamarca</div>
  </div>
  <div class="sel-hint">Selecciona tu gerencia e ingresa con tu contraseña</div>
  <div class="ger-grid" id="ger-grid"></div>
</div>

<!-- MODAL CONTRASEÑA -->
<div id="modal-bg">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-ico" id="m-ico"></div>
      <div><div class="modal-n" id="m-nombre"></div><div class="modal-j" id="m-jefe"></div></div>
    </div>
    <label class="pw-lbl">Contraseña de acceso</label>
    <input type="password" class="pw-inp" id="pw-inp" placeholder="Ingresa tu contraseña">
    <div class="pw-err" id="pw-err">Contraseña incorrecta. Inténtalo de nuevo.</div>
    <div class="modal-btns">
      <button class="m-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="m-entrar" id="m-entrar" onclick="verificarPW()">Ingresar al panel</button>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dash">
  <div class="sb" id="sb"></div>
  <div class="main">
    <div class="tb">
      <button class="tb-back" id="tb-back" onclick="nav('instruc')" style="display:none">← Menú</button><div class="tb-ttl" id="tb-ttl"></div>
      <div class="tb-date" id="tb-date"></div>
      <div class="rt" id="tb-rt"><span class="rt-dot"></span><span id="rt-txt"></span></div>
      <button class="tb-bell">🔔<span class="tb-bdot" id="tb-bdot" style="display:none"></span></button>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

let gerCod = null;
let instrucciones = [];
let obras = [];

/* ══ SELECTOR ══════════════════════════════════════════ */
function buildSelector(){
  const grid = document.getElementById('ger-grid');
  Object.entries(GC).forEach(([cod,g])=>{
    const pend = (INSTRUC[cod]||[]).filter(i=>!i.leida).length;
    const card = mk('div','ger-card');
    card.innerHTML = `
      <span class="ger-ico">${g.ico}</span>
      <div class="ger-nombre">${g.nombre}</div>
      <div class="ger-jefe">${g.jefe}</div>
      <span class="ger-badge" style="background:${pend?'#FDEAEA':'rgba(255,255,255,.1)'};color:${pend?'#B02020':'rgba(255,255,255,.4)'}">${pend?'⚠ '+pend+' pendiente'+(pend>1?'s':''):'🔒 Con contraseña'}</span>`;
    card.onclick = () => abrirModal(cod);
    grid.appendChild(card);
  });
}

/* ══ MODAL ════════════════════════════════════════════ */
function abrirModal(cod){
  gerCod = cod;
  const g = GC[cod];
  const ico = document.getElementById('m-ico');
  ico.textContent = g.ico; ico.style.cssText = `background:${g.colorBg};width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0`;
  document.getElementById('m-nombre').textContent = g.nombre;
  document.getElementById('m-jefe').textContent = g.jefe;
  document.getElementById('m-entrar').style.background = g.color;
  document.getElementById('pw-inp').value = '';
  document.getElementById('pw-err').classList.remove('show');
  document.getElementById('modal-bg').classList.add('show');
  setTimeout(()=>document.getElementById('pw-inp').focus(),100);
}
function cerrarModal(){ document.getElementById('modal-bg').classList.remove('show'); gerCod=null; }
function verificarPW(){
  if(!gerCod) return;
  const val = document.getElementById('pw-inp').value;
  if(val === GC[gerCod].pw){ cerrarModal(); iniciarDash(gerCod); }
  else { document.getElementById('pw-err').classList.add('show'); document.getElementById('pw-inp').select(); }
}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('modal-bg').classList.contains('show')) verificarPW();
  if(e.key==='Escape') cerrarModal();
});

/* ══ DASHBOARD ════════════════════════════════════════ */
function iniciarDash(cod){
  gerCod = cod;
  instrucciones = (INSTRUC[cod]||[]).map(x=>({...x}));
  obras = (OBRAS[cod]||[]).map(o=>({...o}));
  avInputs = {};
  vista = 'instruc';
  document.getElementById('selector').style.display = 'none';
  document.getElementById('dash').classList.add('show');
  document.querySelector('meta[name=theme-color]').content = GC[cod].color;
  document.getElementById('tb-date').textContent = hoy;
  buildSb();
  render();
}

function salir(){
  document.getElementById('dash').classList.remove('show');
  document.getElementById('selector').style.display = 'flex';
  document.querySelector('meta[name=theme-color]').content = '#0F0F12';
  gerCod = null;
}

function nav(v){ vista=v; render(); }

function buildSb(){
  const g = GC[gerCod];
  const sb = document.getElementById('sb');
  sb.innerHTML = `
    <div class="sb-logo"><div class="sb-brand">Kausay<em style="color:${g.colorL}">Gerencia</em></div><div class="sb-tag">Panel sectorial</div></div>
    <div class="sb-ger"><div class="sb-gn">${g.ico} ${g.nombre}</div><div class="sb-gm">Gerencia sectorial</div></div>
    <div class="sb-muni">Municipalidad Provincial de Cajamarca</div>
    <div class="sb-nav" id="sb-nav"></div>
    <div class="sb-ft">
      <div class="sb-av" style="background:${g.color}">${g.ini}</div>
      <div><div class="sb-un">${g.jefe}</div><div class="sb-ur">Gerente Sectorial</div></div>
      <button class="sb-logout" onclick="salir()">Salir</button>
    </div>`;
}

function render(){
  const g = GC[gerCod];
  const pend = instrucciones.filter(i=>!i.leida).length;

  // Nav sidebar
  const navEl = document.getElementById('sb-nav');
  if(navEl){
    navEl.innerHTML = '';
    NAV.forEach(sec=>{
      const sl=mk('div','sb-sec'); sl.textContent=sec.sec; navEl.appendChild(sl);
      sec.items.forEach(it=>{
        const b = it.id==='instruc'?pend : it.id==='comps'?g.comps.filter(c=>c.v).length : 0;
        const item=mk('div','sb-it'+(vista===it.id?' on':''));
        if(vista===it.id) item.style.borderLeftColor=g.color;
        const span=mk('span','sb-n'); span.textContent=it.lbl;
        item.innerHTML=`<span class="sb-ico">${it.ico}</span>`;
        item.appendChild(span);
        if(b){ const bd=mk('span','sb-badge'); bd.textContent=b; item.appendChild(bd); }
        item.onclick=()=>nav(it.id);
        navEl.appendChild(item);
      });
    });
  }

  // Topbar
  const ttl = document.getElementById('tb-ttl'); if(ttl) ttl.textContent = TITULOS[vista]||vista;
  const rt = document.getElementById('tb-rt'), rtTxt = document.getElementById('rt-txt');
  const bdot = document.getElementById('tb-bdot');
  const rtDot = rt.querySelector('.rt-dot');
  if(pend>0){
    rt.style.background='#FDEAEA'; rt.style.color='#B02020';
    rtDot.style.background='#B02020'; rtTxt.textContent=pend+' sin confirmar';
    bdot.style.display='block';
  } else {
    rt.style.background='#E8F5EE'; rt.style.color='#1A7A45';
    rtDot.style.background='#1A7A45'; rtTxt.textContent='Alcalde ve esto';
    bdot.style.display='none';
  }

  const c = document.getElementById('content'); if(!c) return; c.innerHTML='';
  if(vista==='instruc') vInstruc(c,g);
  else if(vista==='obras') vObras(c,g);
  else if(vista==='presup') vPresup(c,g);
  else if(vista==='kpis') vKpis(c,g);
  else if(vista==='comps') vComps(c,g);
  else if(vista==='exportar') vExportar(c,g);
}

/* ══ VISTA INSTRUCCIONES ══════════════════════════════ */
function vInstruc(c,g){
  const pend = instrucciones.filter(i=>!i.leida).length;
  const hd=mk('div','sec-hd');
  hd.innerHTML=`<span class="sec-ttl">Instrucciones del alcalde</span>`;
  const badge=mk('span','pill '+(pend>0?'p-r':'p-g'));
  badge.textContent=pend>0?pend+' sin confirmar':'Todas confirmadas';
  hd.appendChild(badge); c.appendChild(hd);

  c.appendChild(ExportBar('Instrucciones', ()=>exportarGerencia(gerCod,'instruc')));
  if(!instrucciones.length){
    const e=mk('div',''); e.style.cssText='text-align:center;padding:32px;color:#8A90A0;font-size:13px';
    e.textContent='✓ No hay instrucciones pendientes.'; c.appendChild(e); return;
  }

  instrucciones.forEach((ins,i)=>{
    const tipoCols={instruccion:'#B02020',consulta:'#185FA5',alerta:'#C8880A',informe:'#1A7A45'};
    const tipoPill={instruccion:'p-r',consulta:'p-b',alerta:'p-a',informe:'p-g'};
    const tipoLbl={instruccion:'Instrucción',consulta:'Consulta',alerta:'Alerta',informe:'Informe'};
    const item=mk('div','ins');
    item.style.borderLeftColor=tipoCols[ins.tipo]||'#B02020';

    const hd2=mk('div','ins-hd');
    hd2.innerHTML=`<span class="ins-from">Del Alcalde · vía Gte. Municipal</span><span class="ins-hora">${ins.hora}</span>`;
    const tp=mk('span','pill '+tipoPill[ins.tipo]); tp.textContent=tipoLbl[ins.tipo]||ins.tipo;
    hd2.appendChild(tp);

    const body=mk('div','ins-body'); body.textContent=ins.txt;
    const st=mk('div','ins-st '+(ins.leida?'ok':'pend'));
    st.textContent=ins.leida?'✓ Lectura confirmada al alcalde':'⚠ Pendiente — el alcalde no sabe que lo leíste';

    const acts=mk('div','ins-acts');
    if(!ins.leida){
      const ok=mk('button','ibtn ibtn-ok'); ok.textContent='✓ Confirmar lectura';
      ok.onclick=()=>{ instrucciones[i].leida=true; render(); };
      acts.appendChild(ok);
    }

    const rb=mk('button','ibtn ibtn-resp');
    rb.textContent=ins.resp?'✏ Editar respuesta':'💬 Responder al alcalde';
    const box=mk('div','resp-box'+(ins.resp?' open':''));
    const ta=mk('textarea','resp-ta'); ta.rows=3;
    ta.placeholder=ins.tipo==='consulta'?'Escribe tu respuesta a la consulta del alcalde...':'Reporta el estado de cumplimiento de esta instrucción...';
    ta.value=ins.resp||'';
    const row=mk('div','resp-row');
    const send=mk('button','resp-send'); send.style.background=g.color;
    send.textContent=ins.tipo==='consulta'?'Enviar respuesta':'Reportar cumplimiento';
    const cancel=mk('button','resp-cancel'); cancel.textContent='Cancelar';
    send.onclick=()=>{
      if(!ta.value.trim()) return;
      instrucciones[i].resp=ta.value; instrucciones[i].leida=true;
      send.textContent='✓ Enviado'; send.disabled=true;
      setTimeout(()=>render(),900);
    };
    cancel.onclick=()=>box.classList.remove('open');
    rb.onclick=()=>box.classList.toggle('open');
    row.appendChild(send); row.appendChild(cancel);
    box.appendChild(ta); box.appendChild(row);
    acts.appendChild(rb);

    item.appendChild(hd2); item.appendChild(body); item.appendChild(st); item.appendChild(acts); item.appendChild(box);
    c.appendChild(item);
  });
}

/* ══ VISTA OBRAS ═══════════════════════════════════════ */
function vObras(c,g){
  c.appendChild(ExportBar('Obras', ()=>exportarGerencia(gerCod,'obras')));
  if(!obras.length){
    const e=mk('div',''); e.style.cssText='text-align:center;padding:32px;color:#8A90A0;font-size:13px';
    e.textContent='Esta gerencia no tiene obras registradas.'; c.appendChild(e); return;
  }

  const enEjec=obras.filter(o=>o.est==='ejecucion').length;
  const paraliz=obras.filter(o=>o.est==='paralizada').length;

  const kRow=mk('div','kpi-row');
  [{v:obras.length,l:'Total obras',col:g.color},{v:enEjec,l:'En ejecución',col:'#1A7A45'},{v:paraliz,l:'Paralizadas',col:paraliz?'#B02020':'#1A7A45'}].forEach(k=>{
    const km=mk('div','kpi-m');
    km.style.borderTop=`2px solid ${k.col}`;
    km.innerHTML=`<div class="kpi-mv" style="color:${k.col}">${k.v}</div><div class="kpi-ml">${k.l}</div>`;
    kRow.appendChild(km);
  });
  c.appendChild(kRow);

  const hd=mk('div','sec-hd');
  hd.innerHTML='<span class="sec-ttl">Estado de obras</span>';
  const rt=mk('span','rt'); rt.style.background='#E8F5EE'; rt.style.color='#1A7A45';
  rt.innerHTML='<span class="rt-dot" style="background:#1A7A45"></span>Alcalde ve esto en vivo';
  hd.appendChild(rt); c.appendChild(hd);

  obras.forEach((o,idx)=>{
    const col=pctC(o.pct);
    const estLbl={paralizada:'⚠️ Paralizada',ejecucion:'En ejecución',proyecto:'En proyecto',licitacion:'Licitación',entregada:'✓ Entregada'};
    const estPill={paralizada:'p-r',ejecucion:'p-g',proyecto:'p-x',licitacion:'p-a',entregada:'p-g'};

    const item=mk('div','obra');
    const hd2=mk('div','obra-hd');
    const nm=mk('div','obra-n'); nm.textContent=o.n;
    const pct=mk('div','obra-pct'); pct.textContent=o.pct+'%'; pct.style.color=col;
    hd2.appendChild(nm); hd2.appendChild(pct);

    const meta=mk('div','obra-meta');
    const pill=mk('span','pill '+estPill[o.est]); pill.textContent=estLbl[o.est]||o.est;
    const fin=mk('span','obra-fin'); fin.textContent='📅 '+o.fin;
    const presup=mk('span',''); presup.style.cssText='font-size:11px;color:#8A90A0'; presup.textContent=o.presup;
    meta.appendChild(pill); meta.appendChild(fin); meta.appendChild(presup);

    const pb=mk('div','pbar');
    const pbf=mk('div','pbar-f'); pbf.style.width=o.pct+'%'; pbf.style.background=col;
    pb.appendChild(pbf);

    item.appendChild(hd2); item.appendChild(meta); item.appendChild(pb);

    if(o.est!=='proyecto'&&o.est!=='entregada'){
      const avf=mk('div','av-form');
      const lbl=mk('span','av-lbl'); lbl.textContent='Actualizar avance:';
      const inp=mk('input','av-inp'); inp.type='number'; inp.min='0'; inp.max='100'; inp.placeholder='% nuevo';
      inp.value=avInputs[idx]||'';
      inp.oninput=e=>{ avInputs[idx]=e.target.value; };
      const okSp=mk('span','av-ok'); okSp.textContent='✓ Guardado — el alcalde ya puede verlo';
      const btn=mk('button','av-btn'); btn.style.background=g.color; btn.textContent='Registrar';
      btn.onclick=()=>{
        const val=parseInt(avInputs[idx]||'');
        if(isNaN(val)||val<0||val>100) return;
        obras[idx].pct=val; avInputs[idx]=''; okSp.style.display='inline';
        setTimeout(()=>{ okSp.style.display='none'; render(); },2000);
      };
      avf.appendChild(lbl); avf.appendChild(inp); avf.appendChild(btn); avf.appendChild(okSp);
      item.appendChild(avf);
    }
    c.appendChild(item);
  });
}

/* ══ VISTA PRESUPUESTO ════════════════════════════════ */
function vPresup(c,g){
  const p=g.pres, pctE=Math.round(p.ejec/p.asig*100), saldo=p.asig-p.ejec;
  const pctComp=Math.min(Math.round(g.comprometido/p.asig*100),100);

  const hd=mk('div','sec-hd');
  hd.innerHTML='<span class="sec-ttl">Ejecución presupuestal</span><span style="font-size:11px;color:#8A90A0">Año 2024</span>';
  c.appendChild(hd);

  [{lbl:'Presupuesto ejecutado',val:p.ejec,pct:pctE,col:pctC(pctE)},
   {lbl:'Presupuesto comprometido',val:g.comprometido,pct:pctComp,col:'#185FA5'}
  ].forEach(row=>{
    const item=mk('div','pres');
    const lbl=mk('div','pres-lbl'); lbl.textContent=row.lbl;
    const bw=mk('div','pres-bw');
    const bar=mk('div','pres-bar');
    const barf=mk('div','pres-bar-f'); barf.style.width=row.pct+'%'; barf.style.background=row.col;
    bar.appendChild(barf);
    const pct=mk('div','pres-pct'); pct.textContent=row.pct+'%'; pct.style.color=row.col;
    bw.appendChild(bar); bw.appendChild(pct);
    const montos=mk('div','pres-montos');
    montos.innerHTML=`<span>Monto: <strong>${fmt(row.val)}</strong></span><span>Asignado: <strong>${fmt(p.asig)}</strong></span>`;
    item.appendChild(lbl); item.appendChild(bw); item.appendChild(montos);
    c.appendChild(item);
  });

  const al=mk('div','info-box');
  if(saldo>p.asig*.3){
    al.style.background='#FDEAEA'; al.style.color='#B02020';
    al.innerHTML=`⚠️ <strong>Riesgo de cierre:</strong> tienes <strong>${fmt(saldo)}</strong> sin ejecutar. El MEF puede recuperar este saldo al 31 de diciembre.`;
  } else {
    al.style.background='#E8F5EE'; al.style.color='#1A7A45';
    al.innerHTML=`✓ Ejecución dentro del rango esperado. Saldo restante: <strong>${fmt(saldo)}</strong>.`;
  }
  c.appendChild(al);

  const fs=mk('div','');
  const fhd=mk('div','sec-hd'); fhd.innerHTML='<span class="sec-ttl">Registrar devengado del mes</span>';
  fs.appendChild(fhd);
  const card=mk('div','card');
  const devOk=mk('div',''); devOk.style.cssText='font-size:12px;color:#1A7A45;font-weight:600;margin-top:8px;display:none';
  devOk.textContent='✓ Devengado registrado. El GM y el alcalde pueden verlo.';
  card.innerHTML=`
    <div class="form-row"><label class="form-lbl">Monto devengado este mes (S/.)</label><input class="form-inp" type="number" placeholder="0.00" id="dev-m"></div>
    <div class="form-row"><label class="form-lbl">Concepto / partida presupuestal</label><input class="form-inp" placeholder="Ej: Pago valorización N°3 — Jr. Lima" id="dev-c"></div>`;
  const devBtn=mk('button','form-btn'); devBtn.style.background=g.color; devBtn.textContent='Registrar devengado';
  devBtn.onclick=()=>{ devOk.style.display='block'; setTimeout(()=>devOk.style.display='none',3000); };
  card.appendChild(devBtn); card.appendChild(devOk);
  fs.appendChild(card); c.appendChild(fs);
}

/* ══ VISTA KPIs ════════════════════════════════════════ */
function vKpis(c,g){
  const hd=mk('div','sec-hd');
  hd.innerHTML='<span class="sec-ttl">Indicadores de gestión</span><span style="font-size:11px;color:#8A90A0">Actualizar mensualmente</span>';
  c.appendChild(hd);

  g.kpis.forEach((kpi,i)=>{
    const pct=Math.round(kpi.v/kpi.meta*100), col=pctC(pct);
    const item=mk('div','ind');

    const hd2=mk('div','ind-hd');
    const nm=mk('div','ind-n'); nm.textContent=kpi.n;
    const editBtn=mk('button','ind-edit'); editBtn.textContent='✏ Actualizar';

    const form=mk('div','ind-form');
    const frow=mk('div','form-row');
    const flbl=mk('label','form-lbl'); flbl.textContent='Nuevo valor';
    const finp=mk('input','form-inp'); finp.type='number'; finp.value=kpi.v;
    const frow2=mk('div',''); frow2.style.cssText='display:flex;gap:8px;margin-top:0';
    const fsave=mk('button','resp-send'); fsave.style.background=g.color; fsave.textContent='Guardar';
    const fcancel=mk('button','resp-cancel'); fcancel.textContent='Cancelar';
    fsave.onclick=()=>{
      const v=parseFloat(finp.value);
      if(!isNaN(v)){ g.kpis[i].v=v; render(); }
    };
    fcancel.onclick=()=>form.classList.remove('open');
    editBtn.onclick=()=>form.classList.toggle('open');
    frow.appendChild(flbl); frow.appendChild(finp);
    frow2.appendChild(fsave); frow2.appendChild(fcancel);
    form.appendChild(frow); form.appendChild(frow2);

    hd2.appendChild(nm); hd2.appendChild(editBtn);

    const val=mk('div','ind-v'); val.style.color=col;
    val.innerHTML=`${kpi.v.toLocaleString('es-PE')}<span class="ind-meta"> ${kpi.u} / meta: ${kpi.meta.toLocaleString('es-PE')}</span>`;

    const prog=mk('div','ind-prog');
    const progf=mk('div','ind-prog-f'); progf.style.width=Math.min(pct,100)+'%'; progf.style.background=col;
    prog.appendChild(progf);

    const foot=mk('div','ind-foot');
    const per=mk('span','ind-per'); per.textContent='Nov 2024';
    const badge=mk('span','pill '+(pct>=80?'p-g':pct>=50?'p-a':'p-r'));
    badge.textContent=pct+'% de la meta';
    foot.appendChild(per); foot.appendChild(badge);

    item.appendChild(hd2); item.appendChild(val); item.appendChild(prog); item.appendChild(foot); item.appendChild(form);
    c.appendChild(item);
  });
}

/* ══ VISTA COMPROMISOS ════════════════════════════════ */
function vComps(c,g){
  const venc=g.comps.filter(x=>x.v).length;
  const hd=mk('div','sec-hd');
  hd.innerHTML=`<span class="sec-ttl">Mis compromisos</span>`;
  const badge=mk('span','pill '+(venc>0?'p-r':'p-g'));
  badge.textContent=venc>0?venc+' vencidos':'Al día';
  hd.appendChild(badge); c.appendChild(hd);

  g.comps.forEach(comp=>{
    const col=comp.v?'#B02020':'#1A7A45';
    const item=mk('div','comp');
    const dot=mk('span','comp-dot'); dot.style.background=col;
    const bd=mk('div','comp-bd');
    const ttl=mk('div','comp-ttl'); ttl.textContent=comp.t;
    const meta=mk('div','comp-meta');
    const or=mk('span',''); or.textContent=comp.o;
    meta.appendChild(or);
    if(comp.v){ const vc=mk('span','pill p-r'); vc.textContent='Vencido'; meta.appendChild(vc); }
    bd.appendChild(ttl); bd.appendChild(meta);
    const fec=mk('span','comp-fec'); fec.textContent=comp.f; fec.style.color=col;
    item.appendChild(dot); item.appendChild(bd); item.appendChild(fec);
    c.appendChild(item);
  });

  const fhd=mk('div','sec-hd'); fhd.style.marginTop='4px';
  fhd.innerHTML='<span class="sec-ttl">Reportar cumplimiento</span>';
  c.appendChild(fhd);

  const card=mk('div','card');
  const sel=mk('select','form-inp');
  g.comps.forEach(comp=>{ const o=mk('option'); o.textContent=comp.t; sel.appendChild(o); });
  const ta=mk('textarea','form-inp'); ta.rows=3; ta.placeholder='¿Cómo se cumplió? ¿Qué resultados? ¿Hay documentos de respaldo?';
  const reportBtn=mk('button','form-btn'); reportBtn.style.background=g.color;
  reportBtn.textContent='Reportar cumplimiento al GM y alcalde';
  const ok=mk('div',''); ok.style.cssText='font-size:12px;color:#1A7A45;font-weight:600;margin-top:8px;display:none';
  ok.textContent='✓ Reporte enviado al Gerente Municipal y al Alcalde.';
  reportBtn.onclick=()=>{ ok.style.display='block'; setTimeout(()=>ok.style.display='none',3000); };
  const r1=mk('div','form-row'); r1.innerHTML='<label class="form-lbl">Compromiso cumplido</label>'; r1.appendChild(sel);
  const r2=mk('div','form-row'); r2.innerHTML='<label class="form-lbl">Evidencia o descripción</label>'; r2.appendChild(ta);
  card.appendChild(r1); card.appendChild(r2); card.appendChild(reportBtn); card.appendChild(ok);
  c.appendChild(card);
}

/* ══ ARRANQUE ══════════════════════════════════════════ */
/* ══ LEER CONFIGURACIÓN DE LA MUNICIPALIDAD ══════════ */
function loadConfig() {
  try {
    const raw = sessionStorage.getItem('kausay_config') || localStorage.getItem('kausay_config');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}
function applyConfig(cfg) {
  if (!cfg) return;
  // Actualizar nombre municipalidad en sidebar
  document.querySelectorAll('.sb-muni').forEach(el => { el.textContent = cfg.muni_nombre || el.textContent; });
}

buildSelector();
