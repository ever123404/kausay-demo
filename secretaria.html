<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#C8880A">
<link rel="manifest" href="manifest-secretaria.json">
<link rel="apple-touch-icon" href="icons/icon-secretaria-192.png">
<title>Kausay Despacho</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ac:#C8880A;--ac-d:#9E6A06;--ac-bg:#FFF4DC;--rojo:#B02020;--rojo-bg:#FDEAEA;--verde:#1A7A45;--verde-bg:#E8F5EE;--azul:#185FA5;--azul-bg:#E6F1FB;--gris:#F0F2F5;--card:#fff;--txt:#1A1D23;--txt2:#4A5060;--txt3:#8A90A0;--borde:#E2E6ED;--sb:#0F0F12}
html,body{height:100%;font-family:'Barlow',sans-serif;color:var(--txt);background:var(--gris)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.layout{display:flex;height:100vh;overflow:hidden}
.sb{width:220px;background:var(--sb);display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.sb-logo{padding:15px 16px 11px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-brand{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:#fff;line-height:1}
.sb-brand em{color:#EDB040;font-style:normal}
.sb-tag{font-size:9px;color:rgba(255,255,255,.28);text-transform:uppercase;letter-spacing:1.5px;margin-top:3px}
.sb-muni{padding:8px 12px;background:rgba(255,255,255,.05);margin:8px 10px 4px;border-radius:8px;font-size:11px;color:rgba(255,255,255,.65);font-weight:500;line-height:1.3}
.sb-nav{flex:1;overflow-y:auto;padding:4px 0}
.sb-sec{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.22);padding:10px 16px 4px}
.sb-it{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;color:rgba(255,255,255,.46);font-size:13px;font-weight:500;border-left:3px solid transparent;transition:all .12s;user-select:none}
.sb-it:hover{color:#fff;background:rgba(255,255,255,.05)}
.sb-it.on{color:#fff;background:rgba(255,255,255,.08);border-left-color:var(--ac)}
.sb-ico{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sb-badge{margin-left:auto;background:var(--ac);color:#1A1D23;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px}
.sb-ft{padding:10px 12px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:8px}
.sb-av{width:30px;height:30px;border-radius:50%;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--sb);flex-shrink:0}
.sb-un{font-size:11px;color:#fff;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-ur{font-size:9px;color:rgba(255,255,255,.33);margin-top:1px}
.logout{background:rgba(255,255,255,.08);border:none;color:rgba(255,255,255,.4);font-size:9px;padding:4px 8px;border-radius:6px;cursor:pointer;font-family:'Barlow',sans-serif}
.logout:hover{background:rgba(255,255,255,.15);color:#fff}
.tb{height:52px;background:var(--card);border-bottom:1px solid var(--borde);display:flex;align-items:center;gap:10px;padding:0 18px;flex-shrink:0}
.tb-ttl{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;flex:1;color:var(--txt)}
.tb-date{font-size:11px;color:var(--txt3);white-space:nowrap}
.tb-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--borde);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;position:relative}
.tb-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;background:var(--rojo);border-radius:50%;border:1.5px solid #fff}
.content{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:14px}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sec-ttl{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--txt)}
.sec-lnk{font-size:11px;color:var(--ac);font-weight:600;cursor:pointer}
.card{background:var(--card);border:1px solid var(--borde);border-radius:12px;padding:14px 16px}
.pill{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;display:inline-block}
.p-r{background:var(--rojo-bg);color:var(--rojo)}.p-a{background:var(--ac-bg);color:var(--ac)}.p-g{background:var(--verde-bg);color:var(--verde)}.p-b{background:var(--azul-bg);color:var(--azul)}.p-x{background:var(--gris);color:var(--txt3);border:1px solid var(--borde)}
/* AGENDA */
.ag-item{background:var(--card);border:1px solid var(--borde);border-radius:10px;padding:11px 13px;display:flex;gap:11px;margin-bottom:7px}
.ag-time{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--txt2);min-width:44px;flex-shrink:0;line-height:1.2}
.ag-time small{display:block;font-size:10px;font-weight:400;color:var(--txt3)}
.ag-bar{width:3px;border-radius:2px;flex-shrink:0;margin:2px 0}
.ag-bd{flex:1;min-width:0}
.ag-ttl{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:3px}
.ag-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.ag-lugar{font-size:11px;color:var(--txt3)}
.br-chip{font-size:9px;font-weight:700;background:var(--azul-bg);color:var(--azul);padding:2px 7px;border-radius:8px}
/* DOCS */
.doc-item{background:var(--card);border:1px solid var(--borde);border-radius:10px;padding:12px 13px;display:flex;align-items:center;gap:11px;margin-bottom:7px}
.doc-ico{width:36px;height:36px;border-radius:8px;background:var(--gris);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.doc-bd{flex:1;min-width:0}
.doc-ttl{font-size:13px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-sub{font-size:11px;color:var(--txt3);margin-top:2px}
.doc-acts{display:flex;gap:5px;flex-shrink:0}
.doc-ok{padding:6px 11px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:var(--verde);color:#fff;font-family:'Barlow',sans-serif}
.doc-back{padding:6px 11px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;background:var(--gris);border:1px solid var(--borde);color:var(--txt2);font-family:'Barlow',sans-serif}
/* COMPROMISOS */
.comp-item{background:var(--card);border:1px solid var(--borde);border-radius:10px;padding:11px 13px;display:flex;align-items:center;gap:10px;margin-bottom:7px}
.comp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.comp-bd{flex:1;min-width:0}
.comp-ttl{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt)}
.comp-meta{display:flex;gap:5px;align-items:center;margin-top:3px}
.comp-resp{background:var(--gris);border:1px solid var(--borde);padding:1px 7px;border-radius:6px;font-size:10px;font-weight:600;color:var(--txt2)}
.comp-fec{font-size:11px;font-weight:700;flex-shrink:0}
/* REGIDORES */
.reg-item{background:var(--card);border:1px solid var(--borde);border-radius:10px;padding:11px 13px;display:flex;gap:10px;margin-bottom:7px}
.reg-av{width:30px;height:30px;border-radius:50%;background:var(--gris);border:1px solid var(--borde);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--txt2);flex-shrink:0}
.reg-bd{flex:1;min-width:0}
.reg-n{font-size:13px;font-weight:600;color:var(--txt)}
.reg-p{font-size:12px;color:var(--txt2);margin-top:3px;line-height:1.4}
.reg-meta{display:flex;gap:5px;align-items:center;margin-top:5px;flex-wrap:wrap}
/* FORM */
.form-row{margin-bottom:10px}
.form-lbl{display:block;font-size:10px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.form-inp{width:100%;border:1px solid var(--borde);border-radius:8px;padding:8px 11px;font-size:13px;font-family:'Barlow',sans-serif;color:var(--txt);background:#fff;outline:none}
.form-inp:focus{border-color:var(--ac)}
.form-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-btn{width:100%;padding:10px;background:var(--ac);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif}
/* ── EXPORTACIÓN ── */
.export-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--ac-bg);border:1px solid rgba(200,136,10,.2);border-radius:10px;margin-bottom:4px;flex-wrap:wrap}
.export-label{font-size:12px;font-weight:600;color:var(--ac);flex:1;min-width:120px}
.export-btn{padding:6px 12px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:'Barlow',sans-serif;display:inline-flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
.exp-xlsx{background:var(--verde);color:#fff}
.exp-xlsx:hover{opacity:.88}
.exp-todo{background:#1A1D23;color:#fff}
.exp-todo:hover{opacity:.85}
.exp-loading{opacity:.6;cursor:not-allowed}

/* ── BOTÓN VOLVER AL MENÚ (solo mobile) ── */
.tb-back{display:none;align-items:center;gap:6px;padding:6px 11px;border-radius:8px;border:1px solid var(--borde);background:none;cursor:pointer;font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;color:var(--txt2);white-space:nowrap;flex-shrink:0}
.tb-back:active{background:var(--gris)}
@media(max-width:680px){.tb-back{display:flex}.tb-date{display:none}}

@media(max-width:680px){.sb{display:none}.form-2{grid-template-columns:1fr}.doc-acts{flex-direction:column}}
</style>
</head>
<body>
<div id="loading" style="height:100vh;display:flex;align-items:center;justify-content:center;font-size:13px;color:#8A90A0">Cargando...</div>
<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
/* ── DATOS MOCK ── */
const AGENDA = [
  {h:"08:30",dur:"1h",   ttl:"Reunión de staff semanal",        lugar:"Sala de regidores",  tipo:"interna",  br:true,  col:"#B02020"},
  {h:"10:00",dur:"45min",ttl:"Visita supervisión obra Jr. Lima", lugar:"Jr. Lima cuadra 8",  tipo:"campo",    br:true,  col:"#C8880A"},
  {h:"12:30",dur:"30min",ttl:"Audiencia — Comunidad San Sebastián",lugar:"Despacho",         tipo:"audiencia",br:false, col:"#185FA5"},
  {h:"15:00",dur:"2h",   ttl:"Sesión ordinaria Concejo Municipal",lugar:"Sala principal",    tipo:"concejo",  br:true,  col:"#B02020"},
  {h:"18:00",dur:"1h",   ttl:"Firma de documentos pendientes",  lugar:"Despacho",            tipo:"admin",    br:false, col:"#8A90A0"},
];
let DOCS = [
  {ico:"📄",ttl:"Resolución de Alcaldía N°421-2024",   sub:"Modificación presupuestaria S/85,000 · Infraestructura", urg:"urgente",estado:"pendiente"},
  {ico:"🤝",ttl:"Convenio Marco — Universidad Nacional de Cajamarca",sub:"Pasantías y asistencia técnica · 2 años",  urg:"normal", estado:"pendiente"},
  {ico:"📑",ttl:"Contrato servicio limpieza pública N°089",sub:"Renovación enero–diciembre 2025 · S/145,000",        urg:"normal", estado:"pendiente"},
  {ico:"📄",ttl:"Resolución N°410-2024 — Designación cargo",sub:"Nombramiento Jefe de Logística · firmado",         urg:"normal", estado:"aprobado"},
];
let COMPROMISOS = [
  {ttl:"Gestionar agua potable sector Los Pinos",  resp:"Servicios",      fec:"22 Nov",ven:true},
  {ttl:"Instalar alumbrado plaza Las Torrecitas",  resp:"Infraestructura",fec:"25 Nov",ven:true},
  {ttl:"Responder pedido regidor Mamani — vías",   resp:"GM",             fec:"28 Nov",ven:false},
  {ttl:"Informe de cierre de año al concejo",      resp:"Planeamiento",   fec:"05 Dic",ven:false},
  {ttl:"Reunión comunidad Baños del Inca",         resp:"Des. Social",    fec:"10 Dic",ven:false},
];
const REGS = [
  {init:"LM",n:"Reg. Luis Mamani",   p:"Solicita informe técnico sobre Av. Héroes del Cenepa para la sesión del jueves.",    fec:"Hoy",     est:"pendiente"},
  {init:"MS",n:"Reg. María Soto",    p:"Pide audiencia con Rentas para tratar arbitrios de mercados populares. Miércoles 3pm.",fec:"Ayer",    est:"pendiente"},
  {init:"JD",n:"Reg. Jorge Díaz",    p:"Requiere acta de la sesión del 12 nov con acuerdos sobre presupuesto participativo.",  fec:"Hace 3d", est:"atendido"},
];
let USER = { nombre:'Carmen Flores Ríos', iniciales:'CF', demo:true };
const GERENTES=["Gerente Municipal","Infraestructura","Rentas","Servicios","Des. Social","Secretaría","Planeamiento"];
const hoy=new Date().toLocaleDateString("es-PE",{weekday:"long",day:"numeric",month:"long"});
const fechaHoy=new Date().toLocaleDateString("es-PE");
let vista="agenda";
const mk=(t,c)=>{const e=document.createElement(t);if(c)e.className=c;return e;};

/* ── EXPORTACIÓN EXCEL ── */
function exportarModulo(nombre, datos, columnas) {
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(datos);
  // Ancho de columnas
  ws['!cols'] = columnas.map(w => ({wch: w}));
  XLSX.utils.book_append_sheet(wb, ws, nombre.substring(0,31));
  XLSX.writeFile(wb, `Kausay_Despacho_${nombre}_${fechaHoy.replace(/\//g,'-')}.xlsx`);
}

function exportarTodo() {
  const wb = XLSX.utils.book_new();

  // Hoja 1: Agenda
  const agendaData = AGENDA.map(a => ({
    'Hora': a.h, 'Duración': a.dur, 'Evento': a.ttl,
    'Lugar': a.lugar, 'Tipo': a.tipo,
    'Briefing IA preparado': a.br ? 'Sí' : 'No',
    'Fecha': fechaHoy,
  }));
  const ws1 = XLSX.utils.json_to_sheet(agendaData);
  ws1['!cols'] = [8,10,35,25,12,22,12].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws1, 'Agenda');

  // Hoja 2: Documentos
  const docsData = DOCS.map(d => ({
    'Documento': d.ttl, 'Detalle': d.sub,
    'Urgencia': d.urg, 'Estado': d.estado,
    'Fecha exportación': fechaHoy,
  }));
  const ws2 = XLSX.utils.json_to_sheet(docsData);
  ws2['!cols'] = [40,35,10,12,18].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws2, 'Documentos para firma');

  // Hoja 3: Compromisos
  const compData = COMPROMISOS.map(c => ({
    'Compromiso del alcalde': c.ttl, 'Gerencia responsable': c.resp,
    'Fecha límite': c.fec, 'Estado': c.ven ? 'VENCIDO' : 'Vigente',
    'Fecha exportación': fechaHoy,
  }));
  const ws3 = XLSX.utils.json_to_sheet(compData);
  ws3['!cols'] = [45,22,14,12,18].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws3, 'Compromisos del alcalde');

  // Hoja 4: Pedidos de regidores
  const regData = REGS.map(r => ({
    'Regidor': r.n, 'Pedido / solicitud': r.p,
    'Fecha recibido': r.fec, 'Estado': r.est,
    'Fecha exportación': fechaHoy,
  }));
  const ws4 = XLSX.utils.json_to_sheet(regData);
  ws4['!cols'] = [22,55,14,12,18].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws4, 'Pedidos regidores');

  XLSX.writeFile(wb, `Kausay_Despacho_COMPLETO_${fechaHoy.replace(/\//g,'-')}.xlsx`);
}

/* ── BARRA DE EXPORTACIÓN ── */
function ExportBar(modulo, onExport) {
  const bar = mk('div','export-bar');
  const lbl = mk('div','export-label');
  lbl.innerHTML = `📤 <strong>Exportar ${modulo}</strong>`;
  const btnXls = mk('button','export-btn exp-xlsx');
  btnXls.innerHTML = '⬇ Excel (.xlsx)';
  btnXls.onclick = () => {
    btnXls.classList.add('exp-loading');
    setTimeout(() => { onExport(); btnXls.classList.remove('exp-loading'); }, 100);
  };
  const btnAll = mk('button','export-btn exp-todo');
  btnAll.innerHTML = '📦 Exportar todo el despacho';
  btnAll.onclick = () => {
    btnAll.classList.add('exp-loading');
    setTimeout(() => { exportarTodo(); btnAll.classList.remove('exp-loading'); }, 100);
  };
  bar.appendChild(lbl); bar.appendChild(btnXls); bar.appendChild(btnAll);
  return bar;
}

/* ── NAV ── */
const NAV=[
  {sec:"Despacho",items:[
    {id:"agenda",     ico:"🗓",lbl:"Agenda del alcalde",b:5},
    {id:"firma",      ico:"✍️",lbl:"Documentos para firma",b:2},
    {id:"compromisos",ico:"📌",lbl:"Compromisos de campo",b:2},
  ]},
  {sec:"Filtro externo",items:[
    {id:"regidores",  ico:"🏛",lbl:"Pedidos de regidores",b:2},
    {id:"audiencias", ico:"👥",lbl:"Solicitudes de audiencia"},
  ]},
  {sec:"Exportación",items:[
    {id:"exportar",   ico:"📤",lbl:"Exportar archivo"},
  ]},
];
const TITULOS={agenda:"Agenda del alcalde",firma:"Documentos para firma",compromisos:"Compromisos de campo",regidores:"Pedidos de regidores",audiencias:"Solicitudes de audiencia",exportar:"Exportar archivo del despacho"};

function nav(v){vista=v;render();}

/* ══ LEER CONFIGURACIÓN DE LA MUNICIPALIDAD ══════════ */
function loadConfig() {
  try {
    const raw = sessionStorage.getItem('kausay_config') || localStorage.getItem('kausay_config');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}
function applyConfig(cfg) {
  if (!cfg) return;
  // Actualizar nombre municipalidad en sidebar
  document.querySelectorAll('.sb-muni').forEach(el => { el.textContent = cfg.muni_nombre || el.textContent; });
}

window.addEventListener('load',()=>{
  const _cfg = loadConfig();
  const demoNombre = sessionStorage.getItem('kausay_demo_nombre');
  // Determinar nombre de la secretaria
  const nombreSec = (_cfg?.secretaria_nombre) || demoNombre || 'Carmen Flores Ríos';
  const inicialesSec = nombreSec.split(' ').slice(0,2).map(p=>p[0]).join('');
  // USER se usa en buildApp — lo definimos aquí globalmente
  USER = { nombre: nombreSec, iniciales: inicialesSec, demo: true };
  if (_cfg) applyConfig(_cfg);
  document.getElementById('loading').remove();
  buildApp();
  render();
  // PWA install prompt
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
});
function logout(){ window.location.href='login.html'; }

function buildApp(){
  document.body.innerHTML=`
    <div class="layout">
      <div class="sb">
        <div class="sb-logo"><div class="sb-brand">Kausay<em>Despacho</em></div><div class="sb-tag">Secretaría del alcalde</div></div>
        <div class="sb-muni">Municipalidad Provincial de Cajamarca</div>
        <div class="sb-nav" id="sb-nav"></div>
        <div class="sb-ft"><div class="sb-av">CF</div><div><div class="sb-un">Carmen Flores R.</div><div class="sb-ur">Secretaria del Despacho</div></div><button class="logout" onclick="logout()">Salir</button></div>
      </div>
      <div class="main">
        <div class="tb">
          <div class="tb-ttl" id="tb-ttl"></div>
          <div class="tb-date">${hoy}</div>
          <button class="tb-btn">🔔<span class="tb-dot"></span></button>
        </div>
        <div class="content" id="content"></div>
      </div>
    </div>`;
}

function render(){
  const nav2=document.getElementById('sb-nav');
  if(nav2){
    nav2.innerHTML='';
    NAV.forEach(sec=>{
      const sl=mk('div','sb-sec');sl.textContent=sec.sec;nav2.appendChild(sl);
      sec.items.forEach(it=>{
        const item=mk('div','sb-it'+(vista===it.id?' on':''));
        if(vista===it.id)item.style.borderLeftColor='var(--ac)';
        item.innerHTML=`<span class="sb-ico">${it.ico}</span><span style="flex:1">${it.lbl}</span>${it.b?`<span class="sb-badge">${it.b}</span>`:''}`;
        item.onclick=()=>nav(it.id);nav2.appendChild(item);
      });
    });
  }
  const ttl=document.getElementById('tb-ttl');if(ttl)ttl.textContent=TITULOS[vista]||vista;
  const tbBack=document.getElementById('tb-back');
  if(tbBack) tbBack.style.display=(vista!=='agenda')? 'flex':'none';
  const c=document.getElementById('content');if(!c)return;c.innerHTML='';
  if(vista==='agenda')      vAgenda(c);
  else if(vista==='firma')  vFirma(c);
  else if(vista==='compromisos') vCompromisos(c);
  else if(vista==='regidores')   vRegidores(c);
  else if(vista==='exportar')    vExportar(c);
  else { c.innerHTML=`<div style="background:#0F0F12;border-radius:12px;padding:15px;color:rgba(255,255,255,.75);font-size:13px">Módulo <strong style="color:#fff">${TITULOS[vista]||vista}</strong> disponible en la versión completa.</div>`; }
}

/* ── AGENDA ── */
function vAgenda(c){
  const hd=mk('div','sec-hd');
  hd.innerHTML='<span class="sec-ttl">Agenda de hoy</span>';
  const addBtn=mk('span','sec-lnk');addBtn.textContent='+ Agregar evento';
  hd.appendChild(addBtn);c.appendChild(hd);
  // Barra export
  c.appendChild(ExportBar('Agenda', ()=>{
    exportarModulo('Agenda', AGENDA.map(a=>({'Hora':a.h,'Duración':a.dur,'Evento':a.ttl,'Lugar':a.lugar,'Tipo':a.tipo,'Briefing IA':a.br?'Sí':'No','Fecha':fechaHoy})), [8,10,35,25,12,22,12]);
  }));
  const tipoCls={campo:'p-a',concejo:'p-r',audiencia:'p-b',interna:'p-x',admin:'p-x'};
  AGENDA.forEach(ag=>{
    const item=mk('div','ag-item');
    const td=mk('div','ag-time');td.innerHTML=`${ag.h}<small>${ag.dur}</small>`;
    const bar=mk('div','ag-bar');bar.style.background=ag.col;
    const bd=mk('div','ag-bd');
    bd.innerHTML=`<div class="ag-ttl">${ag.ttl}</div><div class="ag-meta"><span class="ag-lugar">📍 ${ag.lugar}</span><span class="pill ${tipoCls[ag.tipo]||'p-x'}">${ag.tipo}</span>${ag.br?'<span class="br-chip">✓ Briefing IA listo</span>':''}</div>`;
    item.appendChild(td);item.appendChild(bar);item.appendChild(bd);c.appendChild(item);
  });
}

/* ── FIRMA ── */
function vFirma(c){
  const pend=DOCS.filter(d=>d.estado==='pendiente').length;
  const hd=mk('div','sec-hd');
  hd.innerHTML=`<span class="sec-ttl">Cola de documentos para firma</span>`;
  const badge=mk('span','pill '+(pend?'p-r':'p-g'));badge.textContent=pend?pend+' pendientes':'Todo aprobado';
  hd.appendChild(badge);c.appendChild(hd);
  // Barra export
  c.appendChild(ExportBar('Documentos', ()=>{
    exportarModulo('Documentos_Firma', DOCS.map(d=>({'Documento':d.ttl,'Detalle':d.sub,'Urgencia':d.urg,'Estado':d.estado,'Fecha':fechaHoy})), [40,35,10,12,18]);
  }));
  DOCS.forEach((d,i)=>{
    const item=mk('div','doc-item');item.style.opacity=d.estado!=='pendiente'?'0.6':'1';
    const ico=mk('div','doc-ico');ico.textContent=d.ico;
    const bd=mk('div','doc-bd');
    bd.innerHTML=`<div class="doc-ttl">${d.ttl}</div><div class="doc-sub">${d.sub}</div>`;
    if(d.estado==='aprobado') bd.innerHTML+=`<div style="font-size:11px;color:var(--verde);font-weight:600;margin-top:4px">✓ Aprobado</div>`;
    else bd.innerHTML+=`<span class="pill ${d.urg==='urgente'?'p-r':'p-x'}">${d.urg}</span>`;
    item.appendChild(ico);item.appendChild(bd);
    if(d.estado==='pendiente'){
      const acts=mk('div','doc-acts');
      const ok=mk('button','doc-ok');ok.textContent='Aprobar';
      ok.onclick=()=>{DOCS[i].estado='aprobado';render();};
      const bk=mk('button','doc-back');bk.textContent='Devolver';
      acts.appendChild(ok);acts.appendChild(bk);item.appendChild(acts);
    }
    c.appendChild(item);
  });
  // Subir nuevo
  const nhd=mk('div','sec-hd');nhd.style.marginTop='4px';nhd.innerHTML='<span class="sec-ttl">Subir nuevo documento</span>';c.appendChild(nhd);
  const card=mk('div','card');
  card.innerHTML=`<div class="form-row"><label class="form-lbl">Título del documento</label><input class="form-inp" placeholder="Resolución, contrato, convenio, oficio..."></div>
  <div class="form-2"><div class="form-row"><label class="form-lbl">Tipo</label><select class="form-inp"><option>Resolución de alcaldía</option><option>Contrato</option><option>Convenio</option><option>Oficio</option></select></div>
  <div class="form-row"><label class="form-lbl">Urgencia</label><select class="form-inp"><option>urgente</option><option>normal</option></select></div></div>
  <div class="form-row"><label class="form-lbl">Nota para el alcalde</label><input class="form-inp" placeholder="Instrucción de lectura o contexto..."></div>
  <button class="form-btn" style="background:var(--ac)">Agregar a cola de firma</button>`;
  c.appendChild(card);
}

/* ── COMPROMISOS ── */
function vCompromisos(c){
  const hd=mk('div','sec-hd');
  hd.innerHTML='<div class="sec-ttl">Registrar compromiso de campo</div>';c.appendChild(hd);
  const card=mk('div','card');
  const descInp=mk('input','form-inp');descInp.placeholder='¿Qué prometió el alcalde?';
  const respSel=mk('select','form-inp');GERENTES.forEach(g=>{const o=mk('option');o.textContent=g;respSel.appendChild(o);});
  const fechInp=mk('input','form-inp');fechInp.type='date';
  const lugInp=mk('input','form-inp');lugInp.placeholder='Barrio, comunidad, evento...';
  const r0=mk('div','form-row');r0.innerHTML='<label class="form-lbl">¿Qué prometió el alcalde?</label>';r0.appendChild(descInp);
  const g2=mk('div','form-2');
  const r1=mk('div','form-row');r1.innerHTML='<label class="form-lbl">Gerencia responsable</label>';r1.appendChild(respSel);
  const r2=mk('div','form-row');r2.innerHTML='<label class="form-lbl">Fecha límite</label>';r2.appendChild(fechInp);
  g2.appendChild(r1);g2.appendChild(r2);
  const r3=mk('div','form-row');r3.innerHTML='<label class="form-lbl">Lugar / contexto</label>';r3.appendChild(lugInp);
  const saveBtn=mk('button','form-btn');saveBtn.style.background='var(--ac)';saveBtn.textContent='Registrar y notificar gerencia';
  saveBtn.onclick=()=>{
    if(!descInp.value.trim())return;
    COMPROMISOS.unshift({ttl:descInp.value,resp:respSel.value,fec:fechInp.value||'Por definir',ven:false});
    descInp.value='';lugInp.value='';nav('compromisos');
  };
  card.appendChild(r0);card.appendChild(g2);card.appendChild(r3);card.appendChild(saveBtn);
  c.appendChild(card);

  const lhd=mk('div','sec-hd');lhd.style.marginTop='4px';
  lhd.innerHTML='<span class="sec-ttl">Compromisos activos del alcalde</span>';
  // Barra export
  c.appendChild(lhd);
  c.appendChild(ExportBar('Compromisos', ()=>{
    exportarModulo('Compromisos_Alcalde', COMPROMISOS.map(comp=>({'Compromiso':comp.ttl,'Gerencia responsable':comp.resp,'Fecha límite':comp.fec,'Estado':comp.ven?'VENCIDO':'Vigente','Fecha exportación':fechaHoy})), [45,22,14,12,18]);
  }));
  COMPROMISOS.forEach(comp=>{
    const col=comp.ven?'var(--rojo)':'var(--verde)';
    const item=mk('div','comp-item');
    const dot=mk('span','comp-dot');dot.style.background=col;
    const bd=mk('div','comp-bd');
    const ttl=mk('div','comp-ttl');ttl.textContent=comp.ttl;
    const meta=mk('div','comp-meta');
    const resp=mk('span','comp-resp');resp.textContent=comp.resp;
    meta.appendChild(resp);
    if(comp.ven){const v=mk('span','pill p-r');v.textContent='Vencido';meta.appendChild(v);}
    bd.appendChild(ttl);bd.appendChild(meta);
    const fec=mk('span','comp-fec');fec.textContent=comp.fec;fec.style.color=col;
    item.appendChild(dot);item.appendChild(bd);item.appendChild(fec);c.appendChild(item);
  });
}

/* ── REGIDORES ── */
function vRegidores(c){
  const hd=mk('div','sec-hd');hd.innerHTML='<span class="sec-ttl">Pedidos de regidores</span>';c.appendChild(hd);
  c.appendChild(ExportBar('Pedidos Regidores', ()=>{
    exportarModulo('Pedidos_Regidores', REGS.map(r=>({'Regidor':r.n,'Pedido':r.p,'Fecha recibido':r.fec,'Estado':r.est,'Fecha exportación':fechaHoy})), [22,55,14,12,18]);
  }));
  REGS.forEach(r=>{
    const item=mk('div','reg-item');
    const av=mk('div','reg-av');av.textContent=r.init;
    const bd=mk('div','reg-bd');
    bd.innerHTML=`<div class="reg-n">${r.n}</div><div class="reg-p">${r.p}</div><div class="reg-meta"><span class="pill ${r.est==='atendido'?'p-g':'p-a'}">${r.est==='atendido'?'Atendido':'Pendiente'}</span><span style="font-size:11px;color:var(--txt3)">${r.fec}</span></div>`;
    item.appendChild(av);item.appendChild(bd);c.appendChild(item);
  });
}

/* ── EXPORTAR TODO ── */
function vExportar(c){
  const hd=mk('div','sec-hd');hd.innerHTML='<span class="sec-ttl">Archivo del despacho</span>';c.appendChild(hd);

  const info=mk('div','');
  info.style.cssText='background:var(--ac-bg);border:1px solid rgba(200,136,10,.2);border-radius:10px;padding:14px;margin-bottom:14px;font-size:12px;color:#633806;line-height:1.7';
  info.innerHTML=`Este archivo Excel consolida <strong>toda la información del despacho</strong>: agenda, documentos firmados, compromisos del alcalde y pedidos de regidores. Es el respaldo oficial de la gestión del despacho.<br><br>Se recomienda exportarlo al <strong>cierre de cada mes</strong> y guardarlo en la carpeta de archivos de la municipalidad.`;
  c.appendChild(info);

  const opciones=[
    {ico:'📅',ttl:'Agenda del día',desc:'Todos los eventos del día con briefing IA y lugar.',fn:()=>exportarModulo('Agenda',AGENDA.map(a=>({'Hora':a.h,'Duración':a.dur,'Evento':a.ttl,'Lugar':a.lugar,'Tipo':a.tipo,'Briefing IA':a.br?'Sí':'No','Fecha':fechaHoy})),[8,10,35,25,12,22,12])},
    {ico:'✍️',ttl:'Documentos para firma',desc:'Cola de documentos con estado y urgencia.',fn:()=>exportarModulo('Documentos_Firma',DOCS.map(d=>({'Documento':d.ttl,'Detalle':d.sub,'Urgencia':d.urg,'Estado':d.estado,'Fecha':fechaHoy})),[40,35,10,12,18])},
    {ico:'📌',ttl:'Compromisos del alcalde',desc:'Todos los compromisos con responsable y estado.',fn:()=>exportarModulo('Compromisos_Alcalde',COMPROMISOS.map(comp=>({'Compromiso':comp.ttl,'Gerencia responsable':comp.resp,'Fecha límite':comp.fec,'Estado':comp.ven?'VENCIDO':'Vigente','Fecha exportación':fechaHoy})),[45,22,14,12,18])},
    {ico:'🏛',ttl:'Pedidos de regidores',desc:'Solicitudes recibidas con estado de atención.',fn:()=>exportarModulo('Pedidos_Regidores',REGS.map(r=>({'Regidor':r.n,'Pedido':r.p,'Fecha recibido':r.fec,'Estado':r.est,'Fecha exportación':fechaHoy})),[22,55,14,12,18])},
  ];

  opciones.forEach(op=>{
    const row=mk('div','');
    row.style.cssText='background:var(--card);border:1px solid var(--borde);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px';
    const ico=mk('div','');ico.style.cssText='font-size:22px;flex-shrink:0';ico.textContent=op.ico;
    const bd=mk('div','');bd.style.flex='1';
    const ttl=mk('div','');ttl.style.cssText='font-size:13px;font-weight:600;color:var(--txt);margin-bottom:2px';ttl.textContent=op.ttl;
    const desc=mk('div','');desc.style.cssText='font-size:11px;color:var(--txt3)';desc.textContent=op.desc;
    bd.appendChild(ttl);bd.appendChild(desc);
    const btn=mk('button','export-btn exp-xlsx');btn.innerHTML='⬇ Excel';
    btn.onclick=()=>{btn.classList.add('exp-loading');setTimeout(()=>{op.fn();btn.classList.remove('exp-loading');},100);};
    row.appendChild(ico);row.appendChild(bd);row.appendChild(btn);c.appendChild(row);
  });

  // Botón exportar todo destacado
  const bigBtn=mk('button','');
  bigBtn.style.cssText='width:100%;margin-top:8px;padding:14px;background:#1A1D23;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:"Barlow",sans-serif;display:flex;align-items:center;justify-content:center;gap:8px';
  bigBtn.innerHTML='📦 Exportar TODO el despacho en un solo archivo Excel';
  bigBtn.onclick=()=>{
    bigBtn.textContent='Generando...';bigBtn.disabled=true;
    setTimeout(()=>{exportarTodo();bigBtn.innerHTML='📦 Exportar TODO el despacho en un solo archivo Excel';bigBtn.disabled=false;},200);
  };
  c.appendChild(bigBtn);
  const nota=mk('div','');nota.style.cssText='font-size:11px;color:var(--txt3);text-align:center;margin-top:8px;line-height:1.5';
  nota.textContent='El archivo incluye 4 hojas: Agenda · Documentos · Compromisos · Pedidos de regidores';
  c.appendChild(nota);
}
</script>
